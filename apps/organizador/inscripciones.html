    <script type="module">
import { supabase } from '/js/supabase-client.js';

async function iniciarInscripciones(session) {
  if (!session?.user) {
    window.location.href = '/login.html';
    return;
  }
  const uid = session.user.id;
  const { data: prof, error } = await supabase
    .from('profiles')
    .select('role')
    .eq('id', uid)
    .maybeSingle();
  const rol = !error && prof?.role ? String(prof.role) : 'jugador';
  if (rol !== 'club_admin' && rol !== 'superadmin' && rol !== 'organizador') {
    window.location.replace('/jugador/index.html');
  }
}

supabase.auth.onAuthStateChange((event, session) => {
  if (event === 'INITIAL_SESSION') {
    if (!session) window.location.href = '/login.html';
    else iniciarInscripciones(session);
  }
});
    </script>

    }
});
var torneo = null;
var tabActual = 'nuevo';

/** Torneos: exige estar afiliado a un club y tener sede/club activo (menú principal → Club). */
function jugadorAfiliadoAClubParaTorneo() {
    var raw = [];
    try { raw = JSON.parse(localStorage.getItem('mis_clubes') || '[]'); } catch (e) {}
    var clubes = Array.isArray(raw) ? raw.filter(function (c) {
        return !c.tipo || String(c.tipo).toLowerCase() === 'billar';
    }) : [];
    var perfil = null;
    try { perfil = JSON.parse(localStorage.getItem('mi_perfil') || 'null'); } catch (e) {}
    var tieneClubId = perfil && perfil.club_id;

    if (clubes.length === 0 && !tieneClubId) return false;

    var wl = (localStorage.getItem('wl_club_nombre') || '').trim();
    if (wl && wl !== 'GLOBAL') return true;

    try {
        var ca = JSON.parse(localStorage.getItem('club_activo') || 'null');
        if (ca && ca.codigo && (clubes.length === 0 || clubes.some(function (c) { return c.codigo === ca.codigo; })))
            return true;
    } catch (e) {}

    if (tieneClubId) return true;

    return false;
}

function mostrarBloqueoAfiliacion() {
    if (document.getElementById('bloqueo-afiliacion')) return;
    var raw = [];
    try { raw = JSON.parse(localStorage.getItem('mis_clubes') || '[]'); } catch (e) {}
    var nClubes = Array.isArray(raw) ? raw.filter(function (c) {
        return !c.tipo || String(c.tipo).toLowerCase() === 'billar';
    }).length : 0;
    var texto = nClubes > 0
        ? 'Ya perteneces a uno o más clubes: en el <strong>menú principal</strong> abre la pestaña <strong>Club</strong> → <strong>Mis clubes</strong> y elige tu club activo (así queda tu sede para torneos).'
        : 'Para participar en torneos debes <strong>afiliarte a un club</strong>: en el menú principal → pestaña <strong>Club</strong> → <strong>Únete con código</strong> (o crea un club si eres organizador).';
    var bloqueo = document.createElement('div');
    bloqueo.id = 'bloqueo-afiliacion';
    bloqueo.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;';
    bloqueo.innerHTML = '<div style="font-size:4rem;margin-bottom:16px;">🟡</div>' +
        '<div style="color:#c9a84c;font-size:1.1rem;letter-spacing:2px;margin-bottom:8px;font-family:Playfair Display,Georgia,serif;font-weight:600;">AFILIACIÓN OBLIGATORIA</div>' +
        '<p style="color:#888;font-size:0.8rem;max-width:340px;line-height:1.55;margin-bottom:20px;font-family:DM Sans,system-ui,sans-serif;">' + texto + '</p>' +
        '<a href="/index.html#afiliacion" style="display:inline-block;padding:16px 28px;background:#c9a84c;color:#0a0a0a;border-radius:12px;font-size:0.85rem;font-weight:700;text-decoration:none;font-family:DM Sans,system-ui,sans-serif;letter-spacing:0.06em;">IR AL MENÚ — CLUB</a>' +
        '<p style="margin-top:18px;"><a href="/index.html" style="color:#555;font-size:0.65rem;">Volver al inicio</a></p>';
    document.body.appendChild(bloqueo);
}

window.onload = async function() {
    try {
        if (typeof DC !== 'undefined' && typeof DC.icon === 'function') {
            var _map = [
                ['ico-h1-insc', 'trofeo', 22],
                ['ico-tab-nuevo', 'perfil', 15],
                ['ico-tab-buscar', 'ranking', 15],
                ['ico-form-nuevo', 'perfil', 16],
                ['ico-btn-inscribir', 'tacoYbola', 18],
                ['ico-buscar-tit', 'ranking', 15],
                ['ico-inscritos-tit', 'ranking', 15]
            ];
            for (var _j = 0; _j < _map.length; _j++) {
                var _n = document.getElementById(_map[_j][0]);
                if (_n) _n.innerHTML = DC.icon(_map[_j][1], _map[_j][2]);
            }
        }
    } catch (_eI) {}
    try { await MasterVIP.init(); } catch(e) { console.warn('Init offline:', e); }
    // SESSION.verificarAlCargar eliminado — guard moderno en <head>
    MasterVIP.applyDesign();
    if (!jugadorAfiliadoAClubParaTorneo()) {
        mostrarBloqueoAfiliacion();
        return;
    }
    cargarClubesSelect();
    cargar();
};

function cargarClubesSelect() {
    var sel = document.getElementById('inp-club');
    if (!sel) return;
    // Solo leer de localStorage clave "mis_clubes" y filtrar por app billar (no mezclar con otras apps)
    var raw = [];
    try {
        raw = JSON.parse(localStorage.getItem('mis_clubes') || '[]');
    } catch (e) {}
    var clubes = Array.isArray(raw) ? raw.filter(function(c) {
        return !c.tipo || String(c.tipo).toLowerCase() === 'billar';
    }) : [];
    sel.innerHTML = '';
    if (clubes.length === 0) {
        sel.innerHTML = '<option value="">No hay clubes registrados. Crea uno en el inicio.</option>';
        sel.disabled = true;
        return;
    }
    sel.disabled = false;
    var opt0 = document.createElement('option');
    opt0.value = '';
    opt0.textContent = '— Selecciona tu club —';
    sel.appendChild(opt0);
    clubes.forEach(function(c) {
        var opt = document.createElement('option');
        var nombre = c.nombre || c.name || '';
        opt.value = nombre;
        opt.textContent = nombre + (c.ciudad ? ' · ' + c.ciudad : '');
        opt.dataset.ciudad = c.ciudad || '';
        sel.appendChild(opt);
    });
    var clubActivo = localStorage.getItem('wl_club_nombre') || '';
    if (clubActivo) {
        for (var i = 0; i < sel.options.length; i++) {
            if (sel.options[i].value === clubActivo) { sel.selectedIndex = i; break; }
        }
    }
    sel.onchange = function() {
        var opt = sel.options[sel.selectedIndex];
        var ciudadInp = document.getElementById('inp-ciudad');
        if (ciudadInp && opt && opt.dataset) ciudadInp.value = opt.dataset.ciudad || '';
    };
    sel.dispatchEvent(new Event('change'));
}

function cargar() {
    torneo = MasterVIP.getTorneoActivo();
    
    if (!torneo) {
        document.getElementById('lbl-torneo').innerText = 'NO HAY TORNEO ACTIVO';
        document.getElementById('btn-inscribir').disabled = true;
        return;
    }
    
    document.getElementById('lbl-torneo').innerText = torneo.nombre;
    document.getElementById('torneo-panel').style.display = 'block';
    document.getElementById('torneo-nombre').innerText = torneo.nombre;
    document.getElementById('torneo-detalles').innerText = 
        torneo.modalidad + ' · ' + torneo.codigo + ' · Inscripción: ' + MasterVIP.formatearPesos(torneo.inscripcion || 0);
    
    actualizarCupo();
    renderInscritos();
    cargarDatalist();
}

function actualizarCupo() {
    var inscritos = (torneo.inscritos || []).length;
    var cupo = torneo.cupoMax || 16;
    var badge = document.getElementById('cupo-badge');
    badge.innerText = inscritos + ' / ' + cupo;
    
    if (inscritos >= cupo) {
        badge.classList.add('lleno');
        document.getElementById('btn-inscribir').disabled = true;
    } else {
        badge.classList.remove('lleno');
        document.getElementById('btn-inscribir').disabled = false;
    }
    
    document.getElementById('inscritos-count').innerText = inscritos + ' jugadores';
    
    // Mostrar acciones si hay inscritos
    if (inscritos >= 2) {
        document.getElementById('acciones-torneo').style.display = 'block';
    }
}

function cambiarTab(tab) {
    tabActual = tab;
    document.getElementById('tab-nuevo').classList.remove('activo');
    document.getElementById('tab-existente').classList.remove('activo');
    document.getElementById('tab-' + tab).classList.add('activo');
    
    document.getElementById('panel-nuevo').style.display = tab === 'nuevo' ? 'block' : 'none';
    document.getElementById('panel-existente').style.display = tab === 'existente' ? 'block' : 'none';
}

function cargarDatalist() {
    // Para el buscador
}

function buscarJugador() {
    var texto = document.getElementById('inp-buscar').value.trim().toUpperCase();
    var contenedor = document.getElementById('sugerencias');
    
    if (texto.length < 2) {
        contenedor.innerHTML = '';
        return;
    }
    
    var jugadores = MasterVIP.getJugadores();
    var encontrados = [];
    
    for (var i = 0; i < jugadores.length; i++) {
        if (jugadores[i].nombre.toUpperCase().indexOf(texto) >= 0) {
            encontrados.push(jugadores[i]);
        }
    }
    
    if (encontrados.length === 0) {
        contenedor.innerHTML = '<div style="color:#666;font-size:0.5rem;padding:10px;text-align:center;">No encontrado</div>';
        return;
    }
    
    var html = '';
    for (var j = 0; j < encontrados.length && j < 5; j++) {
        var jug = encontrados[j];
        var inicial = jug.nombre.trim()[0].toUpperCase();
        html += '<div class="sugerencia-item" onclick="inscribirExistente(\'' + jug.nombre.replace(/'/g, "\\'") + '\')">' +
            '<div class="sug-avatar">' + inicial + '</div>' +
            '<div class="sug-info">' +
            '<div class="sug-nombre">' + jug.nombre + '</div>' +
            '<div class="sug-prom">' + (jug.promedio || 0).toFixed(3) + ' · ' + (jug.club || 'Sin club') + '</div>' +
            '</div>' +
            '<span class="sug-add">+</span>' +
            '</div>';
    }
    
    contenedor.innerHTML = html;
}

function toggleClave() {
    var inp = document.getElementById('inp-clave');
    inp.type = inp.type === 'password' ? 'text' : 'password';
}

async function inscribirNuevo() {
    if (!jugadorAfiliadoAClubParaTorneo()) {
        mostrarBloqueoAfiliacion();
        return;
    }
    var nombre    = document.getElementById('inp-nombre').value.trim().toUpperCase();
    var tipoDoc   = document.getElementById('inp-tipo-doc').value;
    var documento = document.getElementById('inp-documento').value.trim().toUpperCase();
    var clave     = document.getElementById('inp-clave').value.trim();
    var promedio  = parseFloat(document.getElementById('inp-promedio').value) || 0;
    var whatsapp  = document.getElementById('inp-whatsapp').value.trim();
    var club      = document.getElementById('inp-club').value.trim();
    var ciudad    = document.getElementById('inp-ciudad').value.trim();

    if (!torneo)                    { alert('No hay torneo activo. Crea un torneo primero.'); return; }
    if (!nombre)                    { alert('Ingresa el nombre del jugador.'); return; }
    if (!documento)                 { alert('El numero de documento es obligatorio.'); return; }
    if (!clave || clave.length < 4) { alert('La clave debe tener minimo 4 caracteres.'); return; }
    if (!whatsapp)                  { alert('El WhatsApp es obligatorio para torneos.'); return; }

    // ID basado en documento — evita duplicados
    var id = tipoDoc + '-' + documento;

    // Guardar jugador en la plataforma
    await MasterVIP.guardarJugador({
        nombre: nombre,
        tipoDoc: tipoDoc,
        documento: documento,
        promedio: promedio,
        tel: whatsapp,
        club: club,
        ciudad: ciudad,
        id: id,
        pin: clave
    });
    
    // Inscribir en torneo
    var resultado = await MasterVIP.inscribirJugador(torneo.id, {
        nombre: nombre,
        tipoDoc: tipoDoc,
        documento: documento,
        promedio: promedio,
        club: club,
        ciudad: ciudad,
        tel: whatsapp,
        id: id
    });
    
    if (resultado.ok) {
        // Limpiar formulario
        document.getElementById('inp-nombre').value = '';
        document.getElementById('inp-documento').value = '';
        document.getElementById('inp-clave').value = '';
        document.getElementById('inp-promedio').value = '';
        document.getElementById('inp-whatsapp').value = '';
        document.getElementById('inp-club').value = '';
        document.getElementById('inp-ciudad').value = '';
        
        // Recargar
        torneo = MasterVIP.getTorneoActivo();
        actualizarCupo();
        renderInscritos();
    } else {
        alert(resultado.msg);
    }
}

async function inscribirExistente(nombre) {
    if (!jugadorAfiliadoAClubParaTorneo()) {
        mostrarBloqueoAfiliacion();
        return;
    }
    var jugador = MasterVIP.buscarJugador(nombre);
    
    if (!jugador) {
        alert('Jugador no encontrado');
        return;
    }
    
    var resultado = await MasterVIP.inscribirJugador(torneo.id, jugador);
    
    if (resultado.ok) {
        document.getElementById('inp-buscar').value = '';
        document.getElementById('sugerencias').innerHTML = '';
        
        torneo = MasterVIP.getTorneoActivo();
        actualizarCupo();
        renderInscritos();
    } else {
        alert(resultado.msg);
    }
}

function renderInscritos() {
    var inscritos = torneo.inscritos || [];
    var contenedor = document.getElementById('lista-inscritos');
    
    if (inscritos.length === 0) {
        contenedor.innerHTML = '<div class="empty">' +
            '<div class="empty-icon">🟡</div>' +
            '<div class="empty-txt">No hay jugadores inscritos aún.<br>Inscribe al primero arriba.</div>' +
            '</div>';
        return;
    }
    
    var html = '';
    for (var i = 0; i < inscritos.length; i++) {
        var jug = inscritos[i];
        var inicial = jug.nombre ? jug.nombre.trim()[0].toUpperCase() : '?';
        var prom = parseFloat(jug.promedio || 0).toFixed(3);
        var id = jug.id || 'DC-' + (i + 1);
        
        html += '<div class="inscrito-card">' +
            '<div class="inscrito-pos">' + (i + 1) + '</div>' +
            '<div class="inscrito-avatar">' + inicial + '</div>' +
            '<div class="inscrito-info">' +
            '<div class="inscrito-nombre">' + jug.nombre + '</div>' +
            '<div class="inscrito-id">ID: ' + id + '</div>' +
            '</div>' +
            '<div class="inscrito-prom">' + prom + '</div>' +
            '<button class="inscrito-quitar" onclick="quitarInscrito(\'' + jug.nombre.replace(/'/g, "\\'") + '\')">×</button>' +
            '</div>';
    }
    
    contenedor.innerHTML = html;
}

function quitarInscrito(nombre) {
    if (!confirm('¿Quitar a ' + nombre + ' del torneo?')) return;
    
    var inscritos = torneo.inscritos || [];
    var nuevos = [];
    
    for (var i = 0; i < inscritos.length; i++) {
        if (inscritos[i].nombre !== nombre) {
            nuevos.push(inscritos[i]);
        }
    }
    
    torneo.inscritos = nuevos;
    MasterVIP.actualizarTorneo(torneo);
    
    actualizarCupo();
    renderInscritos();
}

function realizarSorteo() {
    var inscritos = (torneo.inscritos || []).length;
    
    if (inscritos < 2) {
        alert('Se necesitan al menos 2 jugadores para el sorteo');
        return;
    }
    
    if (!confirm('¿Cerrar inscripciones y realizar el sorteo?\n\nJugadores: ' + inscritos)) return;
    
    var resultado = MasterVIP.realizarSorteo(torneo.id);
    
    if (resultado.ok) {
        alert('¡Sorteo realizado!\nEl torneo está en curso.');
        location.href = 'Brackets.html';
    } else {
        alert('Error: ' + resultado.msg);
    }
}
