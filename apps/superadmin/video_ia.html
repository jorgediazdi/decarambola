<!DOCTYPE html>
<html lang="es">
<head>
  <script type="module">
    import { getSession, getRole } from '/js/auth-manager.js';
    const s = await getSession();
    if (!s?.data) window.location.replace('/auth.html');
    const r = await getRole();
    if (r?.data !== 'superadmin') window.location.replace('/auth.html');
    try { sessionStorage.setItem('plataforma_superadmin_activo', 'true'); } catch (e) {}
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <title>Video IA — Superadmin</title>
  <link rel="stylesheet" href="/css/ux-shell.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Playfair+Display:wght@500;600&display=swap">

  <style>
    :root {
      --oro:      #c9a84c;
      --oro-dim:  rgba(201,168,76,0.12);
      --border:   rgba(201,168,76,0.15);
      --neon:     #2eff70;
      --neon-dim: rgba(46,255,112,0.10);
      --rojo:     #e05252;
      --bg:       #0a0a0a;
      --surface:  #111111;
      --text:     #e0d8c8;
      --muted:    #555;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      visibility: hidden;
      padding: 0 0 80px;
    }
    body.dc-ready { visibility: visible; animation: fadeIn .35s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* NAV */
    .sa-nav {
      position: sticky; top: 0; z-index: 50;
      background: rgba(10,10,10,.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex; align-items: center; gap: 16px;
    }
    .sa-nav-icon {
      width: 34px; height: 34px;
      background: var(--oro-dim);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .sa-nav-title {
      font-family: 'Playfair Display', serif;
      font-size: .95rem;
      color: var(--oro);
      flex: 1;
      letter-spacing: .03em;
    }
    .sa-nav-title span {
      font-family: 'DM Sans', sans-serif;
      font-size: .62rem;
      color: var(--muted);
      display: block;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-top: 1px;
    }
    .sa-nav a {
      color: var(--muted);
      font-size: .72rem;
      text-decoration: none;
      letter-spacing: .07em;
      text-transform: uppercase;
      transition: color .2s;
    }
    .sa-nav a:hover { color: var(--oro); }

    /* WRAP */
    .sa-wrap { max-width: 680px; margin: 0 auto; padding: 28px 16px 0; }

    /* LOADING / VACÍO */
    .vacio {
      text-align: center; color: var(--muted);
      padding: 60px 20px; font-size: .85rem;
    }
    .vacio::after {
      content: '';
      display: block; width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--oro);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 16px auto 0;
    }
    .vacio.done::after { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* LISTA */
    .lista { display: flex; flex-direction: column; gap: 14px; }

    /* CARD */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 20px;
      transition: border-color .25s;
    }
    .card.activo { border-color: rgba(46,255,112,.22); }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
    }
    .card-nombre {
      font-family: 'Playfair Display', serif;
      color: var(--oro);
      font-size: .95rem;
      font-weight: 500;
    }
    .card-ciudad {
      color: var(--muted);
      font-size: .7rem;
      margin-top: 3px;
      letter-spacing: .03em;
    }

    /* badge */
    .badge {
      flex-shrink: 0;
      font-size: .6rem; font-weight: 700;
      letter-spacing: .09em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
    }
    .badge-on  { background: var(--neon-dim); color: var(--neon);  border: 1px solid rgba(46,255,112,.3); }
    .badge-off { background: rgba(255,255,255,.04); color: var(--muted); border: 1px solid #1e1e1e; }

    /* controles */
    .card-body {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .toggle-wrap {
      display: flex; align-items: center; gap: 8px;
      font-size: .78rem; color: #aaa; cursor: pointer;
    }
    .toggle-wrap input[type=checkbox] {
      accent-color: var(--oro);
      width: 15px; height: 15px; cursor: pointer;
    }
    .costo-wrap {
      display: flex; align-items: center; gap: 8px;
      font-size: .78rem; color: #aaa;
    }
    .costo-wrap input[type=number] {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 10px;
      border-radius: 8px;
      font-size: .78rem;
      width: 100px;
      font-family: 'DM Sans', sans-serif;
      transition: border-color .2s;
    }
    .costo-wrap input[type=number]:focus {
      outline: none;
      border-color: var(--oro);
    }

    .btn-guardar {
      background: var(--oro-dim);
      border: 1px solid var(--border);
      color: var(--oro);
      padding: 8px 18px;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s, opacity .2s;
    }
    .btn-guardar:hover { background: rgba(201,168,76,.2); }
    .btn-guardar:active { opacity: .75; transform: scale(.97); }

    .msg {
      font-size: .7rem;
      margin-top: 10px;
      min-height: 14px;
      letter-spacing: .03em;
    }
    .msg.ok  { color: var(--neon); }
    .msg.err { color: var(--rojo); }

    /* separador */
    .card-sep {
      border: none;
      border-top: 1px solid var(--border);
      margin: 14px 0;
    }
  </style>
</head>

<body class="dc-ux dc-ux-skin">

  <nav class="sa-nav">
    <div class="sa-nav-icon">🎥</div>
    <div class="sa-nav-title">
      Video IA — Clubs
      <span>Superadmin · DE CARAMBOLA</span>
    </div>
    <a href="/apps/superadmin/solicitudes.html">← Solicitudes</a>
  </nav>

  <div class="sa-wrap">
    <div class="lista" id="lista">
      <div class="vacio" id="loader">Cargando clubs</div>
    </div>
  </div>

  <script type="module">
    import { listClubsActivos, patchClub } from '/js/api/club-api.js';
    import { guardSalaPage } from '/js/sala-supabase-gate.js';

    function bodyReveal() {
      document.body.classList.add('dc-ready');
    }

    const cont = document.getElementById('lista');

    async function cargar() {
      const r = await listClubsActivos();
      const clubs = r.data || [];

      if (!clubs.length) {
        cont.innerHTML = '<div class="vacio done">No hay clubs activos.</div>';
        bodyReveal();
        return;
      }

      cont.innerHTML = '';
      clubs.forEach(c => cont.appendChild(renderCard(c)));
      bodyReveal();
    }

    function renderCard(c) {
      const on    = !!c.video_ia_activo;
      const costo = c.video_ia_costo != null ? c.video_ia_costo : 0;

      const div = document.createElement('div');
      div.className = 'card' + (on ? ' activo' : '');
      div.id = 'card-' + c.id;

      div.innerHTML = `
        <div class="card-top">
          <div>
            <div class="card-nombre">${esc(c.nombre || c.id)}</div>
            <div class="card-ciudad">${esc(c.ciudad || '—')}</div>
          </div>
          <span class="badge ${on ? 'badge-on' : 'badge-off'}" id="badge-${c.id}">
            ${on ? 'ACTIVO' : 'INACTIVO'}
          </span>
        </div>
        <hr class="card-sep">
        <div class="card-body">
          <label class="toggle-wrap">
            <input type="checkbox" id="chk-${c.id}" ${on ? 'checked' : ''}> Video IA activo
          </label>
          <label class="costo-wrap">
            Costo adicional $
            <input type="number" id="costo-${c.id}" value="${costo}" min="0" step="100" placeholder="0">
          </label>
          <button type="button" class="btn-guardar" id="btn-${c.id}">GUARDAR</button>
        </div>
        <div class="msg" id="msg-${c.id}"></div>
      `;

      div.querySelector('.btn-guardar').addEventListener('click', () => guardar(c.id));
      return div;
    }

    async function guardar(clubId) {
      const chk     = document.getElementById('chk-'   + clubId);
      const costoEl = document.getElementById('costo-' + clubId);
      const msgEl   = document.getElementById('msg-'   + clubId);
      const card    = document.getElementById('card-'  + clubId);
      const badge   = document.getElementById('badge-' + clubId);
      const btnEl   = document.getElementById('btn-'   + clubId);
      if (!chk || !costoEl || !msgEl) return;

      const activo = chk.checked;
      const costo  = parseFloat(costoEl.value) || 0;

      btnEl.disabled = true;
      msgEl.textContent = 'Guardando…';
      msgEl.className = 'msg';

      const r = await patchClub(clubId, { video_ia_activo: activo, video_ia_costo: costo });

      if (r.error) {
        msgEl.textContent = 'Error: ' + (r.error.message || r.error);
        msgEl.className = 'msg err';
        btnEl.disabled = false;
      } else {
        msgEl.textContent = '✓ Guardado';
        msgEl.className = 'msg ok';
        card.className  = 'card' + (activo ? ' activo' : '');
        badge.textContent = activo ? 'ACTIVO' : 'INACTIVO';
        badge.className   = 'badge ' + (activo ? 'badge-on' : 'badge-off');
        btnEl.disabled = false;
        setTimeout(() => { msgEl.textContent = ''; }, 2500);
      }
    }

    function esc(t) {
      if (t == null) return '';
      const d = document.createElement('div');
      d.textContent = t;
      return d.innerHTML;
    }

    const gateOk = await guardSalaPage({
      pageTitle: 'Video IA — Clubs',
      allowedRoles: ['superadmin'],
    });
    if (gateOk) cargar();
  </script>
</body>
</html>
