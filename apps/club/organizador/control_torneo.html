<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <title>Control Torneo — DeCarambola</title>
    <style>
:root { --oro:#d4af37; --negro:#0b0b0b; --neon:#2eff70; --azul:#3498db; --rojo:#e74c3c; --g1:#1a1a1a; --g2:#111; --g3:#0a0a0a; --borde:#1a1a1a; --card:#0a0a0a; }
        * { box-sizing: border-box; }
        body { background: var(--negro); color: #fff; font-family: 'Arial Black', sans-serif; margin: 0; padding: 0; }
        .header { background: #000; border-bottom: 2px solid #1a1a1a; padding: 15px 20px; position: sticky; top: 0; z-index: 50; display: flex; flex-direction: column; align-items: stretch; gap: 10px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .header-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; width: 100%; }
        .btn-hdr {
            background: rgba(10,10,10,0.95); border: 1px solid #1a1a1a; color: #888;
            padding: 8px 12px; border-radius: 10px; font-size: 0.52rem; cursor: pointer;
            text-decoration: none; font-family: 'Arial Black', sans-serif; font-weight: 600;
            letter-spacing: 0.06em; transition: border-color 0.15s, color 0.15s;
        }
        .btn-hdr:hover, .btn-hdr:focus-visible { border-color: rgba(212,175,55,0.35); color: var(--oro); outline: none; }
        .header-titulo { color: var(--oro); font-size: 0.95rem; letter-spacing: 2px; }
        .bolsa-chip { background: #0a1a0a; border: 1px solid var(--neon); border-radius: 20px; padding: 6px 14px; text-align: center; }
        .bolsa-chip b { color: var(--neon); font-size: 0.9rem; display: block; line-height: 1; }
        .bolsa-chip small { color: #333; font-size: 0.5rem; }
        .header-sub { color: #333; font-size: 0.6rem; margin-top: 5px; letter-spacing: 1px; }
        .contenido { padding: 20px 15px 100px; max-width: 500px; margin: 0 auto; }
        .ronda-bloque { margin-bottom: 30px; }
        .ronda-titulo { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .ronda-titulo-linea { flex: 1; height: 1px; background: #1a1a1a; }
        .ronda-titulo-txt { color: var(--oro); font-size: 0.7rem; letter-spacing: 3px; white-space: nowrap; }
        .ronda-titulo-badge { background: var(--oro); color: #000; font-size: 0.5rem; padding: 3px 10px; border-radius: 10px; white-space: nowrap; }
        .partida-card { background: #0a0a0a; border: 2px solid #1a1a1a; border-radius: 20px; overflow: hidden; margin-bottom: 12px; transition: 0.3s; position: relative; }
        .partida-card.en-juego { border-color: var(--neon); box-shadow: 0 0 20px rgba(46,255,112,0.1); animation: pulso-card 2s infinite; }
        .partida-card.terminada { border-color: #222; opacity: 0.85; }
        .partida-card.bye { border-color: var(--oro); background: #0f0d00; }
        .partida-card.pendiente { border-color: #1a1a1a; }
        .partida-card.esperando { border-color: var(--azul); }
        @keyframes pulso-card { 0%,100% { box-shadow: 0 0 15px rgba(46,255,112,0.1); } 50% { box-shadow: 0 0 30px rgba(46,255,112,0.25); } }
        .card-estado { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px; background: #050505; border-bottom: 1px solid #111; }
        .card-num { color: #222; font-size: 0.55rem; letter-spacing: 1px; }
        .est-badge { font-size: 0.55rem; padding: 3px 10px; border-radius: 10px; font-weight: bold; letter-spacing: 1px; }
        .est-pendiente { background: #111; color: #333; }
        .est-esperando { background: rgba(52,152,219,0.15); color: var(--azul); border: 1px solid rgba(52,152,219,0.3); }
        .est-en-juego { background: rgba(46,255,112,0.12); color: var(--neon); border: 1px solid rgba(46,255,112,0.3); }
        .est-terminada { background: #111; color: #444; }
        .est-bye { background: rgba(212,175,55,0.1); color: var(--oro); }
        .jugador-row { display: flex; align-items: center; padding: 12px 14px; border-bottom: 1px solid #0f0f0f; transition: background 0.2s; gap: 10px; }
        .jugador-row:last-of-type { border-bottom: none; }
        .jugador-row.ganador { background: #0a1a0a; }
        .jugador-row.perdedor { opacity: 0.4; }
        .jugador-row.bye-row { background: #0f0d00; }
        .j-corona { font-size: 1rem; flex-shrink: 0; width: 20px; }
        .j-nombre { flex: 1; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .j-prom { font-size: 0.75rem; color: #444; font-family: 'Courier New', monospace; flex-shrink: 0; }
        .j-pts { font-size: 1.4rem; font-weight: 900; color: var(--oro); flex-shrink: 0; min-width: 30px; text-align: right; }
        .j-pts.winner { color: var(--oro); text-shadow: 0 0 10px rgba(212,175,55,0.5); }
        .j-pts.loser { color: #333; }
        .j-listo { font-size: 0.55rem; color: var(--azul); flex-shrink: 0; }
        .vs-divider { text-align: center; font-size: 0.6rem; color: #1a1a1a; padding: 3px 0; letter-spacing: 2px; }
        .card-accion { padding: 10px 12px; background: #050505; border-top: 1px solid #111; }
        .btn-card { width: 100%; padding: 12px; border: none; border-radius: 12px; font-size: 0.8rem; font-weight: bold; cursor: pointer; letter-spacing: 1px; transition: 0.15s; }
        .btn-card:active { transform: scale(0.97); }
        .btn-card.verde { background: var(--neon); color: #000; }
        .btn-card.azul { background: var(--azul); color: #fff; }
        .btn-card.gris { background: #111; color: #333; cursor: default; }
        .conector { display: flex; justify-content: center; margin: -5px 0 20px; }
        .conector-linea { width: 2px; height: 30px; background: linear-gradient(var(--oro), transparent); opacity: 0.3; }
        .campeon-panel { background: linear-gradient(135deg, #1a1200, #0a0800); border: 2px solid var(--oro); border-radius: 25px; padding: 25px; text-align: center; margin: 20px 0; box-shadow: 0 0 40px rgba(212,175,55,0.2); }
        .campeon-panel .trofeo { font-size: 3.5rem; display: block; margin-bottom: 10px; }
        .campeon-panel .campeon-lbl { color: #444; font-size: 0.6rem; letter-spacing: 3px; margin-bottom: 8px; }
        .campeon-panel .campeon-nombre { color: var(--oro); font-size: 2rem; text-shadow: 0 0 25px rgba(212,175,55,0.5); }
        .campeon-panel .bolsa-ganada { color: var(--neon); font-size: 1rem; margin-top: 8px; }
        .empty-state { text-align: center; padding: 60px 20px; color: #222; }
        .empty-state div { font-size: 3rem; margin-bottom: 15px; }
        .empty-state p { font-size: 0.8rem; line-height: 1.8; }
        .tabs { display: flex; background: #0a0a0a; border-bottom: 1px solid var(--borde); position: sticky; top: 118px; z-index: 40; }
        .tab-btn { flex: 1; padding: 13px 8px; background: none; border: none; color: #444; font-size: 0.65rem; font-family: 'Arial Black', sans-serif; letter-spacing: 2px; cursor: pointer; border-bottom: 2px solid transparent; transition: 0.15s; }
        .tab-btn.activa { color: var(--oro); border-bottom-color: var(--oro); }
        .lista-wrap { padding: 16px 15px 120px; max-width: 500px; margin: 0 auto; }
        .cuadro-outer { overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; padding: 20px 16px 120px; min-height: calc(100vh - 130px); }
        .cuadro-inner { display: flex; align-items: stretch; gap: 0; min-height: 400px; }
        .col-ronda { display: flex; flex-direction: column; min-width: 148px; flex-shrink: 0; }
        .col-header { text-align: center; padding: 8px 6px 12px; border-bottom: 1px solid var(--borde); margin-bottom: 0; flex-shrink: 0; }
        .col-header-nom { font-size: 0.65rem; letter-spacing: 2px; color: var(--oro); }
        .col-header-jugs { font-size: 0.38rem; color: #333; margin-top: 2px; }
        .col-slots { flex: 1; display: flex; flex-direction: column; justify-content: space-around; padding: 8px 5px; gap: 0; }
        .col-slot { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 3px 0; }
        .cuadro-card { background: var(--card); border: 1px solid var(--borde); border-radius: 10px; overflow: hidden; }
        .cuadro-card.en-juego { border-color: rgba(46,255,112,0.5); }
        .cuadro-card.terminada { border-color: #1f1f1f; }
        .cuadro-card.pendiente { border-color: var(--borde); }
        .cuadro-card.bye { border-color: rgba(212,175,55,0.2); }
        .cc-jug { display: flex; align-items: center; gap: 5px; padding: 6px 8px; border-bottom: 1px solid var(--borde); min-height: 28px; }
        .cc-jug:last-child { border-bottom: none; }
        .cc-jug.ganador { background: rgba(212,175,55,0.05); }
        .cc-jug.perdedor { opacity: 0.35; }
        .cc-av { width: 18px; height: 18px; border-radius: 50%; background: #1a1a1a; border: 1px solid #2a2a2a; display: flex; align-items: center; justify-content:center; font-size: 0.38rem; font-weight: 900; color: #555; flex-shrink: 0; }
        .cc-nom { flex: 1; font-size: 0.6rem; color: #bbb; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cc-pts { font-size: 0.52rem; font-family: 'Courier New', monospace; font-weight: 900; color: #fff; flex-shrink: 0; }
        .cc-pts.top { color: var(--oro); }
        .cc-live { position: absolute; top: 3px; right: 5px; font-size: 0.35rem; color: var(--neon); letter-spacing: 1px; }
        .col-conector { width: 22px; flex-shrink: 0; display: flex; flex-direction: column; padding-top: 44px; }
        .con-grupo { flex: 1; display: flex; flex-direction: column; }
        .con-top { flex: 1; border-right: 1px solid #2a2a2a; border-bottom: 1px solid #2a2a2a; }
        .con-bot { flex: 1; border-right: 1px solid #2a2a2a; border-top: 1px solid #2a2a2a; }
        .con-mid { height: 1px; background: #2a2a2a; margin-left: 0; }
        .col-campeon { min-width: 110px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 44px 12px 12px; }
        .camp-trofeo { font-size: 2rem; margin-bottom: 8px; }
        .camp-lbl { font-size: 0.38rem; letter-spacing: 2px; color: #444; margin-bottom: 6px; }
        .camp-nom { font-size: 0.55rem; color: var(--oro); text-align: center; letter-spacing: 1px; }
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, #000 40%); padding: 10px 15px 20px; display: flex; gap: 8px; }
        .btn-nav { flex: 1; padding: 13px 8px; background: #0f0f0f; border: 1px solid #1a1a1a; border-radius: 14px; color: #777; font-size: 0.65rem; cursor: pointer; text-align: center; text-decoration: none; display: block; transition: 0.2s; font-family: 'Arial Black', sans-serif; letter-spacing: 1px; }
        .btn-nav:active { border-color: var(--oro); color: var(--oro); }
    </style>

<script>
var torneo = null;
var vistaActual = 'lista';

window.onload = async function() {
    try {
        await MasterVIP.init();
        SESSION.verificarAlCargar('jugador');
    } catch(e) { console.warn('Init offline:', e); }
    try { await MasterVIP.cargarTorneosNube(); } catch(e) { console.warn('Torneos desde Supabase:', e); }
    try {
        if (typeof MasterVIP !== 'undefined') MasterVIP.applyDesign();
        var _nombreSede = localStorage.getItem('wl_club_nombre') || 'GLOBAL';
        if (_nombreSede !== 'GLOBAL' && typeof MasterVIP !== 'undefined') {
            var hdr = document.getElementById('club-logo-hdr');
            if (hdr) hdr.innerHTML = MasterVIP.getLogoHTML(34);
        }
    } catch(e) { console.warn('Apply design:', e); }
    cargar();
    var p = new URLSearchParams(window.location.search);
    if (p.get('vista') === 'cuadro' && typeof cambiarVista === 'function') cambiarVista('cuadro');
};

function refrescar() { cargar(); }

function cambiarVista(v) {
    vistaActual = v;
    document.getElementById('vista-lista').style.display = v === 'lista' ? 'block' : 'none';
    document.getElementById('vista-cuadro').style.display = v === 'cuadro' ? 'block' : 'none';
    document.getElementById('vista-info').style.display = v === 'info' ? 'block' : 'none';
    var tabs = document.querySelectorAll('.tab-btn');
    for (var i = 0; i < tabs.length; i++) { tabs[i].classList.remove('activa'); }
    document.getElementById('tab-' + v).classList.add('activa');
    if (v === 'cuadro' && torneo) dibujarCuadro();
    if (v === 'info' && torneo) dibujarInfo();
}

function cargar() {
    try {
        torneo = typeof MasterVIP !== 'undefined' ? MasterVIP.getTorneoActivo() : null;
    } catch (e) {
        console.warn('cargar torneo:', e);
        torneo = null;
    }
    if (typeof MasterVIP !== 'undefined' && !torneo) {
        var lista = MasterVIP.getTorneos();
        var activo = lista.find(function(t) { return t.estado === 'EN_CURSO'; }) || lista.find(function(t) { return t.estado === 'ABIERTO'; }) || lista[0];
        if (activo) {
            localStorage.setItem('TORNEO_ACTIVO_ID', activo.id);
            torneo = activo;
        }
    }
    var emptyList = '<div class="empty-state"><div>🎱</div><p>No hay torneo activo.<br>Crea uno desde el menú principal.</p></div>';
    var emptyCuadro = '<div class="empty-state" style="padding:40px 20px;"><div>🎱</div><p>No hay torneo activo.<br>Crea uno desde el menú principal.</p></div>';
    var elSub = document.getElementById('lbl-sub');
    var elBolsa = document.getElementById('lbl-bolsa');
    var fmtPesos = typeof MasterVIP !== 'undefined' && MasterVIP.formatearPesos ? MasterVIP.formatearPesos(0) : '$ 0';
    if (!torneo) {
        document.getElementById('lbl-torneo').innerText = 'CONTROL';
        if (elSub) elSub.innerText = 'Sin torneo activo';
        if (elBolsa) elBolsa.innerText = fmtPesos;
        document.getElementById('contenido').innerHTML = emptyList;
        document.getElementById('cuadro-contenido').innerHTML = emptyCuadro;
        return;
    }
    document.getElementById('lbl-torneo').innerText = torneo.nombre;
    if (elSub) elSub.innerText = torneo.codigo + ' · ' + (torneo.modalidad || '') + ' · ' + (torneo.inscritos || []).length + ' JUG.';
    if (elBolsa) elBolsa.innerText = typeof MasterVIP !== 'undefined' ? MasterVIP.formatearPesos(MasterVIP.calcularBolsa(torneo)) : fmtPesos;
    if (!torneo.rondas || torneo.rondas.length === 0) {
        var msgSorteo = '<div class="empty-state"><div>🎲</div><p>El sorteo aún no se ha realizado.<br>Ve a <b style="color:var(--oro)">Inscripciones</b> para cerrarlo.</p></div>';
        document.getElementById('contenido').innerHTML = msgSorteo;
        document.getElementById('cuadro-contenido').innerHTML = '<div class="empty-state" style="padding:40px 20px;"><div>🎲</div><p>El sorteo aún no se ha realizado.<br>Ve a <b style="color:var(--oro)">Inscripciones</b> para cerrar y sortear.</p></div>';
        return;
    }
    try {
        dibujarLista();
        dibujarCuadro();
        dibujarInfo();
    } catch (err) {
        console.error('control_torneo dibujar:', err);
        var msg = (err && err.message) ? String(err.message) : 'Error desconocido';

function calcTablaFinal() {
    // Construir tabla de posiciones final a partir de las rondas
    var totalRondas = MasterVIP.totalRondas((torneo.inscritos || []).length);
    var posMap = {}; // nombre -> {pos, ronda, car, ent, promedio, serieMax}

    // Inicializar todos los inscritos
    for (var i = 0; i < torneo.inscritos.length; i++) {
        var jug = torneo.inscritos[i];
        posMap[jug.nombre.toUpperCase()] = {
            nombre: jug.nombre, rondaElim: 0,
            car: 0, ent: 0, promedio: 0, serieMax: 0, partidas: 0
        };
    }

    // Recorrer todas las partidas y acumular stats
    for (var ri = 0; ri < torneo.rondas.length; ri++) {
        var ronda = torneo.rondas[ri];
        var partidasRR = (ronda && ronda.partidas) ? ronda.partidas : [];
        for (var pi = 0; pi < partidasRR.length; pi++) {
            var p = partidasRR[pi];
            if (p.estado !== 'TERMINADA') continue;

            // J1
            var k1 = (p.j1 || '').toUpperCase();
            if (posMap[k1]) {
                posMap[k1].car += parseInt(p.pts1) || 0;
                posMap[k1].ent += parseInt(p.entradas1 || 0);
                posMap[k1].partidas++;
                posMap[k1].rondaElim = ronda.numero;
                if ((p.serieJ1 || 0) > posMap[k1].serieMax) posMap[k1].serieMax = p.serieJ1 || 0;
            }
            // J2
            var k2 = (p.j2 || '').toUpperCase();
            if (posMap[k2]) {
                posMap[k2].car += parseInt(p.pts2) || 0;
                posMap[k2].ent += parseInt(p.entradas2 || 0);
                posMap[k2].partidas++;
                posMap[k2].rondaElim = ronda.numero;
                if ((p.serieJ2 || 0) > posMap[k2].serieMax) posMap[k2].serieMax = p.serieJ2 || 0;
            }
        }
    }

    // Calcular promedio
    var lista = Object.values(posMap);
    for (var j = 0; j < lista.length; j++) {
        lista[j].promedio = lista[j].ent > 0 ? lista[j].car / lista[j].ent : parseFloat((lista[j].promedio || 0));
    }

    // Ordenar: campeón primero, luego por ronda eliminado (desc) y promedio
    lista.sort(function(a, b) {
        if (a.nombre.toUpperCase() === (torneo.campeon || '').toUpperCase()) return -1;
        if (b.nombre.toUpperCase() === (torneo.campeon || '').toUpperCase()) return 1;
        if (b.rondaElim !== a.rondaElim) return b.rondaElim - a.rondaElim;
        return b.promedio - a.promedio;
    });
    return lista;
}

    html += '<div style="background:var(--card);border:1px solid var(--borde);border-radius:20px;padding:20px;margin-bottom:12px;"><div style="font-size: 0.65rem;letter-spacing:3px;color:#555;margin-bottom:14px;">📋 REGLAS (configuración del torneo)</div>' + kpiRow('CARAMBOLAS (meta)', meta) + kpiRow('TIEMPO POR ENTRADA', tiempo + ' s') + kpiRow('FORMATO', sistemaNom) + (torneo.reglamento ? kpiRow('REGLAMENTO', torneo.reglamento) : '') + '</div>';
    html += '<div style="background:var(--card);border:1px solid var(--borde);border-radius:20px;padding:20px;margin-bottom:12px;"><div style="font-size: 0.65rem;letter-spacing:3px;color:#555;margin-bottom:14px;">💰 PREMIOS</div>' + kpiRow('INSCRIPCIÓN', MasterVIP.formatearPesos(torneo.inscripcion || 0) + ' / JUG.') + kpiRow('APORTE CLUB', MasterVIP.formatearPesos(torneo.baseClub || 0)) + kpiRow('BOLSA TOTAL', MasterVIP.formatearPesos(bolsa)) + kpiRow('🥇 CAMPEÓN', MasterVIP.formatearPesos(Math.round(bolsa * 0.50))) + kpiRow('🥈 SEGUNDO', MasterVIP.formatearPesos(Math.round(bolsa * 0.25))) + kpiRow('🥉 TERCERO', MasterVIP.formatearPesos(Math.round(bolsa * 0.15))) + '</div>';
    html += '<div style="background:var(--card);border:1px solid var(--borde);border-radius:20px;padding:20px;margin-bottom:12px;"><div style="font-size: 0.65rem;letter-spacing:3px;color:#555;margin-bottom:10px;">📊 PROGRESO</div><div style="font-size: 0.6rem;color:#555;margin-bottom:6px;">' + completadas + ' DE ' + totalPartidas + ' PARTIDAS JUGADAS</div><div style="height:8px;background:var(--borde);border-radius:10px;overflow:hidden;"><div style="height:100%;width:' + pct + '%;background:linear-gradient(90deg,var(--oro),#ffe066);border-radius:10px;"></div></div><div style="font-size:0.38rem;color:#444;margin-top:5px;text-align:right;">' + pct + '% COMPLETADO</div></div>';
    document.getElementById('info-contenido').innerHTML = html;
}

function kpiRow(lbl, val) {
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--borde);"><span style="font-size: 0.6rem;color:#444;letter-spacing:1px;">' + lbl + '</span><span style="font-size:0.55rem;color:#ddd;">' + val + '</span></div>';
}

function abrirModalResultado(btn) {
    var pid = decodeURIComponent(btn.getAttribute('data-id') || '');
    var j1  = decodeURIComponent(btn.getAttribute('data-j1') || '');
    var j2  = decodeURIComponent(btn.getAttribute('data-j2') || '');
    var eo  = torneo.entradaObjetivo || 0;

    var overlay = document.getElementById('modal-resultado');
    if (!overlay) return;

    document.getElementById('modal-pid').value  = pid;
    document.getElementById('modal-j1').value   = j1;
    document.getElementById('modal-j2').value   = j2;
    document.getElementById('modal-nom1').textContent = j1;
    document.getElementById('modal-nom2').textContent = j2;
    document.getElementById('modal-entrada-lbl').textContent =
        eo > 0 ? 'ENTRADA OBJETIVO: ' + eo : 'ENTRADAS JUGADAS';
    document.getElementById('modal-pts1').value   = '';
    document.getElementById('modal-pts2').value   = '';
    document.getElementById('modal-ent').value    = eo > 0 ? eo : '';
    document.getElementById('modal-error').textContent = '';
    overlay.style.display = 'flex';
    document.getElementById('modal-pts1').focus();
}

function cerrarModal() {
    var overlay = document.getElementById('modal-resultado');
    if (overlay) overlay.style.display = 'none';
}

async function guardarResultado() {
    var pid  = document.getElementById('modal-pid').value;
    var j1   = document.getElementById('modal-j1').value;
    var j2   = document.getElementById('modal-j2').value;
    var pts1 = parseInt(document.getElementById('modal-pts1').value);
    var pts2 = parseInt(document.getElementById('modal-pts2').value);
    var ent  = parseInt(document.getElementById('modal-ent').value);
    var err  = document.getElementById('modal-error');

    if (isNaN(pts1) || isNaN(pts2) || pts1 < 0 || pts2 < 0) {
        err.textContent = '⚠️ Ingresa carambolas válidas para ambos jugadores.'; return;
    }
    if (pts1 === pts2) {
        err.textContent = '⚠️ No puede haber empate en billar tres bandas.'; return;
    }
    if (isNaN(ent) || ent < 1) {
        err.textContent = '⚠️ Ingresa las entradas jugadas (mínimo 1).'; return;
    }

    var ganador = pts1 > pts2 ? j1 : j2;
    var promJ1  = parseFloat((pts1 / ent).toFixed(3));
    var promJ2  = parseFloat((pts2 / ent).toFixed(3));

    var btn = document.getElementById('btn-guardar-resultado');
    btn.disabled = true;
    btn.textContent = 'GUARDANDO...';

    var res = await MasterVIP.registrarResultado(torneo.id, pid, {
        j1: j1, j2: j2,
        pts1: pts1, pts2: pts2,
        entradas1: ent, entradas2: ent,
        promFinalJ1: promJ1, promFinalJ2: promJ2,
        ganador: ganador,
        ronda: torneo.rondas ? torneo.rondas.length : 1
    });

    if (res && res.ok) {
        torneo = res.torneo;
        cerrarModal();
        cargar();
    } else {
        err.textContent = '❌ Error al guardar. Intenta de nuevo.';
        btn.disabled = false;
        btn.textContent = '✅ GUARDAR RESULTADO';
    }
}

function iniciarBtn(btn) {
    var pid = decodeURIComponent(btn.getAttribute('data-id') || '');
    var j1 = decodeURIComponent(btn.getAttribute('data-j1') || '');
    var j2 = decodeURIComponent(btn.getAttribute('data-j2') || '');
    iniciar(pid, j1, j2);
}

function iniciar(partidaId, j1, j2) {
    MasterVIP.confirmarListo(torneo.id, partidaId, j1);
    MasterVIP.confirmarListo(torneo.id, partidaId, j2);
    localStorage.setItem('PARTIDA_ACTIVA', JSON.stringify({
        torneoId: torneo.id,
        partidaId: partidaId,
        j1: j1, j2: j2,
        tiempoEntrada: torneo.tiempoEntrada || 40,
        entradaObjetivo: torneo.entradaObjetivo || 0
    }));
    location.href = '../../../duelo-tv.html';
}

function copiarLinkArbitro(partidaIdEnc) {
    var partidaId = decodeURIComponent(partidaIdEnc || '');
    if (!torneo || !torneo.id) { alert('No hay torneo activo'); return; }
    var u = new URL('../../../duelo-tv.html', window.location.href);
    u.searchParams.set('torneo', torneo.id);
    u.searchParams.set('partida', partidaId);
    u.searchParams.set('arbitro', '1');
    var url = u.href;
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(function() { alert('Link copiado. Envía el enlace al árbitro para que abra duelo en el móvil.'); }).catch(function() { prompt('Copia este enlace:', url); });
    } else {
        prompt('Copia este enlace para el árbitro:', url);
    }
}
</script>
