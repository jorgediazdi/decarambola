<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#c9a84c">
    <title>Jugadores y socios — DeCarambola</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --oro: #c9a84c;
            --fondo: #0a0a0a;
            --fondo2: #111111;
            --borde: rgba(201, 168, 76, 0.15);
            --texto: #e8e8e8;
            --texto2: #888888;
            --azul: #3498db;
        }
        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        body.dc-ux.dc-ux-skin.m-root-salon {
            background: #0a0a0a;
            color: #e8e8e8;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            visibility: hidden;
            padding-bottom: 80px;
        }
        body.dc-ux.dc-ux-skin.m-root-salon #stars-bg { display: none !important; }

        .header { width:100%; background:rgba(10,10,10,0.95); border-bottom:1px solid rgba(201,168,76,0.15); padding:14px 18px; display:flex; align-items:flex-start; justify-content:space-between; gap:12px; flex-wrap:wrap; position:sticky; top:0; z-index:20; }
        .header-titulo { font-family:'Playfair Display',serif; color:var(--oro); font-size:0.95rem; letter-spacing:0.06em; font-weight:700; }
        .header-sub { color:var(--texto2); font-size:0.62rem; letter-spacing:2px; margin-top:2px; }
        .header-actions { display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
        .btn-hdr { background:var(--fondo2); border:1px solid rgba(201,168,76,0.15); color:var(--texto2); padding:8px 12px; border-radius:12px; font-size:0.55rem; cursor:pointer; text-decoration:none; font-family:'DM Sans',sans-serif; font-weight:600; letter-spacing:0.06em; transition:border-color 0.2s,color 0.15s; }
        .btn-hdr:hover, .btn-hdr:focus-visible { border-color:rgba(201,168,76,0.4); color:var(--oro); outline:none; }

        .wrap { max-width:520px; margin:0 auto; padding:16px 18px; }

        .buscador { display:flex; align-items:center; gap:8px; background:var(--fondo2); border-radius:999px; padding:6px 10px; border:1px solid rgba(201,168,76,0.15); margin-bottom:12px; transition:border-color 0.2s; }
        .buscador:focus-within { border-color:rgba(201,168,76,0.35); }
        .buscador span { font-size:0.8rem; color:var(--texto2); }
        .buscador input { flex:1; background:transparent; border:none; outline:none; color:#fff; font-size:0.75rem; font-family:'DM Sans',sans-serif; }

        .socio-item { display:flex; align-items:center; gap:10px; background:var(--fondo2); border-radius:16px; padding:10px 12px; border:1px solid rgba(201,168,76,0.15); margin-bottom:8px; font-size:0.6rem; transition:border-color 0.2s; }
        .socio-item:hover { border-color:rgba(201,168,76,0.35); }
        .socio-avatar { width:32px; height:32px; border-radius:50%; background:#1a1a1a; display:flex; align-items:center; justify-content:center; font-size:0.75rem; color:var(--oro); font-weight:700; }
        .socio-main { flex:1; }
        .socio-nombre { font-size:0.72rem; font-weight:600; }
        .socio-sub { color:var(--texto2); font-size:0.55rem; margin-top:2px; }
        .socio-promo { color:#999; font-size:0.5rem; margin-top:2px; }
        .vacio { text-align:center; color:var(--texto2); font-size:0.62rem; padding:18px; }
    </style>
    <link rel="stylesheet" href="/css/ux-shell.css">
    <style>body.dc-ux.dc-ux-skin.m-root-salon{font-family:"DM Sans",sans-serif!important;}</style>
<link rel="stylesheet" href="/css/bottom-nav.css">
</head>
<body class="dc-ux dc-ux-skin m-root-salon">

<div class="header">
    <div>
        <div class="header-titulo">JUGADORES &amp; SOCIOS</div>
        <div class="header-sub">Miembros del club</div>
    </div>
    <div class="header-actions">
        <details class="jug-nav-fold dc-sala-nav-fold" aria-label="Menú del club">
            <summary>Menú del club</summary>
            <div class="jug-nav-fold__links">
                <a href="mesas.html">Salón en vivo</a>
                <a href="reservas_admin.html">Reservas</a>
                <a href="reportes.html">Reportes</a>
                <a href="mesas_config.html">Config. salón</a>
                <a href="tarifas_salon.html">Tarifas del salón</a>
                <a href="/club/index.html">Portal club</a>
                <a href="/index.html">Inicio app</a>
            </div>
        </details>
    </div>
</div>

<div class="wrap">
    <div class="buscador">
        <span>🔍</span>
        <input id="filtro" type="text" placeholder="Buscar por nombre o alias..." oninput="pintarSocios()">
    </div>
    <div id="lista-socios"></div>
</div>

<script src="/core.js"></script>
<script src="/session.js"></script>
<script>
let socios = [];

async function getClubId() {
    try {
        var auth = await import('/js/auth-manager.js');
        var r = await auth.getClubId();
        if (r && r.data) return r.data;
    } catch (e) {}
    try {
        var perfil = JSON.parse(localStorage.getItem('mi_perfil') || '{}');
        if (perfil.club_id) return perfil.club_id;
    } catch (e) {}
    try {
        var club = JSON.parse(localStorage.getItem('club_activo') || 'null');
        if (club && club.codigo) return club.codigo;
        if (club && club.id) return club.id;
    } catch (e) {}
    return null;
}

function iniciales(nombre) {
    if (!nombre) return '?';
    var partes = nombre.trim().split(/\s+/);
    if (partes.length === 1) return partes[0].charAt(0).toUpperCase();
    return (partes[0].charAt(0) + partes[partes.length-1].charAt(0)).toUpperCase();
}

function pintarSocios() {
    var cont = document.getElementById('lista-socios');
    if (!cont) return;
    var q = (document.getElementById('filtro').value || '').toLowerCase();
    var lista = socios.filter(function(s){
        var nom = (s.nombre || '').toLowerCase();
        var alias = (s.alias || '').toLowerCase();
        return !q || nom.indexOf(q) >= 0 || alias.indexOf(q) >= 0;
    });
    if (!lista.length) {
        cont.innerHTML = '<div class="vacio">Sin jugadores en este club.</div>';
        return;
    }
    cont.innerHTML = lista.map(function(s){
        var prom = parseFloat(s.promedio) || 0;
        var ciudad = s.ciudad || '';
        return '<div class="socio-item">' +
            '<div class="socio-avatar">' + iniciales(s.nombre) + '</div>' +
            '<div class="socio-main">' +
            '<div class="socio-nombre">' + (s.nombre || '—') + (s.alias ? ' · ' + s.alias : '') + '</div>' +
            '<div class="socio-sub">Promedio: ' + prom.toFixed(3) + (ciudad ? ' · ' + ciudad : '') + '</div>' +
            '</div>' +
            '</div>';
    }).join('');
}

async function cargarSocios() {
    var clubId = await getClubId();
    var api = await import('/js/api/club-api.js');
    var cr = await api.getClubByIdOrCodigo(clubId);
    var uuid = cr.data && cr.data.id ? cr.data.id : clubId;
    var jm = await import('/js/api/jugador-api.js');
    var jr = await jm.listJugadores(uuid, { soloActivos: true });
    socios = jr.data || [];
    socios.sort(function(a,b){ return (a.nombre || '').localeCompare(b.nombre || ''); });
    pintarSocios();
}

window.__salaBoot = function() {
    cargarSocios();
};
</script>


<script type="module">
import { guardSalaPage } from '/js/sala-supabase-gate.js';
await guardSalaPage({
    pageTitle: 'Socios del club',
    allowedRoles: ['club_admin', 'superadmin'],
});
</script>

</body>
</html>
