<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#d4af37">
    <title>Configurar sede — DeCarambola</title>
    <style>
        :root { --oro:#d4af37; --negro:#0b0b0b; --azul:#3498db; --g1:#1a1a1a; --g2:#111; --g3:#0a0a0a; }
        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        body { background:#000; color:#fff; font-family:'Arial Black',Arial,sans-serif; min-height:100vh; padding-bottom:100px; }

        .header { width:100%; background:#000; border-bottom:1px solid var(--g1); padding:14px 18px; display:flex; align-items:flex-start; justify-content:space-between; gap:12px; flex-wrap:wrap; position:sticky; top:0; z-index:50; }
        .header-titulo { color:var(--oro); font-size:0.95rem; letter-spacing:3px; }
        .header-sub { color:#444; font-size:0.5rem; letter-spacing:2px; margin-top:2px; }
        .header-actions { display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
        .btn-hdr { background:rgba(10,10,10,0.95); border:1px solid var(--g1); color:#888; padding:8px 12px; border-radius:10px; font-size:0.55rem; cursor:pointer; text-decoration:none; font-family:'Arial Black',sans-serif; font-weight:600; letter-spacing:0.06em; transition:border-color 0.15s,color 0.15s; }
        .btn-hdr:hover, .btn-hdr:focus-visible { border-color:rgba(212,175,55,0.35); color:var(--oro); outline:none; }

        .wrap { max-width:500px; margin:0 auto; padding:16px 18px; }

        .sec-titulo { color:#666; font-size:0.5rem; letter-spacing:3px; margin:16px 0 10px; }
        .campo { background:var(--g3); border:1px solid var(--g1); border-radius:14px; padding:12px 14px; margin-bottom:10px; }
        .campo label { display:block; color:#555; font-size:0.48rem; letter-spacing:2px; text-transform:uppercase; margin-bottom:6px; }
        .campo input { width:100%; background:transparent; border:none; border-bottom:1px solid var(--g1); color:#fff; font-size:1rem; padding:6px 0; outline:none; font-family:'Arial Black',sans-serif; }

        .color-chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
        .color-chip { width:36px; height:36px; border-radius:50%; border:3px solid transparent; cursor:pointer; transition:transform 0.2s, border-color 0.2s; }
        .color-chip:hover { transform:scale(1.1); }
        .color-chip.sel { border-color:#fff; box-shadow:0 0 12px currentColor; }

        .logo-area { background:var(--g2); border:2px dashed var(--oro); border-radius:18px; padding:24px; text-align:center; margin:14px 0; }
        .logo-preview { width:100px; height:100px; margin:0 auto 12px; border-radius:50%; background:var(--g3); overflow:hidden; display:flex; align-items:center; justify-content:center; }
        .logo-preview img { width:100%; height:100%; object-fit:cover; }
        .logo-preview .ph { color:#555; font-size:2rem; }
        .logo-upload-btn { display:inline-block; margin-top:8px; padding:10px 18px; background:var(--g3); border:1px solid var(--oro); border-radius:12px; color:var(--oro); font-size:0.6rem; letter-spacing:2px; cursor:pointer; }
        .logo-upload-btn:hover { background:rgba(212,175,55,0.15); }
        .logo-input { display:none; }
        .logo-url-campo { margin-top:10px; }
        .logo-url-campo input { font-size:0.75rem; }

        .btn-guardar { width:100%; padding:16px; margin-top:20px; background:linear-gradient(135deg,var(--oro),#a07800); color:#000; border:none; border-radius:16px; font-size:0.9rem; font-weight:bold; font-family:'Arial Black',sans-serif; cursor:pointer; letter-spacing:2px; }
        .btn-guardar:disabled { opacity:0.6; cursor:not-allowed; }
        .msg { text-align:center; padding:10px; border-radius:12px; font-size:0.7rem; margin-top:10px; display:none; }
        .msg.ok { display:block; background:rgba(46,255,112,0.15); color:#2eff70; border:1px solid rgba(46,255,112,0.3); }
        .msg.err { display:block; background:rgba(231,76,60,0.15); color:#e74c3c; border:1px solid rgba(231,76,60,0.3); }
        .codigo-readonly { background:var(--g2); color:#888; padding:10px 14px; border-radius:10px; font-size:0.8rem; margin-bottom:10px; }
    </style>
    <link rel="stylesheet" href="/css/ux-shell.css">
</head>
<body class="dc-ux dc-ux-skin m-root-legacy">

<div class="stars" id="stars-bg" aria-hidden="true"></div>


<div class="header">
    <div>
        <div class="header-titulo">CONFIGURAR SEDE</div>
        <div class="header-sub">Nombre · Ciudad · Color · Logo</div>
    </div>
    <div class="header-actions">
        <details class="jug-nav-fold dc-sala-nav-fold" aria-label="Menú del club">
            <summary>Menú del club</summary>
            <div class="jug-nav-fold__links">
                <a href="mesas.html">Salón en vivo</a>
                <a href="reservas_admin.html">Reservas</a>
                <a href="mesas_config.html">Config. instalaciones</a>
                <a href="/club/index.html">Portal club</a>
                <a href="/index.html">Inicio app</a>
            </div>
        </details>
    </div>
</div>

<div class="wrap">
    <div class="sec-titulo">CÓDIGO DE INVITACIÓN</div>
    <div class="codigo-readonly" id="codigo-display">—</div>

    <div class="sec-titulo">NOMBRE DEL CLUB</div>
    <div class="campo">
        <input type="text" id="inp-nombre" placeholder="Ej: Club Tres Bandas" maxlength="120">
    </div>

    <div class="sec-titulo">CIUDAD</div>
    <div class="campo">
        <input type="text" id="inp-ciudad" placeholder="Ej: Bogotá" maxlength="80">
    </div>

    <div class="sec-titulo">COLOR PRIMARIO</div>
    <div class="campo">
        <div class="color-chips" id="color-chips"></div>
    </div>

    <div class="sec-titulo">LOGO DEL CLUB</div>
    <div class="logo-area">
        <div class="logo-preview" id="logo-preview"><span class="ph">🟡</span></div>
        <div class="logo-upload-btn" onclick="document.getElementById('logo-file').click()">ELEGIR IMAGEN</div>
        <input type="file" id="logo-file" class="logo-input" accept="image/*" onchange="previewLogo(this)">
        <div class="logo-url-campo campo" style="margin-top:12px;">
            <label>O pega la URL del logo</label>
            <input type="url" id="inp-logo-url" placeholder="https://...">
        </div>
    </div>

    <button class="btn-guardar" id="btn-guardar" onclick="guardarSede()">GUARDAR CAMBIOS</button>
    <div class="msg" id="msg"></div>
</div>

<script src="/whitelabel.js"></script>
<script>
(function () {
    function soloNombreSinDigitos(el) {
        if (!el || el._dcNm) return;
        el._dcNm = true;
        el.addEventListener('input', function () {
            var v = this.value;
            var n = v.replace(/[0-9]/g, '');
            if (v !== n) this.value = n;
        });
        el.addEventListener('keydown', function (e) {
            if (e.ctrlKey || e.metaKey || e.altKey) return;
            if (e.key && e.key.length === 1 && /[0-9]/.test(e.key)) e.preventDefault();
        });
    }
    document.addEventListener('DOMContentLoaded', function () {
        soloNombreSinDigitos(document.getElementById('inp-nombre'));
        soloNombreSinDigitos(document.getElementById('inp-ciudad'));
    });
})();
window.__salaBoot = function() {
    'use strict';

    var COLORES = ['#d4af37','#3498db','#e74c3c','#2ecc71','#9b59b6','#1abc9c','#e67e22','#34495e'];

    function get(key) { try { return localStorage.getItem(key); } catch(e) { return null; } }
    function set(key, val) { try { localStorage.setItem(key, val); } catch(e) {} }
    function getObj(key) { try { var v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch(e) { return null; } }

    function getClubActivo() {
        var club = getObj('club_activo');
        if (club && (club.nombre || club.codigo)) return club;
        var clubes = getObj('mis_clubes') || [];
        return clubes.find(function(c) { return c.admin === true; }) || null;
    }

    /** Si el staff solo usó Supabase (sin club_activo), cargar fila clubs por mi_perfil.club_id.
     *  Ver docs/CANON_CLUB_ID.md: club_id suele ser clubs.codigo (texto), no siempre UUID. */
    function hidratarClubDesdeSupabase(clubId, hecho) {
        if (!clubId) { if (hecho) hecho(); return; }
        import('/js/api/club-api.js')
            .then(function (api) {
                return api.getClubByIdOrCodigo(clubId);
            })
            .then(function (r) {
                var row = r && r.data;
                if ((r && r.error) || !row) {
                    if (hecho) hecho();
                    return;
                }
                var codigo = row.codigo || '';
                var club = {
                    id: row.id,
                    nombre: row.nombre || '',
                    codigo: codigo,
                    ciudad: row.ciudad || '',
                    color: row.color_primario || '',
                    logo_url: row.logo_url || '',
                    admin: true
                };
                localStorage.setItem('club_activo', JSON.stringify(club));
                set('wl_club_id', row.id);
                if (row.nombre) set('wl_club_nombre', row.nombre);
                if (row.logo_url) set('wl_club_logo_url', row.logo_url);
                if (row.color_primario) set('wl_club_color', row.color_primario);
                if (hecho) hecho();
            })
            .catch(function () {
                if (hecho) hecho();
            });
    }

    function mostrarMsg(texto, esError) {
        var el = document.getElementById('msg');
        if (!el) return;
        el.textContent = texto;
        el.className = 'msg ' + (esError ? 'err' : 'ok');
    }

    function renderColorChips(selColor) {
        var cont = document.getElementById('color-chips');
        if (!cont) return;
        cont.innerHTML = COLORES.map(function(c) {
            var sel = (c === selColor) ? ' sel' : '';
            return '<div class="color-chip' + sel + '" data-c="' + c + '" style="background:' + c + '" onclick="elegirColor(this)"></div>';
        }).join('');
    }

    window.elegirColor = function(el) {
        document.querySelectorAll('.color-chip').forEach(function(c) { c.classList.remove('sel'); });
        el.classList.add('sel');
    };

    function getColorSeleccionado() {
        var sel = document.querySelector('.color-chip.sel');
        return sel ? sel.getAttribute('data-c') : COLORES[0];
    }

    window.previewLogo = function(input) {
        var file = input && input.files && input.files[0];
        var prev = document.getElementById('logo-preview');
        var urlInp = document.getElementById('inp-logo-url');
        if (urlInp) urlInp.value = '';
        if (!file || !prev) return;
        var reader = new FileReader();
        reader.onload = function() {
            prev.innerHTML = '<img src="' + reader.result + '" alt="Logo">';
            prev.setAttribute('data-dataurl', reader.result);
        };
        reader.readAsDataURL(file);
    };

    function cargarDatos() {
        var club = getClubActivo();
        if (!club) {
            document.getElementById('codigo-display').textContent = 'No hay club activo. Crea o únete a un club desde Inicio.';
            document.getElementById('btn-guardar').disabled = true;
            return;
        }

        document.getElementById('codigo-display').textContent = club.codigo || '—';
        document.getElementById('inp-nombre').value = club.nombre || get('wl_club_nombre') || '';
        document.getElementById('inp-ciudad').value = club.ciudad || '';
        var cfg = getObj('CLUB_CONFIG') || {};
        var color = club.color || get('wl_club_color') || cfg.color || COLORES[0];
        renderColorChips(color);

        var logoUrl = club.logo_url || get('wl_club_logo_url') || cfg.logoUrl || cfg.logo || '';
        document.getElementById('inp-logo-url').value = logoUrl && logoUrl.indexOf('http') === 0 ? logoUrl : '';
        var prev = document.getElementById('logo-preview');
        if (logoUrl) {
            if (logoUrl.indexOf('data:') === 0) {
                prev.innerHTML = '<img src="' + logoUrl + '" alt="Logo">';
                prev.setAttribute('data-dataurl', logoUrl);
            } else {
                prev.innerHTML = '<img src="' + logoUrl + '" alt="Logo" onerror="this.parentNode.innerHTML=\'<span class=ph>🟡</span>\'">';
                prev.removeAttribute('data-dataurl');
            }
        } else {
            prev.innerHTML = '<span class="ph">🟡</span>';
            prev.removeAttribute('data-dataurl');
        }
    }

    function actualizarClubLocal(nombre, ciudad, color, logoUrl) {
        var club = getClubActivo();
        if (!club) return;
        club.nombre = nombre;
        club.ciudad = ciudad;
        club.color = color;
        club.logo_url = logoUrl || club.logo_url || '';
        localStorage.setItem('club_activo', JSON.stringify(club));
        var clubes = getObj('mis_clubes') || [];
        var idx = clubes.findIndex(function(c) { return c.codigo === club.codigo; });
        if (idx >= 0) {
            clubes[idx] = club;
            localStorage.setItem('mis_clubes', JSON.stringify(clubes));
        }
        set('wl_club_nombre', nombre);
        set('wl_club_color', color);
        if (logoUrl) set('wl_club_logo_url', logoUrl);
        var cfg = getObj('CLUB_CONFIG') || {};
        cfg.color = color;
        cfg.logoUrl = logoUrl || cfg.logoUrl;
        cfg.logo = logoUrl || cfg.logo;
        localStorage.setItem('CLUB_CONFIG', JSON.stringify(cfg));
        if (window.WL && window.WL.setClub) {
            window.WL.setClub({ id: club.id, nombre: nombre, logo_url: logoUrl || club.logo_url, color_primario: color });
        }
        var perfil = getObj('mi_perfil') || {};
        perfil.club = nombre;
        perfil.club_logo_url = logoUrl || perfil.club_logo_url;
        localStorage.setItem('mi_perfil', JSON.stringify(perfil));
    }

    window.guardarSede = function() {
        var nombre = (document.getElementById('inp-nombre').value || '').trim();
        var ciudad = (document.getElementById('inp-ciudad').value || '').trim();
        var color = getColorSeleccionado();
        var logoUrlInp = (document.getElementById('inp-logo-url').value || '').trim();
        var prev = document.getElementById('logo-preview');
        var dataUrl = prev && prev.getAttribute('data-dataurl');
        var logoUrl = logoUrlInp || dataUrl || '';

        if (!nombre) {
            mostrarMsg('Escribe el nombre del club.', true);
            return;
        }

        var club = getClubActivo();
        if (!club) {
            mostrarMsg('No hay club activo.', true);
            return;
        }

        var btn = document.getElementById('btn-guardar');
        btn.disabled = true;
        mostrarMsg('Guardando…', false);

        actualizarClubLocal(nombre, ciudad, color, logoUrl || undefined);

        var id = club.id;
        var codigo = club.codigo;
        var payload = {
            nombre: nombre,
            ciudad: ciudad || null,
            color_primario: color,
            logo_url: logoUrl || null,
            activo: true
        };

        function onSuccess() {
            mostrarMsg('✅ Cambios guardados. El código de invitación y el whitelabel se actualizarán.', false);
            btn.disabled = false;
            cargarDatos();
        }
        function onError(err) {
            mostrarMsg('Guardado local correcto. Error al sincronizar con la nube: ' + (err || 'revisa conexión'), true);
            btn.disabled = false;
        }

        import('/js/api/club-api.js').then(function (api) {
            if (id) {
                api.patchClub(id, payload).then(function (r) {
                    if (r.error) {
                        onError(r.error.message || String(r.error));
                        return;
                    }
                    onSuccess();
                });
            } else {
                payload.codigo = codigo || ('CLB-' + Math.floor(Math.random() * 900 + 100));
                api.insertClub(payload).then(function (r) {
                    if (r.error) {
                        onError(r.error.message || String(r.error));
                        return;
                    }
                    var fila = r.data;
                    if (fila && fila.id) {
                        club.id = fila.id;
                        localStorage.setItem('club_activo', JSON.stringify(club));
                        var clubes = getObj('mis_clubes') || [];
                        var i = clubes.findIndex(function(c) { return c.codigo === club.codigo; });
                        if (i >= 0) { clubes[i] = club; localStorage.setItem('mis_clubes', JSON.stringify(clubes)); }
                        set('wl_club_id', fila.id);
                        if (window.WL && window.WL.setClub) {
                            window.WL.setClub({ id: fila.id, nombre: nombre, logo_url: logoUrl || null, color_primario: color });
                        }
                        onSuccess();
                    } else {
                        onError('No se devolvió id del club');
                    }
                });
            }
        }).catch(onError);
    };

    document.getElementById('inp-logo-url').addEventListener('change', function() {
        var url = (this.value || '').trim();
        var prev = document.getElementById('logo-preview');
        if (!prev) return;
        if (url) {
            prev.removeAttribute('data-dataurl');
            prev.innerHTML = '<img src="' + url + '" alt="Logo" onerror="this.parentNode.innerHTML=\'<span class=ph>🟡</span>\'">';
        } else if (!prev.getAttribute('data-dataurl')) {
            prev.innerHTML = '<span class="ph">🟡</span>';
        }
    });

    // Prioridad: club del staff en Supabase (mi_perfil.club_id, sincronizado por el gate).
    // Así no queda un club_activo viejo de la app jugador (ej. otro billar).
    var perfilBoot = getObj('mi_perfil') || {};
    var cidStaff = (perfilBoot.club_id && String(perfilBoot.club_id).trim()) || '';
    if (!cidStaff && get('wl_club_id')) {
        cidStaff = String(get('wl_club_id')).trim();
    }
    if (cidStaff) {
        hidratarClubDesdeSupabase(cidStaff, cargarDatos);
    } else if (getClubActivo()) {
        cargarDatos();
    } else {
        cargarDatos();
    }
};
</script>


<script>
(function () {
    var bg = document.getElementById('stars-bg');
    if (!bg) return;
    for (var i = 0; i < 80; i++) {
        var s = document.createElement('div');
        s.className = 'star';
        var sz = Math.random() * 2 + 0.5;
        s.style.cssText = 'width:' + sz + 'px;height:' + sz + 'px;top:' + Math.random() * 100 + '%;left:' + Math.random() * 100 + '%;animation-delay:' + Math.random() * 3 + 's;animation-duration:' + (2 + Math.random() * 3) + 's;';
        bg.appendChild(s);
    }
})();
</script>
<script type="module">
import { guardSalaPage } from '/js/sala-supabase-gate.js';
await guardSalaPage({ pageTitle: 'Configurar sede' });
</script>

</body>
</html>
