<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#d4af37">
    <title>Llaves — DeCarambola</title>
    <meta http-equiv="refresh" content="2;url=control_torneo.html?vista=cuadro">
    <link rel="stylesheet" href="css/ux-shell.css">
    <style>
        :root { --oro:#d4af37; }
        .hdr-llaves { width:100%; background:#000; border-bottom:1px solid #1a1a1a; padding:14px 18px; position:sticky; top:0; z-index:50; display:flex; flex-direction:column; align-items:stretch; gap:10px; }
        .hdr-llaves-top { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
        .hdr-llaves-top h1 { color:var(--oro); font-size:0.95rem; letter-spacing:3px; font-family:'Arial Black',Arial,sans-serif; margin:0; }
        .hdr-llaves-sub { color:#555; font-size:0.5rem; letter-spacing:1px; font-family:'Arial Black',Arial,sans-serif; }
        .header-actions { display:flex; flex-direction:column; align-items:flex-end; gap:6px; width:100%; }
        .btn-hdr {
            background:rgba(10,10,10,0.95); border:1px solid #1a1a1a; color:#888;
            padding:8px 12px; border-radius:10px; font-size:0.52rem; cursor:pointer;
            text-decoration:none; font-family:'Arial Black',sans-serif; font-weight:600;
            letter-spacing:0.06em; transition:border-color 0.15s,color 0.15s;
        }
        .btn-hdr:hover, .btn-hdr:focus-visible { border-color:rgba(212,175,55,0.35); color:var(--oro); outline:none; }
        body.dc-ux-skin.m-root-legacy .dc-ux-layer { color:#9a9a9a; font-family:'Arial Black',Arial,sans-serif; }
        body.dc-ux-skin.m-root-legacy .dc-ux-layer .sp { margin-top:20px; }
        body.dc-ux-skin.m-root-legacy .dc-ux-layer a { color:#d4af37; }
    </style>
    <script>
        (function() {
            var vista = new URLSearchParams(window.location.search).get('vista') || 'cuadro';
            window.location.replace('control_torneo.html?vista=' + vista);
        })();
    </script>
</head>
<body class="dc-ux dc-ux-skin m-root-legacy">
<div class="stars" id="stars-bg" aria-hidden="true"></div>

<header class="hdr-llaves" role="banner">
    <div class="hdr-llaves-top">
        <div>
            <h1>🔀 LLAVES</h1>
            <p class="hdr-llaves-sub">Redirigiendo al cuadro del torneo…</p>
        </div>
    </div>
    <div class="header-actions">
        <a href="organizador.html" class="btn-hdr">Panel organizador</a>
        <a href="torneos.html" class="btn-hdr">Torneos</a>
        <a href="control_torneo.html?vista=cuadro" class="btn-hdr">Control (cuadro)</a>
        <a href="inscripciones.html" class="btn-hdr">Inscripciones</a>
        <a href="Certificados.html" class="btn-hdr">Certificados</a>
        <a href="club/index.html" class="btn-hdr">Portal club</a>
        <a href="index.html" class="btn-hdr">Inicio app</a>
    </div>
</header>

<div class="dc-ux-layer" style="padding:24px 20px;text-align:center;">
    <p>Redirigiendo a llaves del torneo…</p>
    <p class="sp">Si no carga, <a href="control_torneo.html?vista=cuadro">entra aquí a ver el cuadro</a>.</p>
</div>

<script>
(function () {
    var bg = document.getElementById('stars-bg');
    if (!bg) return;
    for (var i = 0; i < 80; i++) {
        var s = document.createElement('div');
        s.className = 'star';
        var sz = Math.random() * 2 + 0.5;
        s.style.cssText = 'width:' + sz + 'px;height:' + sz + 'px;top:' + Math.random() * 100 + '%;left:' + Math.random() * 100 + '%;animation-delay:' + Math.random() * 3 + 's;animation-duration:' + (2 + Math.random() * 3) + 's;';
        bg.appendChild(s);
    }
})();
</script>
</body>
</html>
