<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#d4af37">
    <title>Jugadores y socios — DeCarambola</title>
    <style>
        :root { --oro:#d4af37; --negro:#000; --g1:#1a1a1a; --g2:#111; --azul:#3498db; }
        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        body { background:#000; color:#fff; font-family:'Arial Black',Arial,sans-serif; min-height:100vh; padding-bottom:80px; }

        .header { width:100%; background:#000; border-bottom:1px solid var(--g1); padding:14px 18px; display:flex; align-items:flex-start; justify-content:space-between; gap:12px; flex-wrap:wrap; position:sticky; top:0; z-index:20; }
        .header-titulo { color:var(--oro); font-size:0.85rem; letter-spacing:3px; }
        .header-sub { color:#444; font-size:0.5rem; letter-spacing:2px; margin-top:2px; }
        .header-actions { display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
        .btn-hdr { background:rgba(10,10,10,0.95); border:1px solid var(--g1); color:#888; padding:8px 12px; border-radius:10px; font-size:0.55rem; cursor:pointer; text-decoration:none; font-family:'Arial Black',sans-serif; font-weight:600; letter-spacing:0.06em; transition:border-color 0.15s,color 0.15s; }
        .btn-hdr:hover, .btn-hdr:focus-visible { border-color:rgba(212,175,55,0.35); color:var(--oro); outline:none; }

        .wrap { max-width:520px; margin:0 auto; padding:16px 18px; }

        .buscador { display:flex; align-items:center; gap:8px; background:#050505; border-radius:999px; padding:6px 10px; border:1px solid var(--g1); margin-bottom:12px; }
        .buscador span { font-size:0.8rem; color:#555; }
        .buscador input { flex:1; background:transparent; border:none; outline:none; color:#fff; font-size:0.7rem; font-family:'Arial Black',sans-serif; }

        .socio-item { display:flex; align-items:center; gap:10px; background:var(--g2); border-radius:14px; padding:10px 12px; border:1px solid var(--g1); margin-bottom:8px; font-size:0.6rem; }
        .socio-avatar { width:32px; height:32px; border-radius:50%; background:#111; display:flex; align-items:center; justify-content:center; font-size:0.75rem; }
        .socio-main { flex:1; }
        .socio-nombre { font-size:0.7rem; }
        .socio-sub { color:#777; font-size:0.55rem; margin-top:2px; }
        .socio-promo { color:#999; font-size:0.5rem; margin-top:2px; }
        .vacio { text-align:center; color:#444; font-size:0.6rem; padding:18px; }
    </style>
    <link rel="stylesheet" href="css/ux-shell.css">
    <style>body.dc-ux.dc-ux-skin.m-root-salon{font-family:'Arial Black',Arial,sans-serif!important;}</style>
</head>
<body class="dc-ux dc-ux-skin m-root-salon">
<div class="stars" id="stars-bg" aria-hidden="true"></div>


<div class="header">
    <div>
        <div class="header-titulo">JUGADORES &amp; SOCIOS</div>
        <div class="header-sub">Miembros del club</div>
    </div>
    <div class="header-actions">
        <details class="jug-nav-fold dc-sala-nav-fold" aria-label="Menú del club">
            <summary>Menú del club</summary>
            <div class="jug-nav-fold__links">
                <a href="mesas.html">Salón en vivo</a>
                <a href="reservas_admin.html">Reservas</a>
                <a href="reportes.html">Reportes</a>
                <a href="mesas_config.html">Config. salón</a>
                <a href="apps/club/sala/tarifas_salon.html">Tarifas del salón</a>
                <a href="club/index.html">Portal club</a>
                <a href="index.html">Inicio app</a>
            </div>
        </details>
    </div>
</div>

<div class="wrap">
    <div class="buscador">
        <span>🔍</span>
        <input id="filtro" type="text" placeholder="Buscar por nombre o alias..." oninput="pintarSocios()">
    </div>
    <div id="lista-socios"></div>
</div>

<script src="core.js"></script>
<script src="session.js"></script>
<script>
let socios = [];

function getClubId() {
    if (typeof MasterVIP !== 'undefined' && MasterVIP.getClubId) return MasterVIP.getClubId();
    var perfil = JSON.parse(localStorage.getItem('mi_perfil') || '{}');
    return perfil.club_id || null;
}

function iniciales(nombre) {
    if (!nombre) return '?';
    var partes = nombre.trim().split(/\s+/);
    if (partes.length === 1) return partes[0].charAt(0).toUpperCase();
    return (partes[0].charAt(0) + partes[partes.length-1].charAt(0)).toUpperCase();
}

function pintarSocios() {
    var cont = document.getElementById('lista-socios');
    if (!cont) return;
    var q = (document.getElementById('filtro').value || '').toLowerCase();
    var lista = socios.filter(function(s){
        var nom = (s.nombre || '').toLowerCase();
        var alias = (s.alias || '').toLowerCase();
        return !q || nom.indexOf(q) >= 0 || alias.indexOf(q) >= 0;
    });
    if (!lista.length) {
        cont.innerHTML = '<div class="vacio">Sin jugadores en este club.</div>';
        return;
    }
    cont.innerHTML = lista.map(function(s){
        var prom = parseFloat(s.promedio) || 0;
        var ciudad = s.ciudad || '';
        return '<div class="socio-item">' +
            '<div class="socio-avatar">' + iniciales(s.nombre) + '</div>' +
            '<div class="socio-main">' +
            '<div class="socio-nombre">' + (s.nombre || '—') + (s.alias ? ' · ' + s.alias : '') + '</div>' +
            '<div class="socio-sub">Promedio: ' + prom.toFixed(3) + (ciudad ? ' · ' + ciudad : '') + '</div>' +
            '</div>' +
            '</div>';
    }).join('');
}

async function cargarSocios() {
    var clubId = getClubId();
    var jm = await import('./js/api/jugador-api.js');
    var jr = await jm.listJugadores(clubId, { soloActivos: true });
    socios = jr.data || [];
    socios.sort(function(a,b){ return (a.nombre || '').localeCompare(b.nombre || ''); });
    pintarSocios();
}

window.onload = function() {
    try { SESSION.verificarAlCargar('organizador'); SESSION.iniciar('organizador'); } catch(e) {}
    cargarSocios();
};
</script>


<script>
(function () {
    var bg = document.getElementById('stars-bg');
    if (!bg) return;
    for (var i = 0; i < 80; i++) {
        var s = document.createElement('div');
        s.className = 'star';
        var sz = Math.random() * 2 + 0.5;
        s.style.cssText = 'width:' + sz + 'px;height:' + sz + 'px;top:' + Math.random() * 100 + '%;left:' + Math.random() * 100 + '%;animation-delay:' + Math.random() * 3 + 's;animation-duration:' + (2 + Math.random() * 3) + 's;';
        bg.appendChild(s);
    }
})();
</script>
</body>
</html>
