<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inscripciones — DeCarambola</title>
    <style>
        :root { --oro:#d4af37; --negro:#0b0b0b; --neon:#2eff70; --azul:#3498db; --rojo:#e74c3c; --g1:#1a1a1a; --g2:#111; --g3:#0a0a0a; }
        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        body { background:var(--negro); color:#fff; font-family:'Arial Black',Arial,sans-serif; min-height:100vh; }

        /* HEADER */
        .header { width:100%; background:#000; border-bottom:1px solid var(--g1); padding:16px 18px; position:sticky; top:0; z-index:50; }
        .header-top { display:flex; justify-content:space-between; align-items:center; }
        .header h1 { color:var(--oro); font-size:1.1rem; letter-spacing:3px; }
        .header small { color:#333; font-size:0.48rem; letter-spacing:2px; margin-top:4px; display:block; }
        .cupo-badge {
            background:rgba(46,255,112,0.1);
            border:1px solid rgba(46,255,112,0.3);
            color:var(--neon);
            padding:6px 14px;
            border-radius:12px;
            font-size:0.55rem;
            font-family:'Courier New',monospace;
        }
        .cupo-badge.lleno {
            background:rgba(231,76,60,0.1);
            border-color:rgba(231,76,60,0.3);
            color:var(--rojo);
        }

        /* CONTENIDO */
        .contenido { padding:20px 15px 140px; max-width:500px; margin:0 auto; }

        /* TORNEO INFO */
        .torneo-info {
            background:linear-gradient(135deg, #1a1200, #0a0800);
            border:1px solid rgba(212,175,55,0.3);
            border-radius:18px;
            padding:18px;
            margin-bottom:20px;
            text-align:center;
        }
        .torneo-nombre { color:var(--oro); font-size:0.9rem; letter-spacing:2px; margin-bottom:6px; }
        .torneo-detalles { color:#555; font-size:0.45rem; letter-spacing:1px; }

        /* FORMULARIO */
        .form-card {
            background:var(--g3);
            border:1px solid var(--g1);
            border-radius:20px;
            padding:20px;
            margin-bottom:20px;
        }
        .form-titulo {
            font-size:0.55rem;
            color:var(--oro);
            letter-spacing:2px;
            margin-bottom:16px;
            display:flex;
            align-items:center;
            gap:8px;
        }
        .form-grupo { margin-bottom:14px; }
        .form-label {
            font-size:0.45rem;
            color:#555;
            letter-spacing:1px;
            margin-bottom:6px;
            display:block;
        }
        .form-input {
            width:100%;
            background:var(--g2);
            border:1px solid var(--g1);
            border-radius:12px;
            padding:14px 16px;
            color:#fff;
            font-size:0.8rem;
            font-family:'Arial Black',sans-serif;
            outline:none;
        }
        .form-input:focus { border-color:var(--oro); }
        .form-input::placeholder { color:#333; }
        .form-input.small { font-size:0.7rem; }

        .form-row {
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:10px;
        }

        .btn-inscribir {
            width:100%;
            padding:16px;
            background:var(--neon);
            color:#000;
            border:none;
            border-radius:14px;
            font-size:0.65rem;
            font-family:'Arial Black',sans-serif;
            letter-spacing:2px;
            cursor:pointer;
            transition:0.15s;
            margin-top:6px;
        }
        .btn-inscribir:active { transform:scale(0.97); }
        .btn-inscribir:disabled {
            background:#1a1a1a;
            color:#333;
            cursor:not-allowed;
        }

        /* BUSCAR JUGADOR */
        .buscar-section {
            background:var(--g3);
            border:1px solid var(--g1);
            border-radius:16px;
            padding:16px;
            margin-bottom:20px;
        }
        .buscar-titulo {
            font-size:0.5rem;
            color:#555;
            letter-spacing:2px;
            margin-bottom:12px;
        }
        .buscar-input {
            width:100%;
            background:var(--g2);
            border:1px solid var(--g1);
            border-radius:12px;
            padding:12px 16px;
            color:#fff;
            font-size:0.75rem;
            font-family:'Arial Black',sans-serif;
            outline:none;
        }
        .buscar-input:focus { border-color:var(--azul); }
        .sugerencias {
            margin-top:10px;
            max-height:150px;
            overflow-y:auto;
        }
        .sugerencia-item {
            background:var(--g2);
            border:1px solid var(--g1);
            border-radius:10px;
            padding:10px 14px;
            margin-bottom:6px;
            display:flex;
            align-items:center;
            gap:10px;
            cursor:pointer;
            transition:0.15s;
        }
        .sugerencia-item:active { border-color:var(--neon); }
        .sug-avatar {
            width:32px; height:32px;
            border-radius:50%;
            background:var(--g1);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:0.5rem;
            color:#555;
            font-weight:900;
        }
        .sug-info { flex:1; }
        .sug-nombre { font-size:0.6rem; color:#ddd; }
        .sug-prom { font-size:0.45rem; color:#555; font-family:'Courier New',monospace; }
        .sug-add { color:var(--neon); font-size:1rem; }

        /* LISTA INSCRITOS */
        .inscritos-section { margin-top:25px; }
        .inscritos-header {
            display:flex;
            align-items:center;
            justify-content:space-between;
            margin-bottom:14px;
        }
        .inscritos-titulo {
            font-size:0.55rem;
            color:#555;
            letter-spacing:2px;
        }
        .inscritos-count {
            font-size:0.5rem;
            color:var(--neon);
            font-family:'Courier New',monospace;
        }

        .inscrito-card {
            background:var(--g3);
            border:1px solid var(--g1);
            border-radius:14px;
            padding:12px 14px;
            margin-bottom:8px;
            display:flex;
            align-items:center;
            gap:12px;
        }
        .inscrito-pos {
            width:28px; height:28px;
            border-radius:50%;
            background:var(--g2);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:0.55rem;
            color:#444;
            font-weight:900;
        }
        .inscrito-avatar {
            width:38px; height:38px;
            border-radius:50%;
            background:linear-gradient(135deg,#1a1a00,#2a2000);
            border:1px solid rgba(212,175,55,0.25);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:0.55rem;
            color:#664;
            font-weight:900;
        }
        .inscrito-info { flex:1; min-width:0; }
        .inscrito-nombre {
            font-size:0.7rem;
            color:#ddd;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }
        .inscrito-id {
            font-size:0.4rem;
            color:#444;
            font-family:'Courier New',monospace;
            margin-top:2px;
        }
        .inscrito-prom {
            font-size:0.8rem;
            color:var(--neon);
            font-family:'Courier New',monospace;
        }
        .inscrito-quitar {
            width:28px; height:28px;
            border-radius:50%;
            background:rgba(231,76,60,0.1);
            border:1px solid rgba(231,76,60,0.3);
            color:var(--rojo);
            font-size:0.8rem;
            cursor:pointer;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .inscrito-quitar:active { background:rgba(231,76,60,0.2); }

        /* ACCIONES TORNEO */
        .acciones-torneo {
            margin-top:25px;
            padding-top:20px;
            border-top:1px solid var(--g1);
        }
        .btn-sorteo {
            width:100%;
            padding:18px;
            background:var(--oro);
            color:#000;
            border:none;
            border-radius:16px;
            font-size:0.7rem;
            font-family:'Arial Black',sans-serif;
            letter-spacing:2px;
            cursor:pointer;
            transition:0.15s;
            margin-bottom:10px;
        }
        .btn-sorteo:active { transform:scale(0.97); }
        .btn-sorteo:disabled {
            background:#1a1a1a;
            color:#333;
            cursor:not-allowed;
        }
        .btn-secundario {
            width:100%;
            padding:14px;
            background:var(--g3);
            color:#666;
            border:1px solid var(--g1);
            border-radius:14px;
            font-size:0.55rem;
            font-family:'Arial Black',sans-serif;
            letter-spacing:1px;
            cursor:pointer;
        }
        .btn-secundario:active { border-color:var(--oro); color:var(--oro); }

        /* EMPTY */
        .empty {
            text-align:center;
            padding:40px 20px;
            color:#333;
        }
        .empty-icon { font-size:2.5rem; margin-bottom:12px; }
        .empty-txt { font-size:0.55rem; line-height:1.8; }

        /* NAV BOTTOM UNIFICADO */
        .nav-bottom {
            position:fixed; bottom:0; left:0; right:0;
            background:linear-gradient(transparent, #000 40%);
            padding:10px 15px 20px;
            display:flex; gap:8px;
        }
        .btn-nav {
            flex:1; padding:13px 8px;
            background:#0f0f0f; border:1px solid #1a1a1a;
            border-radius:14px; color:#777;
            font-size:0.48rem; cursor:pointer;
            text-align:center; text-decoration:none;
            display:block; transition:0.2s;
            font-family:'Arial Black',sans-serif;
            letter-spacing:1px;
        }
        .btn-nav:active { border-color:var(--oro); color:var(--oro); }
        .btn-nav.activo { border-color:var(--oro); color:var(--oro); background:rgba(212,175,55,0.1); }

        /* TABS */
        .tabs {
            display:flex;
            gap:8px;
            margin-bottom:20px;
        }
        .tab-btn {
            flex:1;
            padding:12px;
            background:var(--g3);
            border:1px solid var(--g1);
            border-radius:12px;
            color:#555;
            font-size:0.5rem;
            font-family:'Arial Black',sans-serif;
            letter-spacing:1px;
            cursor:pointer;
            text-align:center;
            transition:0.15s;
        }
        .tab-btn.activo {
            background:rgba(212,175,55,0.1);
            border-color:var(--oro);
            color:var(--oro);
        }
        select.form-input { cursor:pointer; }
        .inp-wrap { position:relative; }
        .btn-ver  { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:#555; cursor:pointer; font-size:1rem; padding:4px; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-top">
        <div>
            <h1>🎫 INSCRIPCIONES</h1>
            <small id="lbl-torneo">SELECCIONA UN TORNEO</small>
        </div>
        <div class="cupo-badge" id="cupo-badge">0 / 0</div>
    </div>
</div>

<div class="contenido">

    <!-- INFO TORNEO ACTIVO -->
    <div class="torneo-info" id="torneo-panel" style="display:none;">
        <div class="torneo-nombre" id="torneo-nombre">—</div>
        <div class="torneo-detalles" id="torneo-detalles">—</div>
    </div>

    <!-- TABS -->
    <div class="tabs">
        <button class="tab-btn activo" id="tab-nuevo" onclick="cambiarTab('nuevo')">➕ NUEVO</button>
        <button class="tab-btn" id="tab-existente" onclick="cambiarTab('existente')">🔍 BUSCAR</button>
    </div>

    <!-- TAB: INSCRIBIR NUEVO -->
    <div id="panel-nuevo">
        <div class="form-card">
            <div class="form-titulo">➕ INSCRIBIR JUGADOR NUEVO</div>
            
            <div class="form-grupo">
                <label class="form-label">NOMBRE COMPLETO *</label>
                <input type="text" class="form-input" id="inp-nombre" placeholder="Ej: JUAN PÉREZ" oninput="this.value=this.value.toUpperCase()">
            </div>

            <div class="form-row">
                <div class="form-grupo">
                    <label class="form-label">TIPO DOCUMENTO</label>
                    <select class="form-input small" id="inp-tipo-doc">
                        <option value="CC">C.C. CÉDULA</option>
                        <option value="PA">PASAPORTE</option>
                        <option value="CE">CÉD. EXTRAN.</option>
                    </select>
                </div>
                <div class="form-grupo">
                    <label class="form-label">N° DOCUMENTO *</label>
                    <input type="text" class="form-input small" id="inp-documento" placeholder="123456789" oninput="this.value=this.value.replace(/[^0-9A-Za-z]/g,'').toUpperCase()">
                </div>
            </div>

            <div class="form-grupo">
                <label class="form-label">CLAVE DEL JUGADOR * <span style="color:#555;font-size:0.48rem;font-weight:normal;">(mín. 4 dígitos)</span></label>
                <div class="inp-wrap">
                    <input type="password" class="form-input" id="inp-clave" placeholder="Ej: 1234" maxlength="8" style="padding-right:44px;letter-spacing:4px;">
                    <button type="button" class="btn-ver" onclick="toggleClave()">&#128065;</button>
                </div>
            </div>

            <div class="form-row">
                <div class="form-grupo">
                    <label class="form-label">PROMEDIO</label>
                    <input type="number" step="0.001" class="form-input small" id="inp-promedio" placeholder="0.500">
                </div>
                <div class="form-grupo">
                    <label class="form-label">WHATSAPP *</label>
                    <input type="tel" class="form-input small" id="inp-whatsapp" placeholder="3001234567">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-grupo">
                    <label class="form-label">CLUB</label>
                    <input type="text" class="form-input small" id="inp-club" placeholder="Club...">
                </div>
                <div class="form-grupo">
                    <label class="form-label">CIUDAD</label>
                    <input type="text" class="form-input small" id="inp-ciudad" placeholder="Ciudad...">
                </div>
            </div>
            
            <button class="btn-inscribir" id="btn-inscribir" onclick="inscribirNuevo()">
                🎫 INSCRIBIR JUGADOR
            </button>
        </div>
    </div>

    <!-- TAB: BUSCAR EXISTENTE -->
    <div id="panel-existente" style="display:none;">
        <div class="buscar-section">
            <div class="buscar-titulo">🔍 BUSCAR JUGADOR REGISTRADO</div>
            <input type="text" class="buscar-input" id="inp-buscar" placeholder="Escribe el nombre..." oninput="buscarJugador()">
            <div class="sugerencias" id="sugerencias"></div>
        </div>
    </div>

    <!-- LISTA DE INSCRITOS -->
    <div class="inscritos-section">
        <div class="inscritos-header">
            <span class="inscritos-titulo">📋 JUGADORES INSCRITOS</span>
            <span class="inscritos-count" id="inscritos-count">0 jugadores</span>
        </div>
        <div id="lista-inscritos">
            <div class="empty">
                <div class="empty-icon">🎱</div>
                <div class="empty-txt">No hay jugadores inscritos aún.<br>Inscribe al primero arriba.</div>
            </div>
        </div>
    </div>

    <!-- ACCIONES -->
    <div class="acciones-torneo" id="acciones-torneo" style="display:none;">
        <button class="btn-sorteo" id="btn-sorteo" onclick="realizarSorteo()">
            🎲 CERRAR INSCRIPCIONES Y SORTEAR
        </button>
        <button class="btn-secundario" onclick="location.href='Brackets.html'">
            🏅 VER LLAVES
        </button>
    </div>

</div>

<!-- NAV BOTTOM UNIFICADO -->
<div class="nav-bottom">
    <a href="index.html" class="btn-nav">🏠 INICIO</a>
    <a href="torneo_crear.html" class="btn-nav">🏆 TORNEO</a>
    <a href="inscripciones.html" class="btn-nav activo">🎫 INSCRIBIR</a>
    <a href="Brackets.html" class="btn-nav">🏅 LLAVES</a>
</div>

<script src="core.js"></script>
<script>
var torneo = null;
var tabActual = 'nuevo';

window.onload = function() {
    MasterVIP.applyDesign();
    cargar();
};

function cargar() {
    torneo = MasterVIP.getTorneoActivo();
    
    if (!torneo) {
        document.getElementById('lbl-torneo').innerText = 'NO HAY TORNEO ACTIVO';
        document.getElementById('btn-inscribir').disabled = true;
        return;
    }
    
    document.getElementById('lbl-torneo').innerText = torneo.nombre;
    document.getElementById('torneo-panel').style.display = 'block';
    document.getElementById('torneo-nombre').innerText = torneo.nombre;
    document.getElementById('torneo-detalles').innerText = 
        torneo.modalidad + ' · ' + torneo.codigo + ' · Inscripción: ' + MasterVIP.formatearPesos(torneo.inscripcion || 0);
    
    actualizarCupo();
    renderInscritos();
    cargarDatalist();
}

function actualizarCupo() {
    var inscritos = (torneo.inscritos || []).length;
    var cupo = torneo.cupoMax || 16;
    var badge = document.getElementById('cupo-badge');
    badge.innerText = inscritos + ' / ' + cupo;
    
    if (inscritos >= cupo) {
        badge.classList.add('lleno');
        document.getElementById('btn-inscribir').disabled = true;
    } else {
        badge.classList.remove('lleno');
        document.getElementById('btn-inscribir').disabled = false;
    }
    
    document.getElementById('inscritos-count').innerText = inscritos + ' jugadores';
    
    // Mostrar acciones si hay inscritos
    if (inscritos >= 2) {
        document.getElementById('acciones-torneo').style.display = 'block';
    }
}

function cambiarTab(tab) {
    tabActual = tab;
    document.getElementById('tab-nuevo').classList.remove('activo');
    document.getElementById('tab-existente').classList.remove('activo');
    document.getElementById('tab-' + tab).classList.add('activo');
    
    document.getElementById('panel-nuevo').style.display = tab === 'nuevo' ? 'block' : 'none';
    document.getElementById('panel-existente').style.display = tab === 'existente' ? 'block' : 'none';
}

function cargarDatalist() {
    // Para el buscador
}

function buscarJugador() {
    var texto = document.getElementById('inp-buscar').value.trim().toUpperCase();
    var contenedor = document.getElementById('sugerencias');
    
    if (texto.length < 2) {
        contenedor.innerHTML = '';
        return;
    }
    
    var jugadores = MasterVIP.getJugadores();
    var encontrados = [];
    
    for (var i = 0; i < jugadores.length; i++) {
        if (jugadores[i].nombre.toUpperCase().indexOf(texto) >= 0) {
            encontrados.push(jugadores[i]);
        }
    }
    
    if (encontrados.length === 0) {
        contenedor.innerHTML = '<div style="color:#333;font-size:0.5rem;padding:10px;text-align:center;">No encontrado</div>';
        return;
    }
    
    var html = '';
    for (var j = 0; j < encontrados.length && j < 5; j++) {
        var jug = encontrados[j];
        var inicial = jug.nombre.trim()[0].toUpperCase();
        html += '<div class="sugerencia-item" onclick="inscribirExistente(\'' + jug.nombre.replace(/'/g, "\\'") + '\')">' +
            '<div class="sug-avatar">' + inicial + '</div>' +
            '<div class="sug-info">' +
            '<div class="sug-nombre">' + jug.nombre + '</div>' +
            '<div class="sug-prom">' + (jug.promedio || 0).toFixed(3) + ' · ' + (jug.club || 'Sin club') + '</div>' +
            '</div>' +
            '<span class="sug-add">+</span>' +
            '</div>';
    }
    
    contenedor.innerHTML = html;
}

function toggleClave() {
    var inp = document.getElementById('inp-clave');
    inp.type = inp.type === 'password' ? 'text' : 'password';
}

function inscribirNuevo() {
    var nombre    = document.getElementById('inp-nombre').value.trim().toUpperCase();
    var tipoDoc   = document.getElementById('inp-tipo-doc').value;
    var documento = document.getElementById('inp-documento').value.trim().toUpperCase();
    var clave     = document.getElementById('inp-clave').value.trim();
    var promedio  = parseFloat(document.getElementById('inp-promedio').value) || 0;
    var whatsapp  = document.getElementById('inp-whatsapp').value.trim();
    var club      = document.getElementById('inp-club').value.trim();
    var ciudad    = document.getElementById('inp-ciudad').value.trim();

    if (!nombre)                    { alert('Ingresa el nombre del jugador.'); return; }
    if (!documento)                 { alert('El numero de documento es obligatorio.'); return; }
    if (!clave || clave.length < 4) { alert('La clave debe tener minimo 4 caracteres.'); return; }
    if (!whatsapp)                  { alert('El WhatsApp es obligatorio para torneos.'); return; }

    // ID basado en documento — evita duplicados
    var id = tipoDoc + '-' + documento;

    // Guardar jugador en la plataforma
    MasterVIP.guardarJugador({
        nombre: nombre,
        tipoDoc: tipoDoc,
        documento: documento,
        promedio: promedio,
        tel: whatsapp,
        club: club,
        ciudad: ciudad,
        id: id,
        pin: clave
    });
    
    // Inscribir en torneo
    var resultado = MasterVIP.inscribirJugador(torneo.id, {
        nombre: nombre,
        tipoDoc: tipoDoc,
        documento: documento,
        promedio: promedio,
        club: club,
        ciudad: ciudad,
        tel: whatsapp,
        id: id
    });
    
    if (resultado.ok) {
        // Limpiar formulario
        document.getElementById('inp-nombre').value = '';
        document.getElementById('inp-documento').value = '';
        document.getElementById('inp-clave').value = '';
        document.getElementById('inp-promedio').value = '';
        document.getElementById('inp-whatsapp').value = '';
        document.getElementById('inp-club').value = '';
        document.getElementById('inp-ciudad').value = '';
        
        // Recargar
        torneo = MasterVIP.getTorneoActivo();
        actualizarCupo();
        renderInscritos();
    } else {
        alert(resultado.msg);
    }
}

function inscribirExistente(nombre) {
    var jugador = MasterVIP.buscarJugador(nombre);
    
    if (!jugador) {
        alert('Jugador no encontrado');
        return;
    }
    
    var resultado = MasterVIP.inscribirJugador(torneo.id, jugador);
    
    if (resultado.ok) {
        document.getElementById('inp-buscar').value = '';
        document.getElementById('sugerencias').innerHTML = '';
        
        torneo = MasterVIP.getTorneoActivo();
        actualizarCupo();
        renderInscritos();
    } else {
        alert(resultado.msg);
    }
}

function renderInscritos() {
    var inscritos = torneo.inscritos || [];
    var contenedor = document.getElementById('lista-inscritos');
    
    if (inscritos.length === 0) {
        contenedor.innerHTML = '<div class="empty">' +
            '<div class="empty-icon">🎱</div>' +
            '<div class="empty-txt">No hay jugadores inscritos aún.<br>Inscribe al primero arriba.</div>' +
            '</div>';
        return;
    }
    
    var html = '';
    for (var i = 0; i < inscritos.length; i++) {
        var jug = inscritos[i];
        var inicial = jug.nombre ? jug.nombre.trim()[0].toUpperCase() : '?';
        var prom = parseFloat(jug.promedio || 0).toFixed(3);
        var id = jug.id || 'DC-' + (i + 1);
        
        html += '<div class="inscrito-card">' +
            '<div class="inscrito-pos">' + (i + 1) + '</div>' +
            '<div class="inscrito-avatar">' + inicial + '</div>' +
            '<div class="inscrito-info">' +
            '<div class="inscrito-nombre">' + jug.nombre + '</div>' +
            '<div class="inscrito-id">ID: ' + id + '</div>' +
            '</div>' +
            '<div class="inscrito-prom">' + prom + '</div>' +
            '<button class="inscrito-quitar" onclick="quitarInscrito(\'' + jug.nombre.replace(/'/g, "\\'") + '\')">×</button>' +
            '</div>';
    }
    
    contenedor.innerHTML = html;
}

function quitarInscrito(nombre) {
    if (!confirm('¿Quitar a ' + nombre + ' del torneo?')) return;
    
    var inscritos = torneo.inscritos || [];
    var nuevos = [];
    
    for (var i = 0; i < inscritos.length; i++) {
        if (inscritos[i].nombre !== nombre) {
            nuevos.push(inscritos[i]);
        }
    }
    
    torneo.inscritos = nuevos;
    MasterVIP.actualizarTorneo(torneo);
    
    actualizarCupo();
    renderInscritos();
}

function realizarSorteo() {
    var inscritos = (torneo.inscritos || []).length;
    
    if (inscritos < 2) {
        alert('Se necesitan al menos 2 jugadores para el sorteo');
        return;
    }
    
    if (!confirm('¿Cerrar inscripciones y realizar el sorteo?\n\nJugadores: ' + inscritos)) return;
    
    var resultado = MasterVIP.realizarSorteo(torneo.id);
    
    if (resultado.ok) {
        alert('¡Sorteo realizado!\nEl torneo está en curso.');
        location.href = 'Brackets.html';
    } else {
        alert('Error: ' + resultado.msg);
    }
}
</script>
</body>
</html>
