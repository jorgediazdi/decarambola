<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control de Torneo — DeCarambola</title>
    <style>
        :root {
            --oro:#d4af37; --negro:#0b0b0b; --neon:#2eff70; --azul:#3498db; --rojo:#e74c3c;
            --g1:#1a1a1a; --g2:#111; --g3:#0a0a0a;
        }
        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        body {
            background:var(--negro);
            color:#fff;
            font-family:'Arial Black',Arial,sans-serif;
            min-height:100vh;
        }

        /* HEADER */
        .header {
            width:100%;
            background:#000;
            border-bottom:1px solid var(--g1);
            padding:16px 18px 14px;
            position:sticky;
            top:0;
            z-index:50;
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:10px;
        }
        .hdr-main {
            display:flex;
            align-items:center;
            gap:10px;
        }
        .hdr-logo {
            width:46px; height:46px;
            border-radius:50%;
            background:#111;
            border:1px solid #222;
            display:flex;
            align-items:center;
            justify-content:center;
            overflow:hidden;
            flex-shrink:0;
        }
        .hdr-txt h1 {
            font-size:0.9rem;
            letter-spacing:3px;
            color:var(--oro);
        }
        .hdr-txt small {
            display:block;
            margin-top:3px;
            font-size:0.55rem;
            letter-spacing:2px;
            color:#444;
        }
        .hdr-pill {
            font-size:0.5rem;
            padding:6px 10px;
            border-radius:999px;
            border:1px solid #222;
            color:#777;
            letter-spacing:1px;
            white-space:nowrap;
        }
        .hdr-pill.en-curso {
            border-color:rgba(52,152,219,0.5);
            color:var(--azul);
            background:rgba(52,152,219,0.1);
        }
        .hdr-pill.abierto {
            border-color:rgba(46,255,112,0.5);
            color:var(--neon);
            background:rgba(46,255,112,0.08);
        }
        .hdr-pill.finalizado {
            border-color:#333;
            color:#555;
            background:#050505;
        }

        .wrap {
            padding:18px 15px 120px;
            max-width:520px;
            margin:0 auto;
        }

        .resumen-card {
            background:var(--g3);
            border:1px solid var(--g1);
            border-radius:18px;
            padding:16px 16px 14px;
            margin-bottom:18px;
        }
        .resumen-top {
            display:flex;
            align-items:flex-start;
            justify-content:space-between;
            gap:12px;
            margin-bottom:8px;
        }
        .resumen-nombre {
            font-size:0.8rem;
            color:var(--oro);
            letter-spacing:1px;
        }
        .resumen-det {
            font-size:0.55rem;
            color:#666;
            letter-spacing:1px;
            margin-top:4px;
        }
        .resumen-tags {
            display:flex;
            flex-direction:column;
            gap:6px;
            align-items:flex-end;
        }
        .tag-mini {
            font-size:0.5rem;
            color:#777;
            letter-spacing:1px;
        }
        .tag-mini strong {
            color:#ddd;
        }

        .subtit {
            font-size:0.6rem;
            color:#555;
            letter-spacing:2px;
            margin:18px 0 8px;
            border-left:3px solid var(--g1);
            padding-left:10px;
        }

        /* LISTA DE PARTIDAS */
        .lista-partidas {
            display:flex;
            flex-direction:column;
            gap:10px;
        }
        .partida-card {
            background:var(--g3);
            border:1px solid var(--g1);
            border-radius:16px;
            padding:12px 12px 10px;
        }
        .partida-card.en-curso {
            border-color:rgba(52,152,219,0.5);
            box-shadow:0 0 15px rgba(52,152,219,0.2);
        }
        .partida-card.proxima {
            border-color:rgba(212,175,55,0.6);
        }
        .partida-card.finalizada {
            border-color:#222;
        }
        .partida-top {
            display:flex;
            align-items:center;
            justify-content:space-between;
            margin-bottom:6px;
        }
        .partida-ronda {
            font-size:0.55rem;
            color:#777;
            letter-spacing:1px;
        }
        .partida-mesa {
            font-size:0.55rem;
            color:var(--oro);
            letter-spacing:2px;
        }
        .partida-jugadores {
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:6px;
            margin-bottom:4px;
        }
        .jugador {
            flex:1;
            font-size:0.7rem;
            color:#ddd;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }
        .versus {
            font-size:0.7rem;
            color:#555;
        }
        .partida-det {
            display:flex;
            align-items:center;
            justify-content:space-between;
            font-size:0.5rem;
            color:#666;
        }
        .partida-det span b {
            color:#ccc;
        }

        .acciones {
            display:flex;
            gap:8px;
            margin-top:8px;
        }
        .btn {
            flex:1;
            padding:8px 6px;
            border-radius:12px;
            border:1px solid #1f1f1f;
            background:#111;
            color:#777;
            font-size:0.55rem;
            font-family:'Arial Black',sans-serif;
            letter-spacing:1px;
            text-align:center;
            cursor:pointer;
        }
        .btn.primary {
            background:var(--azul);
            color:#000;
            border-color:var(--azul);
        }
        .btn.secondary {
            background:#111;
            color:#aaa;
        }
        .btn:active {
            transform:scale(0.97);
        }
        .btn[disabled] {
            opacity:0.5;
            cursor:not-allowed;
        }

        /* EMPTY STATE */
        .empty {
            text-align:center;
            padding:40px 18px 26px;
            border-radius:18px;
            background:var(--g3);
            border:1px solid var(--g1);
            margin-top:6px;
        }
        .empty-icon {
            font-size:2.4rem;
            margin-bottom:10px;
        }
        .empty-title {
            font-size:0.7rem;
            color:#ddd;
            margin-bottom:6px;
        }
        .empty-text {
            font-size:0.6rem;
            color:#666;
            line-height:1.7;
        }
        .empty-actions {
            margin-top:14px;
            display:flex;
            flex-direction:column;
            gap:8px;
        }
        .empty-btn {
            padding:11px 10px;
            border-radius:12px;
            border:1px solid var(--g1);
            background:#111;
            color:#aaa;
            font-size:0.6rem;
            font-family:'Arial Black',sans-serif;
            letter-spacing:1px;
            text-decoration:none;
            display:block;
        }
        .empty-btn.primary {
            background:var(--oro);
            border-color:var(--oro);
            color:#000;
        }

        /* EMPTY CUANDO NO HAY TORNEO */
        .empty-main {
            padding:40px 18px 0;
            text-align:center;
            color:#444;
            font-size:0.65rem;
        }

        /* NAV BOTTOM */
        .nav-bottom {
            position:fixed;
            bottom:0; left:0; right:0;
            background:linear-gradient(transparent,#000 40%);
            padding:10px 15px 20px;
            display:flex;
            gap:8px;
        }
        .btn-nav {
            flex:1;
            padding:13px 8px;
            background:#0f0f0f;
            border:1px solid #1a1a1a;
            border-radius:14px;
            color:#777;
            font-size:0.6rem;
            text-align:center;
            text-decoration:none;
            font-family:'Arial Black',sans-serif;
            letter-spacing:1px;
        }
        .btn-nav:active { border-color:var(--oro); color:var(--oro); }
        .btn-nav.activo { border-color:var(--oro); color:var(--oro); background:rgba(212,175,55,0.12); }
    </style>
</head>
<body>

<div class="header" id="hdr">
    <div class="hdr-main">
        <div class="hdr-logo" id="hdr-logo"></div>
        <div class="hdr-txt">
            <h1>CONTROL TORNEO</h1>
            <small id="hdr-sub">Cargando torneo...</small>
        </div>
    </div>
    <div class="hdr-pill" id="hdr-estado">—</div>
</div>

<div class="wrap" id="wrap">
    <div id="sin-torneo" class="empty-main" style="display:none;">
        <div style="font-size:2.2rem;margin-bottom:10px;">🏆</div>
        NO HAY UN TORNEO ACTIVO SELECCIONADO.<br>
        Entra primero a <strong>TORNEOS</strong> o <strong>INSCRIPCIONES</strong> y elige uno.
    </div>

    <div id="panel-torneo" style="display:none;">
        <div class="resumen-card">
            <div class="resumen-top">
                <div>
                    <div class="resumen-nombre" id="tor-nombre">—</div>
                    <div class="resumen-det" id="tor-det">—</div>
                </div>
                <div class="resumen-tags">
                    <div class="tag-mini" id="tor-cupo">0 / 0 JUGADORES</div>
                    <div class="tag-mini" id="tor-meta">META —</div>
                </div>
            </div>
        </div>

        <div class="subtit">PARTIDAS EN CURSO</div>
        <div id="lista-curso" class="lista-partidas"></div>

        <div class="subtit">PRÓXIMAS PARTIDAS</div>
        <div id="lista-proximas" class="lista-partidas"></div>

        <div class="subtit">PARTIDAS FINALIZADAS (HOY)</div>
        <div id="lista-finalizadas" class="lista-partidas"></div>
    </div>
</div>

<div class="nav-bottom">
    <a href="index.html" class="btn-nav">🏠 INICIO</a>
    <a href="torneos.html" class="btn-nav">🏆 TORNEOS</a>
    <a href="inscripciones.html" class="btn-nav">🎫 INSCRIBIR</a>
    <a href="control_torneo.html" class="btn-nav activo">🎮 CONTROL</a>
</div>

<script src="core.js"></script>
<script>
var torneo = null;
var partidas = {
    enCurso: [],
    proximas: [],
    finalizadas: []
};
var esOrganizador = false;
var jugadorActivo = null;

window.onload = async function () {
    try { await MasterVIP.init(); } catch(e) { console.warn('Init offline:', e); }

    // Detectar si viene como organizador (club) o como jugador
    try {
        SESSION.verificarAlCargar('organizador');
        esOrganizador = true;
    } catch(e) {
        esOrganizador = false;
        try {
            SESSION.verificarAlCargar('jugador');
        } catch(e2) {
            console.warn('control_torneo: modo lectura sin sesión clara');
        }
    }

    try { MasterVIP.applyDesign(); } catch(e) {}

    try {
        jugadorActivo = JSON.parse(localStorage.getItem('jugador_activo') || 'null');
    } catch(e) {
        jugadorActivo = null;
    }

    var logoEl = document.getElementById('hdr-logo');
    if (logoEl && typeof MasterVIP !== 'undefined' && MasterVIP.getLogoHTML) {
        logoEl.innerHTML = MasterVIP.getLogoHTML(40);
    }

    cargarTorneoActivo();
    if (torneo) {
        actualizarResumen();
        await cargarPartidas();
        renderListas();
    }
};

function cargarTorneoActivo() {
    try {
        torneo = MasterVIP.getTorneoActivo();
    } catch(e) {
        torneo = null;
    }

    var sin = document.getElementById('sin-torneo');
    var panel = document.getElementById('panel-torneo');
    if (!torneo) {
        sin.style.display = 'block';
        panel.style.display = 'none';
        document.getElementById('hdr-sub').innerText = 'Sin torneo activo';
        document.getElementById('hdr-estado').innerText = '—';
        return;
    }

    sin.style.display = 'none';
    panel.style.display = 'block';
}

function actualizarResumen() {
    if (!torneo) return;
    var nombre = torneo.nombre || 'TORNEO SIN NOMBRE';
    var modalidad = torneo.modalidad || 'Modalidad no definida';
    var codigo = torneo.codigo || '';
    var ciudad = torneo.ciudad || '';
    var sede = torneo.sede || torneo.club_id || '';

    document.getElementById('tor-nombre').innerText = nombre;
    var det = modalidad;
    if (codigo) det += ' · ' + codigo;
    if (ciudad || sede) det += ' · ' + (sede || '') + (ciudad ? (' · ' + ciudad) : '');
    document.getElementById('tor-det').innerText = det;

    var inscritos = (torneo.inscritos || []).length;
    var cupo = torneo.cupoMax || torneo.cupo_max || 0;
    document.getElementById('tor-cupo').innerText =
        inscritos + ' / ' + (cupo || '∞') + ' JUGADORES';

    var meta = torneo.entradaObjetivo || torneo.meta || torneo.entrada_objetivo || null;
    document.getElementById('tor-meta').innerText =
        meta ? ('META ' + meta + ' CARAMBOLAS') : 'META NO DEFINIDA';

    var estado = (torneo.estado || 'ABIERTO').toUpperCase();
    var pill = document.getElementById('hdr-estado');
    pill.className = 'hdr-pill';
    if (estado === 'ABIERTO') pill.classList.add('abierto');
    else if (estado === 'EN_CURSO') pill.classList.add('en-curso');
    else if (estado === 'FINALIZADO') pill.classList.add('finalizado');
    pill.innerText = estado === 'EN_CURSO' ? 'EN CURSO' : estado;

    var esAmigos = (!!torneo.tipo && String(torneo.tipo).toUpperCase() === 'AMIGOS')
        || (torneo.reglamento && String(torneo.reglamento).indexOf('ORIGEN:AMIGOS') >= 0);
    if (esAmigos && !esOrganizador) {
        document.getElementById('hdr-sub').innerText = 'Torneo entre amigos';
    } else {
        document.getElementById('hdr-sub').innerText = nombre;
    }
}

async function cargarPartidas() {
    partidas = { enCurso: [], proximas: [], finalizadas: [] };
    if (!torneo) return;

    try {
        if (MasterVIP.getPartidasTorneo) {
            var listado = await MasterVIP.getPartidasTorneo(torneo.id);
            if (Array.isArray(listado)) {
                listado.forEach(function(p) {
                    var estado = (p.estado || '').toUpperCase();
                    if (estado === 'EN_CURSO') partidas.enCurso.push(p);
                    else if (estado === 'FINALIZADA') partidas.finalizadas.push(p);
                    else partidas.proximas.push(p);
                });
                return;
            }
        }
    } catch(e) {
        console.warn('cargarPartidas: usando vacío/offline', e);
    }
}

function renderListas() {
    renderGrupo('lista-curso', partidas.enCurso, 'EN_CURSO');
    renderGrupo('lista-proximas', partidas.proximas, 'PROXIMA');
    renderGrupo('lista-finalizadas', partidas.finalizadas, 'FINALIZADA');
}

function renderGrupo(idCont, lista, tipo) {
    var cont = document.getElementById(idCont);
    if (!cont) return;

    if (!lista || !lista.length) {
        // Mensajes específicos por grupo — sin spinner infinito
        var msg, icon;
        if (idCont === 'lista-curso') {
            icon = '⌛';
            msg = 'No hay partidas en curso en este momento.';
        } else if (idCont === 'lista-proximas') {
            icon = '📋';
            msg = 'Aún no se han programado las próximas partidas.';
        } else {
            icon = '📁';
            msg = 'Todavía no hay resultados finalizados para hoy.';
        }
        cont.innerHTML =
            '<div class="empty">' +
                '<div class="empty-icon">' + icon + '</div>' +
                '<div class="empty-title">' + textoTituloGrupo(idCont) + '</div>' +
                '<div class="empty-text">' + msg + '</div>' +
                (idCont === 'lista-curso'
                    ? '<div class="empty-actions">' +
                        '<a href="Brackets.html" class="empty-btn primary">🏅 VER LLAVES / CUADRO</a>' +
                        '<a href="inscripciones.html" class="empty-btn">🎫 GESTIONAR INSCRIPCIONES</a>' +
                      '</div>'
                    : '') +
            '</div>';
        return;
    }

    var html = '';
    lista.forEach(function(p) {
        html += tarjetaPartidaHTML(p, tipo);
    });
    cont.innerHTML = html;
}

function textoTituloGrupo(idCont) {
    if (idCont === 'lista-curso') return 'SIN PARTIDAS EN CURSO';
    if (idCont === 'lista-proximas') return 'SIN PRÓXIMAS PARTIDAS';
    return 'SIN PARTIDAS FINALIZADAS';
}

function tarjetaPartidaHTML(p, tipo) {
    var cls = 'partida-card';
    if (tipo === 'EN_CURSO') cls += ' en-curso';
    else if (tipo === 'PROXIMA') cls += ' proxima';
    else if (tipo === 'FINALIZADA') cls += ' finalizada';

    var ronda = p.ronda || p.fase || 'RONDA';
    var mesa = p.mesa || p.mesaNumero || '—';
    var j1 = p.jugador1 || p.j1 || 'JUGADOR A';
    var j2 = p.jugador2 || p.j2 || 'JUGADOR B';
    var hora = p.hora || p.hora_programada || '';
    var marcador = '';
    if (p.puntos1 != null && p.puntos2 != null) {
        marcador = (p.puntos1 + ' - ' + p.puntos2);
    }

    var metaTexto = '';
    if (p.meta) metaTexto = 'META ' + p.meta;

    return '' +
        '<div class="' + cls + '">' +
            '<div class="partida-top">' +
                '<div class="partida-ronda">' + ronda + '</div>' +
                '<div class="partida-mesa">MESA ' + mesa + '</div>' +
            '</div>' +
            '<div class="partida-jugadores">' +
                '<div class="jugador">' + j1 + '</div>' +
                '<div class="versus">VS</div>' +
                '<div class="jugador" style="text-align:right;">' + j2 + '</div>' +
            '</div>' +
            '<div class="partida-det">' +
                '<span>⏱ <b>' + (hora || 'HORA POR DEFINIR') + '</b></span>' +
                '<span>' + (metaTexto || '') + (marcador ? ' · ' + marcador : '') + '</span>' +
            '</div>' +
            '<div class="acciones">' +
                '<button class="btn primary" type="button" onclick="abrirDuelo(' + JSON.stringify(p.id || '') + ',' + JSON.stringify(mesa) + ')">🎮 ABRIR MARCADOR</button>' +
                '<button class="btn secondary" type="button" onclick="verDetalleBrackets()">🏅 VER CUADRO</button>' +
            '</div>' +
        '</div>';
}

function abrirDuelo(partidaId, mesa) {
    try {
        if (partidaId) localStorage.setItem('PARTIDA_ACTIVA_ID', String(partidaId));
        if (mesa) localStorage.setItem('MESA_ACTIVA_NUMERO', String(mesa));
    } catch(e) {}
    location.href = 'duelo.html';
}

function verDetalleBrackets() {
    location.href = 'Brackets.html';
}
</script>
</body>
</html>
