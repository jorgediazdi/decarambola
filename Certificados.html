<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Certificado — DeCarambola</title>
        <style>
        :root { --oro:#d4af37; --negro:#0b0b0b; --neon:#2eff70; --rojo:#e74c3c; --azul:#3498db; --g1:#1a1a1a; --g2:#111111; --g3:#0f0f0f; }
    </style>
    <style>
        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        body { background:var(--negro); color:#fff; font-family:'Arial Black',Arial,sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; }

        .header { width:100%; background:#000; border-bottom:1px solid #1a1a1a; padding:14px 18px; display:flex; align-items:center; justify-content:space-between; }
        .header h1 { color:var(--oro); font-size:0.9rem; letter-spacing:3px; }
        .btn-hdr { background:none; border:1px solid #1a1a1a; color:#444; padding:7px 14px; border-radius:10px; font-size:0.55rem; cursor:pointer; font-family:'Arial Black',sans-serif; text-decoration:none; display:inline-block; }

        .wrap { width:95vw; max-width:520px; padding:16px 0 120px; }

        /* CONTROLES */
        .ctrl-card { background:#0a0a0a; border:1px solid #1a1a1a; border-radius:14px; padding:12px 14px; margin-bottom:10px; }
        .ctrl-label { color:#333; font-size:0.42rem; letter-spacing:2px; margin-bottom:7px; }
        .ctrl-select { width:100%; background:#111; border:1px solid #1a1a1a; color:#fff; padding:10px 12px; border-radius:10px; font-size:0.65rem; font-family:'Arial Black',sans-serif; outline:none; }

        .tabs { display:flex; gap:0; background:#0a0a0a; border:1px solid #1a1a1a; border-radius:12px; overflow:hidden; margin-bottom:12px; }
        .tab { flex:1; padding:10px 4px; background:none; border:none; color:#333; font-size:0.42rem; font-family:'Arial Black',sans-serif; letter-spacing:1px; cursor:pointer; transition:0.2s; text-align:center; }
        .tab.activa { background:var(--oro); color:#000; }

        /* PREVIEW DEL CERTIFICADO */
        .cert-preview { background:#0a0a0a; border:1px solid #1a1a1a; border-radius:16px; padding:14px; margin-bottom:12px; display:flex; flex-direction:column; align-items:center; }
        canvas { border-radius:8px; max-width:100%; display:block; }
        .cert-empty { text-align:center; padding:40px 20px; color:#222; font-size:0.55rem; letter-spacing:2px; line-height:2.5; }

        .div-jugador { display:none; }

        /* BOTONES */
        .btns-wrap { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
        .btn-action { padding:14px 10px; border:none; border-radius:14px; font-size:0.6rem; font-family:'Arial Black',sans-serif; cursor:pointer; letter-spacing:1px; transition:0.15s; text-align:center; display:block; text-decoration:none; }
        .btn-action:active { transform:scale(0.97); }
        .btn-oro { background:var(--oro); color:#000; }
        .btn-wa  { background:#25D366; color:#fff; }
        .btn-ghost { width:100%; background:#0a0a0a; border:1px solid #1a1a1a; color:#444; padding:12px; border-radius:12px; font-size:0.55rem; font-family:'Arial Black',sans-serif; cursor:pointer; margin-bottom:4px; }

        .nav-bottom { position:fixed; bottom:0; left:0; right:0; background:linear-gradient(transparent,#000 40%); padding:10px 15px 20px; display:flex; gap:8px; }
        .btn-nav { flex:1; padding:13px 8px; background:#0f0f0f; border:1px solid #1a1a1a; border-radius:14px; color:#777; font-size:0.45rem; cursor:pointer; text-align:center; text-decoration:none; display:block; font-family:'Arial Black',sans-serif; letter-spacing:1px; }
        .btn-nav:active { border-color:var(--oro); color:var(--oro); }
    </style>
</head>
<body>

<div class="header">
    <h1>🏆 CERTIFICADO</h1>
    <a href="index.html" class="btn-hdr">← INICIO</a>
</div>

<div class="wrap">

    <div class="ctrl-card">
        <div class="ctrl-label">TORNEO</div>
        <select class="ctrl-select" id="sel-torneo" onchange="cargarTorneo()">
            <option value="">— Selecciona un torneo —</option>
        </select>
    </div>

    <div class="tabs">
        <button class="tab activa" id="tab-campeon" onclick="cambiarTipo('campeon')">🥇 CAMPEÓN</button>
        <button class="tab"        id="tab-segundo" onclick="cambiarTipo('segundo')">🥈 SUBCAMPEÓN</button>
        <button class="tab"        id="tab-part"    onclick="cambiarTipo('part')">🎱 PARTICIPACIÓN</button>
    </div>

    <div class="div-jugador ctrl-card" id="div-jugador">
        <div class="ctrl-label">JUGADOR</div>
        <select class="ctrl-select" id="sel-jugador" onchange="dibujar()">
            <option value="">— Selecciona —</option>
        </select>
    </div>

    <div class="cert-preview">
        <div class="cert-empty" id="cert-empty">🎱<br>Selecciona un torneo<br>para generar el certificado</div>
        <canvas id="cert-canvas" style="display:none;"></canvas>
    </div>

    <div class="btns-wrap">
        <button class="btn-action btn-oro" onclick="descargar()">⬇ DESCARGAR PNG</button>
        <button class="btn-action btn-wa"  onclick="compartirWA()">📲 WHATSAPP</button>
    </div>
    <button class="btn-ghost" onclick="dibujar()">🔄 REGENERAR</button>

</div>

<div class="nav-bottom">
    <a href="index.html"          class="btn-nav">🏠 INICIO</a>
    <a href="control_torneo.html" class="btn-nav">⚙️ CONTROL</a>
    <a href="ranking.html"        class="btn-nav">📈 RANKING</a>
</div>

<script src="core.js"></script>
<script>

var torneoActual = null;
var tipoActual   = 'campeon';

/* ═══════════════════════
   UTILIDADES LOCALES
═══════════════════════ */
function formatPesos(n) {
    return '$ ' + Number(Math.round(n)).toLocaleString('es-CO');
}

function getCategoria(p) {
    p = parseFloat(p);
    if (p >= 1.100) return { nombre:'CLASE ELITE', color:'#f1c40f', emoji:'🏆' };
    if (p >= 0.900) return { nombre:'MAESTRO',     color:'#d4af37', emoji:'⭐' };
    if (p >= 0.700) return { nombre:'PRIMERA',     color:'#c0c0c0', emoji:'🥇' };
    if (p >= 0.500) return { nombre:'SEGUNDA',     color:'#cd7f32', emoji:'🥈' };
    if (p >= 0.350) return { nombre:'TERCERA',     color:'#3498db', emoji:'🥉' };
    return { nombre:'INICIACION', color:'#555', emoji:'🎱' };
}

function bolsa(t) {
    if (!t) return 0;
    return Math.round(((t.inscritos||[]).length*(t.inscripcion||0)+(t.baseClub||0))*((t.pctPremios||80)/100));
}

/* ═══════════════════════
   INIT
═══════════════════════ */
window.onload = function() {
    MasterVIP.applyDesign();
    poblarSelector();
    var act = MasterVIP.getTorneoActivo();
    if (act) {
        document.getElementById('sel-torneo').value = act.id;
        cargarTorneo();
    }
};

function poblarSelector() {
    var torneos = MasterVIP.getTorneos();
    var sel = document.getElementById('sel-torneo');
    for (var i = 0; i < torneos.length; i++) {
        var opt = document.createElement('option');
        opt.value = torneos[i].id;
        opt.text  = torneos[i].nombre + '  [' + torneos[i].estado + ']';
        sel.appendChild(opt);
    }
}

function cargarTorneo() {
    var id = document.getElementById('sel-torneo').value;
    torneoActual = null;
    if (!id) { limpiar(); return; }
    var torneos = MasterVIP.getTorneos();
    for (var i = 0; i < torneos.length; i++) {
        if (torneos[i].id === id) { torneoActual = torneos[i]; break; }
    }
    poblarJugadores();
    dibujar();
}

function poblarJugadores() {
    if (!torneoActual) return;
    var sel = document.getElementById('sel-jugador');
    sel.innerHTML = '<option value="">— Selecciona —</option>';
    var ins = torneoActual.inscritos || [];
    for (var i = 0; i < ins.length; i++) {
        var opt = document.createElement('option');
        opt.value = ins[i].nombre;
        opt.text  = ins[i].nombre;
        sel.appendChild(opt);
    }
}

function cambiarTipo(t) {
    tipoActual = t;
    document.getElementById('tab-campeon').className = 'tab' + (t==='campeon'?' activa':'');
    document.getElementById('tab-segundo').className = 'tab' + (t==='segundo'?' activa':'');
    document.getElementById('tab-part').className    = 'tab' + (t==='part'   ?' activa':'');
    document.getElementById('div-jugador').style.display = t==='part' ? 'block' : 'none';
    dibujar();
}

function limpiar() {
    document.getElementById('cert-empty').style.display  = 'block';
    document.getElementById('cert-canvas').style.display = 'none';
}

/* ═══════════════════════════════════════════════
   DIBUJAR CERTIFICADO
═══════════════════════════════════════════════ */
function dibujar() {
    if (!torneoActual) { limpiar(); return; }

    var nombre = getNombre();
    var canvas = document.getElementById('cert-canvas');
    var ctx    = canvas.getContext('2d');

    var W = 1000, H = 700;
    canvas.width  = W;
    canvas.height = H;
    document.getElementById('cert-empty').style.display  = 'none';
    document.getElementById('cert-canvas').style.display = 'block';

    var d        = MasterVIP.getDesign();
    // Nombre del club desde whitelabel (fuente correcta) — getSede() está obsoleto
    var clubNom  = localStorage.getItem('wl_club_nombre') || 'DeCarambola';
    var colorOro = localStorage.getItem('wl_club_color') || d.color || '#d4af37';
    var colorVerde = d.colorNeon || '#2eff70';
    var fecha    = torneoActual.fechaFin
        ? new Date(torneoActual.fechaFin).toLocaleDateString('es-CO')
        : new Date().toLocaleDateString('es-CO');
    var cat = nombre ? getCategoria(getPromedio(nombre)) : null;

    /* ─── FONDO ─── */
    var bgGrad = ctx.createRadialGradient(W*0.5, H*0.35, 0, W*0.5, H*0.5, W*0.7);
    bgGrad.addColorStop(0,   '#1a1200');
    bgGrad.addColorStop(0.4, '#0d0b00');
    bgGrad.addColorStop(1,   '#050400');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    /* ─── TEXTURA PAÑO (líneas diagonales sutiles) ─── */
    ctx.save();
    ctx.globalAlpha = 0.03;
    ctx.strokeStyle = colorOro;
    ctx.lineWidth   = 1;
    for (var x = -H; x < W + H; x += 28) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x + H, H); ctx.stroke();
    }
    ctx.restore();

    /* ─── MARCO DOBLE ─── */
    // exterior
    ctx.strokeStyle = colorOro;
    ctx.lineWidth   = 4;
    rrect(ctx, 18, 18, W-36, H-36, 12);
    ctx.stroke();
    // interior delgado
    ctx.strokeStyle = 'rgba(212,175,55,0.3)';
    ctx.lineWidth   = 1.5;
    rrect(ctx, 32, 32, W-64, H-64, 8);
    ctx.stroke();

    /* ─── ORNAMENTOS ESQUINAS ─── */
    var corners = [[44,44],[W-44,44],[44,H-44],[W-44,H-44]];
    for (var ci = 0; ci < corners.length; ci++) {
        drawCornerFlourish(ctx, corners[ci][0], corners[ci][1], colorOro, ci);
    }

    /* ─── BANDA DORADA SUPERIOR ─── */
    var bandGrad = ctx.createLinearGradient(0, 44, 0, 100);
    bandGrad.addColorStop(0,   'rgba(212,175,55,0.25)');
    bandGrad.addColorStop(0.5, 'rgba(212,175,55,0.08)');
    bandGrad.addColorStop(1,   'rgba(212,175,55,0)');
    ctx.fillStyle = bandGrad;
    ctx.fillRect(44, 44, W-88, 56);

    /* ─── NOMBRE DEL CLUB + LOGO ─── */
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.font         = 'bold 15px Arial';
    ctx.fillStyle    = 'rgba(212,175,55,0.85)';
    ctx.letterSpacing = '4px';

    // Dibujar logo si existe, sino solo texto
    var logoUrl = d.logo || localStorage.getItem('wl_club_logo_url') || null;
    if (logoUrl) {
        var logoImg = new Image();
        logoImg.crossOrigin = 'anonymous';
        logoImg.onload = function() {
            var lSize = 40, lX = W/2 - 120, lY = 52;
            ctx.save();
            ctx.beginPath();
            ctx.arc(lX, lY, lSize/2, 0, Math.PI*2);
            ctx.closePath();
            ctx.clip();
            ctx.drawImage(logoImg, lX - lSize/2, lY - lSize/2, lSize, lSize);
            ctx.restore();
            ctx.fillText(clubNom.toUpperCase(), W/2 + 10, 72);
        };
        logoImg.onerror = function() { ctx.fillText(clubNom.toUpperCase(), W/2, 72); };
        logoImg.src = logoUrl;
    } else {
        // Sin logo: emoji del club a la izquierda del nombre
        ctx.font = '20px Arial';
        ctx.fillText(d.emoji || '🎱', W/2 - 110, 72);
        ctx.font = 'bold 15px Arial';
        ctx.fillStyle = 'rgba(212,175,55,0.85)';
        ctx.fillText(clubNom.toUpperCase(), W/2 + 10, 72);
    }

    /* ─── LÍNEA DIVISORA SUPERIOR ─── */
    lineGrad(ctx, 80, 95, W-80, 95, colorOro);

    /* ─── ICONO CENTRAL GRANDE ─── */
    var iconY = 175;
    if (tipoActual === 'campeon') {
        // Bola 3D grande
        drawBola3D(ctx, W/2, iconY, 62, colorOro);
        // Trofeo superpuesto
        ctx.font = '52px Arial';
        ctx.globalAlpha = 0.9;
        ctx.fillText('🏆', W/2 + 85, iconY - 10);
        ctx.globalAlpha = 1;
    } else if (tipoActual === 'segundo') {
        drawBola3D(ctx, W/2, iconY, 62, '#c0c0c0');
        ctx.font = '52px Arial';
        ctx.globalAlpha = 0.9;
        ctx.fillText('🥈', W/2 + 85, iconY - 10);
        ctx.globalAlpha = 1;
    } else {
        drawBola3D(ctx, W/2, iconY, 52, d.colorAzul || '#3498db');
        ctx.font = '44px Arial';
        ctx.fillText('🎱', W/2 + 80, iconY - 5);
    }

    /* ─── "CERTIFICA QUE" ─── */
    ctx.font      = '14px Arial';
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillText(tipoActual === 'part' ? 'CERTIFICA LA PARTICIPACIÓN DE' : 'CERTIFICA QUE', W/2, 258);

    /* ─── NOMBRE DEL JUGADOR ─── */
    if (nombre) {
        ctx.save();
        ctx.shadowColor = colorOro;
        ctx.shadowBlur  = 28;
        ctx.font        = 'bold 58px Arial Black';
        ctx.fillStyle   = '#ffffff';
        ctx.fillText(nombre, W/2, 316);
        ctx.restore();

        // Categoría
        if (cat) {
            ctx.font      = 'bold 17px Arial';
            ctx.fillStyle = cat.color;
            ctx.fillText(cat.emoji + '  ' + cat.nombre, W/2, 348);
        }
    } else {
        ctx.font      = '36px Arial';
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.fillText('— JUGADOR —', W/2, 316);
    }

    /* ─── LÍNEA ─── */
    lineGrad(ctx, 120, 372, W-120, 372, colorOro);

    /* ─── LOGRO ─── */
    var logroTxt = tipoActual === 'campeon' ? '🏆  SE CONSAGRÓ CAMPEÓN OFICIAL' :
                   tipoActual === 'segundo' ? '🥈  ALCANZÓ EL SUBCAMPEONATO' :
                                             '🎱  PARTICIPÓ CON HONOR Y DEDICACIÓN';
    ctx.save();
    ctx.shadowColor = colorOro;
    ctx.shadowBlur  = 12;
    ctx.font        = 'bold 24px Arial Black';
    ctx.fillStyle   = colorOro;
    ctx.fillText(logroTxt, W/2, 406);
    ctx.restore();

    /* ─── TORNEO ─── */
    ctx.font      = '15px Arial';
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.fillText('EN EL TORNEO', W/2, 438);

    ctx.save();
    ctx.font      = 'bold 30px Arial Black';
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = 'rgba(212,175,55,0.3)';
    ctx.shadowBlur  = 10;
    ctx.fillText(torneoActual.nombre, W/2, 472);
    ctx.restore();

    /* ─── DATOS ─── */
    var ins       = (torneoActual.inscritos||[]).length;
    var modalidad = torneoActual.modalidad || 'Libre';
    ctx.font      = '13px Arial';
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillText(ins + ' JUGADORES  ·  ' + modalidad + '  ·  ' + fecha, W/2, 500);

    /* ─── BOLSA (solo campeón) ─── */
    if (tipoActual === 'campeon') {
        var b = bolsa(torneoActual);
        if (b > 0) {
            ctx.save();
            ctx.font      = 'bold 20px Arial Black';
            ctx.fillStyle = colorVerde;
            ctx.shadowColor = colorVerde;
            ctx.shadowBlur  = 10;
            ctx.fillText('PREMIO: ' + formatPesos(b * 0.5), W/2, 530);
            ctx.restore();
        }
    }

    /* ─── BOLAS DECORATIVAS LATERALES ─── */
    drawBola3D(ctx, 80,   H/2, 14, colorOro);
    drawBola3D(ctx, W-80, H/2, 14, colorOro);

    /* ─── LÍNEA INFERIOR ─── */
    lineGrad(ctx, 80, H-100, W-80, H-100, colorOro);

    /* ─── FOOTER ─── */
    ctx.font      = 'bold 13px Arial';
    ctx.fillStyle = 'rgba(212,175,55,0.55)';
    // Nombre del club a la izquierda · DeCarambola como firma de la plataforma
    var footerTxt = clubNom !== 'DeCarambola' ? clubNom + '  ·  DeCarambola' : 'DeCarambola';
    ctx.fillText(footerTxt, W/2, H-72);

    ctx.font      = '11px Arial';
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fillText('Código: ' + (torneoActual.codigo||'—') + '  ·  ' + fecha, W/2, H-50);

    /* ─── MARCA DE AGUA SUTIL ─── */
    ctx.save();
    ctx.globalAlpha = 0.04;
    ctx.font        = 'bold 120px Arial Black';
    ctx.fillStyle   = colorOro;
    ctx.fillText('DC', W/2, H/2 + 40);
    ctx.restore();
}

/* ═══════════════════════
   HELPERS CANVAS
═══════════════════════ */
function rrect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r);
    ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r);
    ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();
}

function lineGrad(ctx, x1, y, x2, y2, color) {
    var g = ctx.createLinearGradient(x1, 0, x2, 0);
    g.addColorStop(0,   'rgba(212,175,55,0)');
    g.addColorStop(0.5, color);
    g.addColorStop(1,   'rgba(212,175,55,0)');
    ctx.strokeStyle = g;
    ctx.lineWidth   = 1.5;
    ctx.beginPath(); ctx.moveTo(x1, y); ctx.lineTo(x2, y2); ctx.stroke();
}

function drawBola3D(ctx, cx, cy, r, color) {
    var g = ctx.createRadialGradient(cx-r*0.32, cy-r*0.32, r*0.05, cx, cy, r);
    g.addColorStop(0,    '#fffde0');
    g.addColorStop(0.18, '#f9e44a');
    g.addColorStop(0.48, color);
    g.addColorStop(0.78, '#5a3a00');
    g.addColorStop(1,    '#1a0800');
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.save();
    ctx.shadowColor = color; ctx.shadowBlur = 20;
    ctx.fillStyle = g; ctx.fill();
    ctx.restore();
    // brillo
    var br = ctx.createRadialGradient(cx-r*0.3, cy-r*0.35, 0, cx-r*0.28, cy-r*0.32, r*0.42);
    br.addColorStop(0, 'rgba(255,255,255,0.45)');
    br.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.fillStyle = br; ctx.fill();
}

function drawCornerFlourish(ctx, x, y, color, tipo) {
    ctx.strokeStyle = color;
    ctx.lineWidth   = 2;
    var s = 24;
    ctx.beginPath();
    if (tipo===0) { ctx.moveTo(x,y+s); ctx.lineTo(x,y); ctx.lineTo(x+s,y); }
    if (tipo===1) { ctx.moveTo(x-s,y); ctx.lineTo(x,y); ctx.lineTo(x,y+s); }
    if (tipo===2) { ctx.moveTo(x,y-s); ctx.lineTo(x,y); ctx.lineTo(x+s,y); }
    if (tipo===3) { ctx.moveTo(x-s,y); ctx.lineTo(x,y); ctx.lineTo(x,y-s); }
    ctx.stroke();
    // rombo pequeño en la esquina
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, 3.5, 0, Math.PI*2);
    ctx.fill();
}

/* ═══════════════════════
   DATOS
═══════════════════════ */
function getNombre() {
    if (!torneoActual) return '';
    if (tipoActual === 'campeon') return torneoActual.campeon || '';
    if (tipoActual === 'segundo') {
        if (!torneoActual.rondas) return '';
        var ult = torneoActual.rondas[torneoActual.rondas.length-1];
        if (!ult || !ult.partidas || !ult.partidas[0]) return '';
        var fin = ult.partidas[0];
        if (fin.estado !== 'TERMINADA') return '';
        return fin.ganador === fin.j1 ? (fin.j2||'') : (fin.j1||'');
    }
    return document.getElementById('sel-jugador').value || '';
}

function getPromedio(nombre) {
    if (!nombre) return 0;
    var jugs = MasterVIP.getJugadores();
    for (var i=0; i<jugs.length; i++) {
        if (jugs[i].nombre.toUpperCase() === nombre.toUpperCase()) return parseFloat(jugs[i].promedio)||0;
    }
    return 0;
}

/* ═══════════════════════
   EXPORTAR
═══════════════════════ */
function descargar() {
    var jugActivo = JSON.parse(localStorage.getItem('jugador_activo') || 'null');
    if (!jugActivo || !jugActivo.cedula) {
        alert('⚠️ Para descargar certificados debes identificarte con tu cédula.\n\nVe al menú principal → JUGADOR → ENTRAR');
        return;
    }
    var canvas = document.getElementById('cert-canvas');
    if (canvas.style.display === 'none') { alert('Primero genera el certificado'); return; }
    var nombre = getNombre() || 'certificado';
    var link   = document.createElement('a');
    link.download = 'Certificado_' + nombre.replace(/\s+/g,'_') + '.png';
    link.href     = canvas.toDataURL('image/png');
    link.click();
}

function compartirWA() {
    if (!torneoActual) { alert('Selecciona un torneo'); return; }
    var nombre  = getNombre() || '—';
    var clubNom = localStorage.getItem('wl_club_nombre') || 'DeCarambola';
    var txt = '🏆 *CERTIFICADO ' + clubNom.toUpperCase() + '*\n\n';
    if (tipoActual==='campeon') txt += '🥇 CAMPEÓN: *' + nombre + '*\n';
    if (tipoActual==='segundo') txt += '🥈 SUBCAMPEÓN: *' + nombre + '*\n';
    if (tipoActual==='part')    txt += '🎱 PARTICIPANTE: *' + nombre + '*\n';
    txt += '🏆 Torneo: ' + torneoActual.nombre + '\n';
    txt += '🏛 Club: ' + clubNom + '\n';
    txt += '📅 ' + new Date().toLocaleDateString('es-CO');
    window.open('https://wa.me/?text=' + encodeURIComponent(txt), '_blank');
}
