<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Categorías — DeCarambola</title>
    <style>
        :root { --oro:#d4af37; --g1:#1a1a1a; --g2:#111; }
        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        body { background:#000; color:#fff; font-family:'Arial Black',Arial,sans-serif; min-height:100vh; padding-bottom:80px; }
        .header { width:100%; background:#000; border-bottom:1px solid var(--g1); padding:14px 18px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:20; }
        .header-titulo { color:var(--oro); font-size:0.85rem; letter-spacing:3px; }
        .header-sub { color:#444; font-size:0.5rem; letter-spacing:2px; margin-top:2px; }
        .btn-hdr { background:none; border:1px solid var(--g1); color:#888; padding:8px 14px; border-radius:10px; font-size:0.55rem; cursor:pointer; text-decoration:none; font-family:'Arial Black',sans-serif; }
        .wrap { max-width:520px; margin:0 auto; padding:16px 18px; }
        .tu-categoria { background:linear-gradient(135deg, rgba(212,175,55,0.12), rgba(212,175,55,0.04)); border:2px solid var(--oro); border-radius:18px; padding:20px; margin-bottom:20px; text-align:center; }
        .tu-categoria .lbl { font-size:0.5rem; color:#666; letter-spacing:3px; margin-bottom:6px; }
        .tu-categoria .nombre { font-size:1.4rem; color:var(--oro); letter-spacing:2px; }
        .tu-categoria .prom { font-size:0.65rem; color:#888; margin-top:6px; }
        .sec-tit { color:#555; font-size:0.55rem; letter-spacing:3px; margin:16px 0 10px; }
        .cat-item { display:flex; align-items:center; gap:14px; background:var(--g2); border:1px solid var(--g1); border-radius:14px; padding:14px 16px; margin-bottom:10px; }
        .cat-item .emoji { font-size:1.6rem; }
        .cat-item .nombre { flex:1; font-size:0.8rem; font-weight:900; letter-spacing:1px; }
        .cat-item .rango { font-size:0.55rem; color:#666; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <div class="header-titulo">CATEGORÍAS</div>
            <div class="header-sub">Billar tres bandas — por promedio</div>
        </div>
        <a href="index.html" class="btn-hdr">← INICIO</a>
    </div>
    <div class="wrap">
        <div class="tu-categoria" id="tu-categoria">
            <div class="lbl">TU CATEGORÍA</div>
            <div class="nombre" id="tu-nombre">—</div>
            <div class="prom" id="tu-prom">Promedio: —</div>
        </div>
        <div class="sec-tit">CÓMO SE CLASIFICA EN ESTE DEPORTE</div>
        <div id="lista-categorias"></div>
    </div>
<script src="core.js"></script>
<script src="session.js"></script>
<script>
try { if (typeof SESSION !== 'undefined' && SESSION.verificarAlCargar) SESSION.verificarAlCargar('jugador'); } catch(e) {}

var CATEGORIAS = [
    { nombre: 'CLASE ÉLITE',  emoji: '🏆', desde: 1.100, color: '#f1c40f' },
    { nombre: 'MAESTRO',      emoji: '⭐', desde: 0.900, color: '#d4af37' },
    { nombre: 'PRIMERA',      emoji: '🥇', desde: 0.700, color: '#c0c0c0' },
    { nombre: 'SEGUNDA',      emoji: '🥈', desde: 0.500, color: '#cd7f32' },
    { nombre: 'TERCERA',      emoji: '🥉', desde: 0.350, color: '#3498db' },
    { nombre: 'INICIACIÓN',   emoji: '🎱', desde: 0,    color: '#555' }
];

function getJugadorActivo() {
    try {
        var perfil = JSON.parse(localStorage.getItem('mi_perfil') || '{}');
        if (perfil && perfil.nombre) return perfil;
        var activo = JSON.parse(localStorage.getItem('jugador_activo') || 'null');
        if (activo && activo.nombre) return activo;
        var jugadores = typeof MasterVIP !== 'undefined' ? MasterVIP.getJugadores() : [];
        return jugadores[0] || null;
    } catch(e) { return null; }
}

function pintar() {
    var jug = getJugadorActivo();
    var prom = jug && (parseFloat(jug.promedio) >= 0) ? parseFloat(jug.promedio) : null;
    var cat = typeof MasterVIP !== 'undefined' && MasterVIP.getCategoria ? MasterVIP.getCategoria(prom != null ? prom : 0) : { nombre: '—', emoji: '🎱' };

    document.getElementById('tu-nombre').textContent = cat.emoji + ' ' + cat.nombre;
    document.getElementById('tu-prom').textContent = prom != null ? 'Promedio: ' + prom.toFixed(3) : 'Identifícate para ver tu categoría';

    var html = '';
    for (var i = 0; i < CATEGORIAS.length; i++) {
        var c = CATEGORIAS[i];
        var hasta = i > 0 ? CATEGORIAS[i - 1].desde : '∞';
        var rango = c.desde === 0 ? '&lt; 0.350' : (c.desde + ' y más');
        html += '<div class="cat-item" style="border-left:4px solid ' + c.color + '">';
        html += '<span class="emoji">' + c.emoji + '</span>';
        html += '<div><div class="nombre">' + c.nombre + '</div><div class="rango">Promedio ' + rango + '</div></div>';
        html += '</div>';
    }
    document.getElementById('lista-categorias').innerHTML = html;
}
pintar();
</script>
</body>
</html>
