<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Retos — DeCarambola</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/index-v2.css" />
<link rel="stylesheet" href="/css/dc-system.css" />
<style>
  :root {
    --dc-bg: #0a0a0a;
    --dc-surface: #111111;
    --dc-border: rgba(201,168,76,0.12);
    --dc-gold: #c9a84c;
    --dc-gold-glow: rgba(201,168,76,0.07);
    --dc-text: #f0f0f0;
    --dc-muted: #888888;
    --dc-subtle: #4a4a4a;
    --dc-font: "DM Sans", sans-serif;
    --dc-display: "Playfair Display", Georgia, serif;
    --r-sm: 12px;
    --safe-b: env(safe-area-inset-bottom, 0px);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--dc-bg);
    color: var(--dc-text);
    font-family: var(--dc-font);
    font-size: 14px;
    min-height: 100vh;
    overscroll-behavior-y: contain;
    -webkit-font-smoothing: antialiased;
  }
  #stars { position:fixed;inset:0;pointer-events:none;z-index:0;
    background:
      radial-gradient(1px 1px at 12% 18%, rgba(201,168,76,.30) 0%,transparent 100%),
      radial-gradient(1px 1px at 70% 7%,  rgba(201,168,76,.22) 0%,transparent 100%),
      radial-gradient(1px 1px at 88% 32%, rgba(201,168,76,.18) 0%,transparent 100%),
      radial-gradient(1px 1px at 28% 58%, rgba(201,168,76,.14) 0%,transparent 100%),
      radial-gradient(1px 1px at 52% 80%, rgba(201,168,76,.16) 0%,transparent 100%),
      radial-gradient(1px 1px at 4%  88%, rgba(201,168,76,.10) 0%,transparent 100%); }
  .wrap { position:relative;z-index:1;max-width:420px;margin:0 auto;padding:0 16px calc(80px + var(--safe-b)) 16px; }
  .hdr { display:flex;align-items:center;justify-content:space-between;padding:16px 0 10px; }
  .hdr-left { display:flex;flex-direction:column;gap:2px; }
  .hdr-titulo { font-family:var(--dc-display);font-size:1.05rem;color:var(--dc-gold);letter-spacing:.4px;line-height:1; }
  .hdr-sub { font-size:.55rem;color:var(--dc-subtle);letter-spacing:2px;text-transform:uppercase; }
  .hdr-avatar { width:36px;height:36px;border-radius:50%;background:var(--dc-gold-glow);border:1.5px solid var(--dc-border);display:flex;align-items:center;justify-content:center;font-size:.7rem;color:var(--dc-gold);font-weight:600;cursor:pointer;flex-shrink:0; }
  .page-h { font-family:var(--dc-display);font-size:1.15rem;color:var(--dc-gold);margin:8px 0 4px; }
  .page-sub { font-size:.55rem;color:var(--dc-muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px; }
  .row-card { background:var(--dc-surface);border:1px solid var(--dc-border);border-radius:var(--r-sm);padding:14px;margin-bottom:10px; }
  .row-tit { font-size:.62rem;color:var(--dc-gold);font-weight:600;text-transform:uppercase;letter-spacing:1px; }
  .row-meta { font-size:.54rem;color:var(--dc-muted);margin-top:8px;line-height:1.45; }
  .empty { text-align:center;padding:28px 12px;font-size:.58rem;color:var(--dc-subtle);line-height:1.5; }
  .bnav { position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,.96);backdrop-filter:blur(14px);border-top:1px solid var(--dc-border);display:flex;padding:8px 0 calc(8px + var(--safe-b)) 0;z-index:100; }
  .bn { flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;text-decoration:none;padding:5px 4px;color:var(--dc-subtle); }
  .bn.on { color:var(--dc-gold); }
  .bn-lbl { font-size:.44rem;letter-spacing:1px;text-transform:uppercase;font-weight:600; }
  .reveal { animation:fadeUp .38s ease both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none} }
@media (min-width: 768px) { .wrap { max-width: 520px; padding-left: 24px; padding-right: 24px; } }
@media (min-width: 1024px) {
  .wrap { max-width: 640px; padding-left: 32px; padding-right: 32px; }
  .bnav { max-width: 640px; left: 50%; transform: translateX(-50%); border-radius: 16px 16px 0 0; border-left: 1px solid var(--dc-border); border-right: 1px solid var(--dc-border); }
  .bn svg { width: 22px; height: 22px; }
}
</style>
</head>
<body>
<style id="body-hide">body { visibility: hidden; }</style>
<div id="stars" aria-hidden="true"></div>
<div class="wrap reveal">
  <header class="hdr">
    <div class="hdr-left">
      <div class="hdr-titulo">DeCarambola</div>
      <div class="hdr-sub">Sensei Billar</div>
    </div>
    <div class="hdr-avatar" id="btn-avatar"><span id="hdr-ini">?</span></div>
  </header>
  <h1 class="page-h">Retos</h1>
  <p class="page-sub">Pendientes de respuesta</p>
  <div id="lista"><p class="empty">Cargando…</p></div>
</div>

<nav class="bnav">
  <a href="/jugador/index.html"   class="bn"><span id="bni-inicio"></span><span class="bn-lbl">Inicio</span></a>
  <a href="/jugador/torneos.html" class="bn"><span id="bni-torneos"></span><span class="bn-lbl">Torneos</span></a>
  <a href="/jugador/ranking.html" class="bn"><span id="bni-ranking"></span><span class="bn-lbl">Ranking</span></a>
  <a href="/jugador/retos.html"   class="bn on"><span id="bni-retos"></span><span class="bn-lbl">Retos</span></a>
  <a href="/jugador/perfil.html"  class="bn"><span id="bni-perfil"></span><span class="bn-lbl">Perfil</span></a>
</nav>

<script src="/js/dc-icons.js"></script>
<script type="module">
import { supabase } from '/js/supabase-client.js';

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function iniFromNombre(nombre) {
  const parts = String(nombre || '').trim().split(/\s+/).filter(Boolean);
  if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  return (String(nombre).slice(0, 2).toUpperCase() || '?');
}

function renderBnavIcos() {
  document.getElementById('bni-inicio').innerHTML   = IC.taco(22);
  document.getElementById('bni-torneos').innerHTML = IC.trofeo(22);
  document.getElementById('bni-ranking').innerHTML = IC.ranking(22);
  document.getElementById('bni-retos').innerHTML   = IC.reto(22);
  document.getElementById('bni-perfil').innerHTML  = IC.perfil(22);
}

async function cargarRetos(uid) {
  const el = document.getElementById('lista');
  const pr = await supabase.from('profiles').select('nombre_completo').eq('id', uid).maybeSingle();
  document.getElementById('hdr-ini').textContent = iniFromNombre(pr.data?.nombre_completo || 'Jugador');

  const { data: rows, error } = await supabase
    .from('retos')
    .select('*')
    .eq('retado_id', uid)
    .eq('estado', 'pendiente')
    .order('created_at', { ascending: false });
  if (error) {
    el.innerHTML = '<p class="empty">No se pudieron cargar los retos.</p>';
    return;
  }
  if (!rows?.length) {
    el.innerHTML = '<p class="empty">No tenés retos pendientes.</p>';
    return;
  }
  const retadorIds = [...new Set(rows.map(function (r) { return r.retador_id; }).filter(Boolean))];
  const nomMap = {};
  if (retadorIds.length) {
    const nm = await supabase.from('profiles').select('id, nombre_completo').in('id', retadorIds);
    if (nm.data && !nm.error) {
      nm.data.forEach(function (x) { nomMap[x.id] = x.nombre_completo || '—'; });
    }
  }
  let html = '';
  rows.forEach(function (r) {
    const rival = r.retador_id && nomMap[r.retador_id] ? nomMap[r.retador_id] : (r.retador_id ? 'Jugador' : '—');
    const fecha = r.created_at ? new Date(r.created_at).toLocaleString('es-CO', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' }) : '—';
    const extra = [];
    if (r.mensaje != null && String(r.mensaje).trim()) extra.push(String(r.mensaje).trim());
    if (r.club_id != null && String(r.club_id).trim()) extra.push('Club: ' + String(r.club_id).trim());
    const det = extra.length ? extra.join(' · ') : 'Reto pendiente';
    html += '<div class="row-card"><div class="row-tit">vs ' + esc(rival) + '</div><div class="row-meta">' + esc(fecha) + '<br/>' + esc(det) + '</div></div>';
  });
  el.innerHTML = html;
}

function init() {
  renderBnavIcos();
  supabase.auth.onAuthStateChange(async function (event, session) {
    if (event === 'INITIAL_SESSION') {
      document.getElementById('body-hide')?.remove();
      if (!session) {
        const next = encodeURIComponent(window.location.pathname + window.location.search);
        window.location.replace('/login.html?next=' + next);
        return;
      }
      const uid = session.user.id;
      const { data: p } = await supabase.from('profiles').select('role').eq('id', uid).maybeSingle();
      const rol = String(p?.role ?? '').trim().toLowerCase();
      if (rol === 'organizador') { window.location.replace('/apps/organizador/organizador.html'); return; }
      if (rol === 'club_admin')  { window.location.replace('/apps/club/club.html'); return; }
      if (rol === 'superadmin')  { window.location.replace('/admin/index.html'); return; }
      await cargarRetos(uid);
    }
  });
}

document.getElementById('btn-avatar').addEventListener('click', function () { window.location.href = '/jugador/perfil.html'; });
init();
</script>
</body>
</html>
