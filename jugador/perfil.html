<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Perfil — DeCarambola</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/index-v2.css" />
<link rel="stylesheet" href="/css/dc-system.css" />
<style>
  :root {
    --dc-bg: #0a0a0a;
    --dc-surface: #111111;
    --dc-border: rgba(201,168,76,0.12);
    --dc-gold: #c9a84c;
    --dc-gold-glow: rgba(201,168,76,0.07);
    --dc-text: #f0f0f0;
    --dc-muted: #888888;
    --dc-subtle: #4a4a4a;
    --dc-font: "DM Sans", sans-serif;
    --dc-display: "Playfair Display", Georgia, serif;
    --r: 18px;
    --r-sm: 12px;
    --safe-b: env(safe-area-inset-bottom, 0px);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--dc-bg);
    color: var(--dc-text);
    font-family: var(--dc-font);
    font-size: 14px;
    min-height: 100vh;
    overscroll-behavior-y: contain;
    -webkit-font-smoothing: antialiased;
  }
  #stars { position:fixed;inset:0;pointer-events:none;z-index:0;
    background:
      radial-gradient(1px 1px at 12% 18%, rgba(201,168,76,.30) 0%,transparent 100%),
      radial-gradient(1px 1px at 70% 7%,  rgba(201,168,76,.22) 0%,transparent 100%),
      radial-gradient(1px 1px at 88% 32%, rgba(201,168,76,.18) 0%,transparent 100%),
      radial-gradient(1px 1px at 28% 58%, rgba(201,168,76,.14) 0%,transparent 100%),
      radial-gradient(1px 1px at 52% 80%, rgba(201,168,76,.16) 0%,transparent 100%),
      radial-gradient(1px 1px at 4%  88%, rgba(201,168,76,.10) 0%,transparent 100%); }
  .wrap { position:relative;z-index:1;max-width:420px;margin:0 auto;padding:0 16px calc(80px + var(--safe-b)) 16px; }
  .hdr { display:flex;align-items:center;justify-content:space-between;padding:16px 0 10px; }
  .hdr-left { display:flex;flex-direction:column;gap:2px; }
  .hdr-titulo { font-family:var(--dc-display);font-size:1.05rem;color:var(--dc-gold);letter-spacing:.4px;line-height:1; }
  .hdr-sub { font-size:.55rem;color:var(--dc-subtle);letter-spacing:2px;text-transform:uppercase; }
  .hdr-avatar { width:36px;height:36px;border-radius:50%;background:var(--dc-gold-glow);border:1.5px solid var(--dc-border);display:flex;align-items:center;justify-content:center;font-size:.7rem;color:var(--dc-gold);font-weight:600;flex-shrink:0; }
  .page-h { font-family:var(--dc-display);font-size:1.25rem;color:var(--dc-gold);margin:12px 0 4px; }
  .page-sub { font-size:.55rem;color:var(--dc-muted);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:16px; }
  .card { background:var(--dc-surface);border:1px solid var(--dc-border);border-radius:var(--r);padding:18px 16px;margin-bottom:12px; }
  .kv { display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:10px 0;border-bottom:1px solid var(--dc-border); }
  .kv:last-child { border-bottom:none;padding-bottom:0; }
  .kv-lbl { font-size:.5rem;color:var(--dc-subtle);letter-spacing:1.2px;text-transform:uppercase;flex-shrink:0; }
  .kv-val { font-size:.62rem;color:var(--dc-text);text-align:right;word-break:break-word; }
  .btn-out { display:block;width:100%;margin-top:16px;background:rgba(201,168,76,.10);border:1px solid rgba(201,168,76,.30);color:var(--dc-gold);border-radius:var(--r-sm);padding:12px;font-size:.58rem;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;font-family:var(--dc-font); }
  .bnav { position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,.96);backdrop-filter:blur(14px);border-top:1px solid var(--dc-border);display:flex;padding:8px 0 calc(8px + var(--safe-b)) 0;z-index:100; }
  .bn { flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;text-decoration:none;padding:5px 4px;color:var(--dc-subtle); }
  .bn.on { color:var(--dc-gold); }
  .bn-lbl { font-size:.44rem;letter-spacing:1px;text-transform:uppercase;font-weight:600; }
  .reveal { animation:fadeUp .38s ease both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none} }
@media (min-width: 768px) { .wrap { max-width: 520px; padding-left: 24px; padding-right: 24px; } }
@media (min-width: 1024px) {
  .wrap { max-width: 640px; padding-left: 32px; padding-right: 32px; }
  .bnav { max-width: 640px; left: 50%; transform: translateX(-50%); border-radius: 16px 16px 0 0; border-left: 1px solid var(--dc-border); border-right: 1px solid var(--dc-border); }
  .bn svg { width: 22px; height: 22px; }
}
</style>
</head>
<body>
<style id="body-hide">body { visibility: hidden; }</style>
<div id="stars" aria-hidden="true"></div>
<div class="wrap reveal">
  <header class="hdr">
    <div class="hdr-left">
      <div class="hdr-titulo">DeCarambola</div>
      <div class="hdr-sub">Sensei Billar</div>
    </div>
    <div class="hdr-avatar" id="hdr-avatar-big"><span id="hdr-ini">?</span></div>
  </header>
  <h1 class="page-h" id="tit-nombre">Jugador</h1>
  <p class="page-sub">Tu cuenta</p>
  <div class="card" id="panel-datos"></div>
  <button type="button" class="btn-out" id="btn-cerrar">Cerrar sesión</button>
</div>

<nav class="bnav">
  <a href="/jugador/index.html"   class="bn"><span id="bni-inicio"></span><span class="bn-lbl">Inicio</span></a>
  <a href="/jugador/torneos.html" class="bn"><span id="bni-torneos"></span><span class="bn-lbl">Torneos</span></a>
  <a href="/jugador/ranking.html" class="bn"><span id="bni-ranking"></span><span class="bn-lbl">Ranking</span></a>
  <a href="/jugador/retos.html"   class="bn"><span id="bni-retos"></span><span class="bn-lbl">Retos</span></a>
  <a href="/jugador/perfil.html"  class="bn on"><span id="bni-perfil"></span><span class="bn-lbl">Perfil</span></a>
</nav>

<script src="/js/dc-icons.js"></script>
<script type="module">
import { supabase } from '/js/supabase-client.js';

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function iniFromNombre(nombre) {
  const parts = String(nombre || '').trim().split(/\s+/).filter(Boolean);
  if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  return (String(nombre).slice(0, 2).toUpperCase() || '?');
}

function kv(lbl, val) {
  return '<div class="kv"><span class="kv-lbl">' + esc(lbl) + '</span><span class="kv-val">' + esc(val) + '</span></div>';
}

function renderBnavIcos() {
  document.getElementById('bni-inicio').innerHTML   = IC.taco(22);
  document.getElementById('bni-torneos').innerHTML = IC.trofeo(22);
  document.getElementById('bni-ranking').innerHTML = IC.ranking(22);
  document.getElementById('bni-retos').innerHTML   = IC.reto(22);
  document.getElementById('bni-perfil').innerHTML  = IC.perfil(22);
}

async function cargarPerfil(uid, session) {
  const email = session?.user?.email || '—';
  const { data: p } = await supabase.from('profiles').select('nombre_completo, role, club_id').eq('id', uid).maybeSingle();
  const nombre = (p?.nombre_completo && String(p.nombre_completo).trim()) || 'Jugador';
  document.getElementById('tit-nombre').textContent = nombre;
  document.getElementById('hdr-ini').textContent = iniFromNombre(nombre);

  const jRes = await supabase.from('jugadores').select('categoria, promedio, nivel').eq('id', uid).maybeSingle();
  const j = jRes.data && !jRes.error ? jRes.data : null;
  const cat = j?.categoria != null && String(j.categoria).trim() ? String(j.categoria).trim() : '—';
  let prom = '—';
  if (j?.promedio != null && String(j.promedio).trim() !== '') {
    const prn = parseFloat(j.promedio);
    prom = Number.isFinite(prn) ? prn.toFixed(2) : String(j.promedio).trim();
  }
  const niv = j?.nivel != null && String(j.nivel).trim() !== '' ? String(j.nivel).trim() : '—';
  const rol = p?.role != null && String(p.role).trim() ? String(p.role).trim() : 'jugador';
  const club = p?.club_id != null && String(p.club_id).trim() ? String(p.club_id).trim() : '—';

  const panel = document.getElementById('panel-datos');
  panel.innerHTML =
    kv('Correo', email) +
    kv('Rol', rol) +
    kv('Club', club) +
    kv('Categoría', cat) +
    kv('Promedio', prom) +
    kv('Nivel', niv);
}

function init() {
  renderBnavIcos();
  supabase.auth.onAuthStateChange(async function (event, session) {
    if (event === 'INITIAL_SESSION') {
      document.getElementById('body-hide')?.remove();
      if (!session) {
        const next = encodeURIComponent(window.location.pathname + window.location.search);
        window.location.replace('/login.html?next=' + next);
        return;
      }
      const uid = session.user.id;
      const { data: p } = await supabase.from('profiles').select('role').eq('id', uid).maybeSingle();
      const rol = String(p?.role ?? '').trim().toLowerCase();
      if (rol === 'organizador') { window.location.replace('/apps/organizador/organizador.html'); return; }
      if (rol === 'club_admin')  { window.location.replace('/apps/club/club.html'); return; }
      if (rol === 'superadmin')  { window.location.replace('/admin/index.html'); return; }
      await cargarPerfil(uid, session);
    }
  });

  document.getElementById('btn-cerrar').addEventListener('click', async function () {
    await supabase.auth.signOut();
    window.location.replace('/login.html');
  });
}

init();
</script>
</body>
</html>
