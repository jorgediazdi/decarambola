<!DOCTYPE html>
<html lang="es">
<head>
    <script type="module">
import { guardSalaPage } from '/js/sala-supabase-gate.js';
await guardSalaPage({ pageTitle: 'Ranking' });
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#c9a84c">
    <title>Ranking — DeCarambola</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Playfair+Display:wght@500;600&display=swap">
    <link rel="stylesheet" href="/css/dc-system.css">
    <link rel="stylesheet" href="/css/ux-shell.css">
    <link rel="stylesheet" href="/css/bottom-nav.css">
    <style>
        :root { --oro:#c9a84c; --bg:#0b0b0b; --surface:#111; --border:#222; --txt:#ececec; --muted:#888; --blue:#3ea6ff; }
        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        body { background:var(--bg); color:var(--txt); font-family:'DM Sans',sans-serif; min-height:100vh; }
        .header { position:sticky; top:0; z-index:20; background:rgba(9,9,9,.92); border-bottom:1px solid var(--border); padding:14px 16px; display:flex; flex-direction:column; align-items:flex-start; gap:10px; }
        .header h1 { font-size:0.95rem; color:var(--oro); letter-spacing:0.08em; margin:0; font-family:'Playfair Display',Georgia,serif; font-weight:600; }
        .btn-back { display:inline-block; text-decoration:none; color:var(--oro); border:1px solid rgba(201,168,76,.35); border-radius:10px; padding:8px 12px; font-size:.7rem; font-family:'DM Sans',sans-serif; font-weight:700; letter-spacing:.05em; }
        .wrap { position:relative; z-index:1; max-width:680px; margin:0 auto; padding:14px 14px 92px; }
        .tabs, .cats { display:flex; gap:8px; overflow:auto; scrollbar-width:none; margin-bottom:10px; }
        .tabs::-webkit-scrollbar, .cats::-webkit-scrollbar { display:none; }
        .tab, .cat { border:1px solid var(--border); background:#0f0f0f; color:#9d9d9d; border-radius:999px; padding:8px 12px; font-size:.68rem; white-space:nowrap; cursor:pointer; font-family:'DM Sans',sans-serif; font-weight:700; letter-spacing:.04em; }
        .tab.active, .cat.active { color:var(--oro); border-color:rgba(201,168,76,.45); background:rgba(201,168,76,.08); }
        .meta { color:var(--muted); font-size:.72rem; margin:0 2px 12px; }
        .podio { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px; }
        .pod-card { border:1px solid var(--border); background:var(--surface); border-radius:14px; padding:10px 8px; text-align:center; }
        .pod-medal { font-size:1.1rem; }
        .pod-name { margin-top:4px; font-size:.72rem; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .pod-prom { margin-top:3px; font-family:'Courier New',monospace; color:var(--oro); font-weight:700; }
        .list { display:flex; flex-direction:column; gap:8px; }
        .row { border:1px solid var(--border); background:var(--surface); border-radius:14px; padding:10px 12px; display:grid; grid-template-columns:34px 1fr auto; gap:10px; align-items:center; }
        .pos { width:30px; height:30px; border-radius:8px; border:1px solid #2a2a2a; display:flex; align-items:center; justify-content:center; font-family:'Courier New',monospace; font-weight:700; color:#b7b7b7; background:#0b0b0b; }
        .name { font-size:.78rem; color:#fff; font-weight:700; }
        .sub { margin-top:3px; font-size:.66rem; color:var(--muted); }
        .prom { font-family:'Courier New',monospace; font-size:1rem; color:var(--oro); font-weight:700; }
        .empty { border:1px dashed #2a2a2a; border-radius:14px; padding:28px 16px; color:#888; text-align:center; font-size:.8rem; }
        .loading, .error { padding:18px 2px; font-size:.78rem; color:#888; }
        .error { color:#ff9c9c; }
        .cat-chip { margin-top:4px; display:inline-block; font-size:.6rem; border:1px solid #2b2b2b; border-radius:999px; padding:3px 8px; color:#aaa; }
    </style>
</head>
<body class="dc-app dc-ux dc-ux-skin m-root-legacy">
    <header class="header">
        <a href="/jugador/index.html" class="btn-back">← MI ESPACIO</a>
        <h1>RANKING</h1>
    </header>

    <main class="wrap">
        <div class="tabs" id="scope-tabs">
            <button class="tab active" data-scope="club">MI CLUB</button>
            <button class="tab" data-scope="ciudad">MI CIUDAD</button>
            <button class="tab" data-scope="pais">MI PAÍS</button>
            <button class="tab" data-scope="global">GLOBAL</button>
        </div>
        <div class="cats" id="cat-tabs">
            <button class="cat active" data-cat="TODOS">TODOS</button>
            <button class="cat" data-cat="ÉLITE">ÉLITE</button>
            <button class="cat" data-cat="MAESTRO">MAESTRO</button>
            <button class="cat" data-cat="PRIMERA">PRIMERA</button>
            <button class="cat" data-cat="SEGUNDA">SEGUNDA</button>
            <button class="cat" data-cat="TERCERA">TERCERA</button>
        </div>
        <div class="meta" id="meta">Cargando ranking...</div>
        <section class="podio" id="podio"></section>
        <section class="list" id="list"></section>
    </main>

    <nav class="bottom-nav" aria-label="Navegación inferior">
      <a class="bottom-nav__item" href="/index.html"><span class="bottom-nav__icon">🏠</span><span>Inicio</span></a>
      <a class="bottom-nav__item" href="/apps/organizador/torneos.html"><span class="bottom-nav__icon">🏆</span><span>Torneos</span></a>
      <a class="bottom-nav__item" href="/duelo-movil.html?modo=movil"><span class="bottom-nav__icon">🎱</span><span>Jugar</span></a>
      <a class="bottom-nav__item bottom-nav__item--active" href="/ranking.html"><span class="bottom-nav__icon">📊</span><span>Ranking</span></a>
      <a class="bottom-nav__item" href="/perfil.html"><span class="bottom-nav__icon">👤</span><span>Perfil</span></a>
    </nav>

    <script type="module">
      import { supabase } from '/js/supabase-client.js';

      var rows = [];
      var scope = 'club';
      var cat = 'TODOS';
      var ctx = { club_id: null, ciudad: null, nacionalidad: null };

      function esc(v) {
        return String(v == null ? '' : v)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function parsePerfil() {
        try { return JSON.parse(localStorage.getItem('mi_perfil') || '{}'); }
        catch (e) { return {}; }
      }

      function catMatches(rowCat, selected) {
        if (selected === 'TODOS') return true;
        return String(rowCat || '').toUpperCase().trim() === selected;
      }

      function scopeMatches(r) {
        if (scope === 'global') return true;
        if (scope === 'club') return !!ctx.club_id && String(r.club_id || '') === String(ctx.club_id);
        if (scope === 'ciudad') return !!ctx.ciudad && String(r.ciudad || '').toUpperCase() === String(ctx.ciudad).toUpperCase();
        if (scope === 'pais') return !!ctx.nacionalidad && String(r.nacionalidad || '').toUpperCase() === String(ctx.nacionalidad).toUpperCase();
        return true;
      }

      function filtered() {
        return rows
          .filter(scopeMatches)
          .filter(function (r) { return catMatches(r.categoria, cat); })
          .sort(function (a, b) { return (parseFloat(b.promedio) || 0) - (parseFloat(a.promedio) || 0); });
      }

      function render() {
        var data = filtered();
        var meta = document.getElementById('meta');
        var pod = document.getElementById('podio');
        var list = document.getElementById('list');
        meta.textContent = data.length + ' jugadores';
        if (!data.length) {
          pod.innerHTML = '';
          list.innerHTML = '<div class="empty">Sin jugadores para este filtro.</div>';
          return;
        }

        var medals = ['🥇', '🥈', '🥉'];
        var top = data.slice(0, 3);
        pod.innerHTML = top.map(function (r, i) {
          var name = (r.alias && String(r.alias).trim()) ? r.alias : r.nombre;
          return '<article class="pod-card">' +
            '<div class="pod-medal">' + medals[i] + '</div>' +
            '<div class="pod-name">' + esc(name || 'SIN NOMBRE') + '</div>' +
            '<div class="pod-prom">' + (parseFloat(r.promedio) || 0).toFixed(3) + '</div>' +
          '</article>';
        }).join('');

        list.innerHTML = data.map(function (r, i) {
          var name = (r.alias && String(r.alias).trim()) ? r.alias : r.nombre;
          return '<article class="row">' +
            '<div class="pos">' + (i + 1) + '</div>' +
            '<div>' +
              '<div class="name">' + esc(name || 'SIN NOMBRE') + '</div>' +
              '<div class="sub">' + esc(r.ciudad || '—') + ' · ' + esc(r.club || '—') + '</div>' +
              '<div class="cat-chip">' + esc(r.categoria || 'SIN CATEGORÍA') + '</div>' +
            '</div>' +
            '<div class="prom">' + (parseFloat(r.promedio) || 0).toFixed(3) + '</div>' +
          '</article>';
        }).join('');
      }

      function bindTabs() {
        document.getElementById('scope-tabs').addEventListener('click', function (ev) {
          var t = ev.target.closest('.tab');
          if (!t) return;
          scope = t.getAttribute('data-scope');
          Array.prototype.forEach.call(document.querySelectorAll('.tab'), function (x) {
            x.classList.toggle('active', x === t);
          });
          render();
        });
        document.getElementById('cat-tabs').addEventListener('click', function (ev) {
          var t = ev.target.closest('.cat');
          if (!t) return;
          cat = t.getAttribute('data-cat');
          Array.prototype.forEach.call(document.querySelectorAll('.cat'), function (x) {
            x.classList.toggle('active', x === t);
          });
          render();
        });
      }

      async function loadRows() {
        var list = document.getElementById('list');
        list.innerHTML = '<div class="loading">Cargando datos desde Supabase...</div>';
        const { data, error } = await supabase
          .from('jugadores')
          .select('nombre,alias,promedio,categoria,club_id,club,ciudad,nacionalidad,foto_url,partidas,victorias');
        if (error) {
          list.innerHTML = '<div class="error">Error al cargar ranking: ' + esc(error.message || error) + '</div>';
          return;
        }
        rows = (data || []).map(function (r) {
          return {
            nombre: r.nombre || '',
            alias: r.alias || '',
            promedio: parseFloat(r.promedio) || 0,
            categoria: r.categoria || '',
            club_id: r.club_id,
            club: r.club || '',
            ciudad: r.ciudad || '',
            nacionalidad: r.nacionalidad || '',
            foto_url: r.foto_url || null,
            partidas: r.partidas || 0,
            victorias: r.victorias || 0
          };
        });
        render();
      }

      function initContext() {
        var p = parsePerfil();
        ctx.club_id = p.club_id || null;
        ctx.ciudad = p.ciudad || p.ciudad_nombre || null;
        ctx.nacionalidad = p.nacionalidad || p.pais || null;

        if (!ctx.club_id) {
          scope = 'global';
          Array.prototype.forEach.call(document.querySelectorAll('.tab'), function (x) {
            x.classList.toggle('active', x.getAttribute('data-scope') === 'global');
          });
        }
      }

      bindTabs();
      initContext();
      loadRows();
    </script>
</body>
</html>
