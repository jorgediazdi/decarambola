<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva contraseña — DeCarambola</title>
  <style>
    :root { --oro: #d4af37; --fondo: #0b0b0b; --card: #14100a; --texto: #eaeaea; --muted: #888; --err: #e74c3c; --ok: #2eff70; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--fondo);
      color: var(--texto);
    }
    .wrap { width: 100%; max-width: 400px; }
    h1 {
      font-family: Georgia, serif;
      font-style: italic;
      color: var(--oro);
      font-size: 1.35rem;
      text-align: center;
      margin-bottom: 8px;
    }
    .sub { text-align: center; color: var(--muted); font-size: 0.75rem; margin-bottom: 24px; line-height: 1.4; }
    .card {
      background: linear-gradient(165deg, var(--card), #0a0806);
      border: 1px solid rgba(212, 175, 55, 0.22);
      border-radius: 18px;
      padding: 22px 20px;
    }
    label { display: block; font-size: 0.65rem; letter-spacing: 0.12em; color: #666; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #2a2a2a;
      background: #0a0a0a;
      color: #fff;
      font-size: 1rem;
      margin-bottom: 14px;
    }
    input:focus { outline: none; border-color: rgba(212, 175, 55, 0.45); }
    button[type="submit"] {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: none;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      background: linear-gradient(135deg, var(--ok), #18b040);
      color: #000;
    }
    button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { font-size: 0.8rem; padding: 12px; border-radius: 12px; margin-bottom: 14px; display: none; }
    .msg.err { display: block; background: rgba(231, 76, 60, 0.12); border: 1px solid rgba(231, 76, 60, 0.35); color: #eaa; }
    .msg.ok { display: block; background: rgba(46, 255, 112, 0.08); border: 1px solid rgba(46, 255, 112, 0.25); color: #8d8; }
    .foot { margin-top: 16px; font-size: 0.7rem; color: #444; text-align: center; line-height: 1.5; }
    .card.hidden, .sub.hidden { display: none; }
    #state-invalid { display: none; text-align: center; }
    #state-invalid.visible { display: block; }
    #state-invalid .card { margin-top: 16px; }
    a.link { color: var(--oro); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>DeCarambola</h1>
    <p id="sub-ok" class="sub">Elegí una nueva contraseña para tu cuenta.</p>
    <div id="state-invalid">
      <p class="sub" style="margin-bottom: 12px;">Este enlace no es válido o expiró.</p>
      <p class="sub"><a class="link" href="/login.html">Volver al inicio de sesión</a></p>
    </div>
    <div id="card-form" class="card">
      <div id="msg" class="msg" aria-live="polite"></div>
      <form id="reset-form" novalidate>
        <label for="password">Nueva contraseña</label>
        <input id="password" name="password" type="password" autocomplete="new-password" required minlength="6" placeholder="Mínimo 6 caracteres">

        <label for="password2">Confirmar contraseña</label>
        <input id="password2" name="password2" type="password" autocomplete="new-password" required minlength="6" placeholder="Repetí la contraseña">

        <button type="submit" id="btn-submit">Guardar contraseña</button>
      </form>
    </div>
    <p class="foot">Recuperación de contraseña (Supabase). Si no pediste el cambio, ignorá el correo.</p>
  </div>

  <script type="module">
    import { supabase } from '/js/supabase-client.js';

    const elMsg = document.getElementById('msg');
    const elForm = document.getElementById('reset-form');
    const elCard = document.getElementById('card-form');
    const elSubOk = document.getElementById('sub-ok');
    const elInvalid = document.getElementById('state-invalid');
    const elBtn = document.getElementById('btn-submit');

    function showMsg(text, ok) {
      elMsg.className = 'msg ' + (ok ? 'ok' : 'err');
      elMsg.textContent = text;
    }
    function clearMsg() {
      elMsg.className = 'msg';
      elMsg.textContent = '';
    }

    function sleep(ms) {
      return new Promise((r) => setTimeout(r, ms));
    }

    /** Espera a que detectSessionInUrl termine de aplicar el token del correo. */
    async function waitForResetSession() {
      for (let i = 0; i < 12; i++) {
        const { data } = await supabase.auth.getSession();
        if (data.session) return data.session;
        await sleep(100);
      }
      return null;
    }

    const session = await waitForResetSession();
    if (!session) {
      elCard.classList.add('hidden');
      elSubOk.classList.add('hidden');
      elInvalid.classList.add('visible');
    } else {
      elForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        clearMsg();
        const p1 = document.getElementById('password').value;
        const p2 = document.getElementById('password2').value;
        if (p1.length < 6) {
          showMsg('La contraseña debe tener al menos 6 caracteres.', false);
          return;
        }
        if (p1 !== p2) {
          showMsg('Las contraseñas no coinciden.', false);
          return;
        }
        elBtn.disabled = true;
        const { error } = await supabase.auth.updateUser({ password: p1 });
        elBtn.disabled = false;
        if (error) {
          showMsg(error.message || 'No se pudo actualizar la contraseña.', false);
          return;
        }
        await supabase.auth.signOut();
        window.location.replace('/login.html?reset=ok');
      });
    }
  </script>
</body>
</html>
