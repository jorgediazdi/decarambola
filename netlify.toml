# DeCarambola — Deploy en Netlify
# Sitio estático: sin build, publicar tal cual (evita que un comando roto deje el sitio viejo).

[build]
  publish = "."

# index.html se sirve en / ; el resto de archivos (.html, .js, etc.) se sirven por ruta.

[[redirects]]
  from = "/duelo-tv.html"
  to = "/duelo-movil.html"
  status = 301
