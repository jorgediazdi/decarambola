<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Llaves — DeCarambola</title>
    <style>
        :root { --oro:#d4af37; --negro:#0b0b0b; --neon:#2eff70; --azul:#3498db; --rojo:#e74c3c; --g1:#1a1a1a; --g2:#111; --g3:#0a0a0a; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--negro); color: #fff; font-family: 'Arial Black', sans-serif; min-height: 100vh; }
        .header { background: #000; border-bottom: 2px solid var(--g1); padding: 16px 18px; position: sticky; top: 0; z-index: 50; }
        .header h1 { color: var(--oro); font-size: 1.1rem; letter-spacing: 3px; }
        .header small { color: #333; font-size: 0.65rem; letter-spacing: 2px; margin-top: 4px; display: block; }
        .contenido { padding: 20px 15px 120px; max-width: 500px; margin: 0 auto; }
        .ronda-bloque { margin-bottom: 28px; }
        .ronda-titulo { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
        .ronda-titulo-linea { flex: 1; height: 1px; background: var(--g1); }
        .ronda-titulo-txt { color: var(--oro); font-size: 0.7rem; letter-spacing: 3px; white-space: nowrap; }
        .ronda-titulo-badge { background: var(--oro); color: #000; font-size: 0.5rem; padding: 3px 10px; border-radius: 10px; white-space: nowrap; }
        .ronda-titulo-badge.completada { background: #1a1a1a; color: #333; }
        .partida-card { background: var(--g3); border: 2px solid var(--g1); border-radius: 18px; overflow: hidden; margin-bottom: 12px; }
        .partida-card.terminada { border-color: #222; opacity: 0.9; }
        .partida-card.bye { border-color: rgba(212,175,55,0.4); background: #0f0d00; }
        .partida-card.en-juego { border-color: var(--neon); box-shadow: 0 0 18px rgba(46,255,112,0.12); }
        .partida-card.pendiente { border-color: var(--g1); }
        .card-estado { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px; background: #050505; border-bottom: 1px solid #111; }
        .card-num { color: #333; font-size: 0.55rem; letter-spacing: 1px; }
        .est-badge { font-size: 0.52rem; padding: 3px 10px; border-radius: 10px; font-weight: bold; letter-spacing: 1px; }
        .est-pendiente { background: #111; color: #444; }
        .est-terminada { background: #111; color: #444; }
        .est-bye { background: rgba(212,175,55,0.15); color: var(--oro); }
        .est-en-juego { background: rgba(46,255,112,0.12); color: var(--neon); }
        .jugador-row { display: flex; align-items: center; padding: 12px 14px; border-bottom: 1px solid #0f0f0f; gap: 10px; }
        .jugador-row:last-of-type { border-bottom: none; }
        .jugador-row.ganador { background: rgba(212,175,55,0.06); }
        .jugador-row.perdedor { opacity: 0.5; }
        .jugador-row.bye-row { background: #0f0d00; }
        .j-corona { font-size: 1rem; flex-shrink: 0; width: 22px; text-align: center; }
        .j-nombre { flex: 1; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .j-prom { font-size: 0.72rem; color: #555; font-family: 'Courier New', monospace; flex-shrink: 0; }
        .j-pts { font-size: 1.2rem; font-weight: 900; color: var(--oro); flex-shrink: 0; min-width: 28px; text-align: right; }
        .j-pts.winner { color: var(--oro); }
        .j-pts.loser { color: #333; }
        .vs-divider { text-align: center; font-size: 0.6rem; color: #222; padding: 4px 0; letter-spacing: 2px; }
        .conector { display: flex; justify-content: center; margin: -4px 0 18px; }
        .conector-linea { width: 2px; height: 24px; background: linear-gradient(var(--oro), transparent); opacity: 0.25; }
        .campeon-panel { background: linear-gradient(135deg, #1a1200, #0a0800); border: 2px solid var(--oro); border-radius: 22px; padding: 22px; text-align: center; margin: 20px 0; box-shadow: 0 0 36px rgba(212,175,55,0.15); }
        .campeon-panel .trofeo { font-size: 3rem; display: block; margin-bottom: 8px; }
        .campeon-panel .campeon-lbl { color: #444; font-size: 0.58rem; letter-spacing: 3px; margin-bottom: 6px; }
        .campeon-panel .campeon-nombre { color: var(--oro); font-size: 1.6rem; }
        .empty-state { text-align: center; padding: 50px 24px; color: #333; }
        .empty-state div { font-size: 2.8rem; margin-bottom: 14px; }
        .empty-state p { font-size: 0.8rem; line-height: 1.7; }
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: linear-gradient(transparent, #000 45%); padding: 10px 15px 22px; display: flex; gap: 8px; }
        .btn-nav { flex: 1; padding: 12px 8px; background: #0f0f0f; border: 1px solid var(--g1); border-radius: 14px; color: #777; font-size: 0.65rem; text-align: center; text-decoration: none; display: block; font-family: 'Arial Black', sans-serif; letter-spacing: 1px; }
        .btn-nav.activo { border-color: var(--oro); color: var(--oro); background: rgba(212,175,55,0.08); }
        .btn-nav:active { border-color: var(--oro); color: var(--oro); }
    </style>
</head>
<body>
    <div class="header">
        <h1>&#127939; LLAVES</h1>
        <small id="lbl-sub">—</small>
    </div>
    <div class="contenido" id="contenido">
        <div class="empty-state"><div>⏳</div><p>Cargando...</p></div>
    </div>
    <div class="nav-bottom">
        <a href="index.html" class="btn-nav">&#127968; INICIO</a>
        <a href="inscripciones.html" class="btn-nav">&#128203; INSCRIPCIONES</a>
        <a href="Brackets.html" class="btn-nav activo">&#127942; LLAVES</a>
        <a href="control_torneo.html" class="btn-nav">&#9881; CONTROL</a>
    </div>
<script src="core.js"></script>
<script>
var torneo = null;

function cargar() {
    if (typeof MasterVIP === 'undefined') {
        document.getElementById('contenido').innerHTML = '<div class="empty-state"><div>&#9888;</div><p>Error: core.js no cargado.</p></div>';
        return;
    }
    torneo = MasterVIP.getTorneoActivo();
    if (!torneo) {
        document.getElementById('lbl-sub').innerText = 'Sin torneo activo';
        document.getElementById('contenido').innerHTML = '<div class="empty-state"><div>&#127942;</div><p>No hay torneo activo.<br>Crea uno desde el menú principal.</p><a href="index.html" style="display:inline-block;margin-top:14px;padding:12px 24px;background:var(--oro);color:#000;border-radius:14px;font-size:0.7rem;text-decoration:none;font-weight:bold;">IR AL INICIO</a></div>';
        return;
    }
    document.getElementById('lbl-sub').innerText = torneo.nombre + ' · ' + (torneo.modalidad || '') + ' · ' + (torneo.inscritos || []).length + ' jugadores';
    if (!torneo.rondas || torneo.rondas.length === 0) {
        document.getElementById('contenido').innerHTML = '<div class="empty-state"><div>&#127922;</div><p>El sorteo aún no se ha realizado.<br>Ve a <b style="color:var(--oro)">Inscripciones</b>, inscribe a los jugadores y pulsa <b>CERRAR INSCRIPCIONES Y SORTEAR</b>.</p><a href="inscripciones.html" style="display:inline-block;margin-top:14px;padding:12px 24px;background:var(--oro);color:#000;border-radius:14px;font-size:0.7rem;text-decoration:none;font-weight:bold;">IR A INSCRIPCIONES</a></div>';
        return;
    }
    dibujarLista();
}

function dibujarLista() {
    var totalRondas = MasterVIP.totalRondas((torneo.inscritos || []).length);
    var html = '';
    if (torneo.estado === 'FINALIZADO' && torneo.campeon) {
        html += '<div class="campeon-panel"><span class="trofeo">&#127942;</span><div class="campeon-lbl">CAMPEÓN</div><div class="campeon-nombre">' + (torneo.campeon || '').replace(/</g,'&lt;') + '</div></div>';
    }
    for (var ri = 0; ri < torneo.rondas.length; ri++) {
        var ronda = torneo.rondas[ri];
        var esActual = ri === torneo.rondas.length - 1;
        var nomRonda = MasterVIP.nombreRonda(totalRondas, ronda.numero);
        html += '<div class="ronda-bloque"><div class="ronda-titulo"><div class="ronda-titulo-linea"></div><span class="ronda-titulo-txt">' + nomRonda + '</span><span class="ronda-titulo-badge' + (esActual ? '' : ' completada') + '">' + (esActual ? 'EN CURSO' : 'COMPLETADA') + '</span><div class="ronda-titulo-linea"></div></div>';
        for (var pi = 0; pi < ronda.partidas.length; pi++) {
            html += buildCard(ronda.partidas[pi], pi + 1);
        }
        if (ri < torneo.rondas.length - 1) {
            html += '<div class="conector"><div class="conector-linea"></div></div>';
        }
        html += '</div>';
    }
    document.getElementById('contenido').innerHTML = html;
}

function buildCard(p, num) {
    var cls = 'partida-card ';
    if (p.estado === 'BYE') cls += 'bye';
    else if (p.estado === 'TERMINADA') cls += 'terminada';
    else if (p.estado === 'EN_JUEGO') cls += 'en-juego';
    else cls += 'pendiente';
    var html = '<div class="' + cls + '">';
    var badgeTxt = 'PENDIENTE', badgeCls = 'est-pendiente';
    if (p.estado === 'BYE') { badgeTxt = 'BYE'; badgeCls = 'est-bye'; }
    else if (p.estado === 'TERMINADA') { badgeTxt = 'TERMINADA'; badgeCls = 'est-terminada'; }
    else if (p.estado === 'EN_JUEGO') { badgeTxt = 'EN JUEGO'; badgeCls = 'est-en-juego'; }
    html += '<div class="card-estado"><span class="card-num">PARTIDA ' + num + '</span><span class="est-badge ' + badgeCls + '">' + badgeTxt + '</span></div>';
    if (p.estado === 'BYE') {
        html += '<div class="jugador-row bye-row"><span class="j-corona">&#128081;</span><span class="j-nombre">' + (p.j1 || '').replace(/</g,'&lt;') + '</span><span class="j-prom">' + parseFloat(p.prom1 || 0).toFixed(3) + '</span></div>';
        return html + '</div>';
    }
    var g1 = p.ganador === p.j1, g2 = p.ganador === p.j2, term = p.estado === 'TERMINADA';
    html += '<div class="jugador-row ' + (term ? (g1 ? 'ganador' : 'perdedor') : '') + '"><span class="j-corona">' + (g1 ? '&#128081;' : '&#127921;') + '</span><span class="j-nombre">' + (p.j1 || '').replace(/</g,'&lt;') + '</span><span class="j-prom">' + parseFloat(term ? p.promFinalJ1 || p.prom1 : p.prom1 || 0).toFixed(3) + '</span>' + (term ? '<span class="j-pts ' + (g1 ? 'winner' : 'loser') + '">' + (p.pts1 || 0) + '</span>' : '') + '</div>';
    html += '<div class="vs-divider">' + (term ? '· · ·' : 'VS') + '</div>';
    html += '<div class="jugador-row ' + (term ? (g2 ? 'ganador' : 'perdedor') : '') + '"><span class="j-corona">' + (g2 ? '&#128081;' : '&#127921;') + '</span><span class="j-nombre">' + (p.j2 || '').replace(/</g,'&lt;') + '</span><span class="j-prom">' + parseFloat(term ? p.promFinalJ2 || p.prom2 : p.prom2 || 0).toFixed(3) + '</span>' + (term ? '<span class="j-pts ' + (g2 ? 'winner' : 'loser') + '">' + (p.pts2 || 0) + '</span>' : '') + '</div>';
    return html + '</div>';
}

window.onload = function () {
    try {
        if (typeof MasterVIP !== 'undefined' && MasterVIP.init) MasterVIP.init();
        if (typeof MasterVIP !== 'undefined' && MasterVIP.applyDesign) MasterVIP.applyDesign();
    } catch (e) { console.warn('Init:', e); }
    cargar();
};
</script>
<script src="whitelabel.js"></script>
</body>
</html>
