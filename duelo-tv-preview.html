<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duelo TV Preview — DeCarambola</title>
    <style>
        :root {
            --oro:   var(--dc-gold);
            --negro: #0b0b0b;
            --azul:  #3498db;
            --neon:  #2eff70;
            --rojo:  #e74c3c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--negro);
            color: #fff;
            font-family: 'var(--dc-font-body)', Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* Layout TV: solo fase 2 (marcador + video) */
        .tv-root {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── CABEZOTE SUPERIOR ── */
        .barra-top {
            background:#000;
            border-bottom:1px solid #1a1a1a;
        }
        .barra-top-inner {
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:10px 18px;
            height:58px;
        }
        .meta-info {
            display:flex;
            flex-direction:column;
            gap:2px;
        }
        .meta-lbl { color:#333;font-size:0.55rem;letter-spacing:2px; }
        .meta-val { color:var(--oro);font-size:0.9rem; }
        .reloj-box {
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:2px;
        }
        .reloj-ent { color:#333;font-size:0.58rem;letter-spacing:2px; }
        #reloj {
            font-size:2.2rem;
            color:var(--neon);
            font-family:'Courier New',monospace;
            text-shadow:0 0 12px var(--neon);
            line-height:1;
            min-width:52px;
            text-align:center;
        }
        #reloj.urgente {
            color:var(--rojo);
            text-shadow:0 0 12px var(--rojo);
            animation:parpadeo 0.5s infinite;
        }
        @keyframes parpadeo { 0%,100%{opacity:1} 50%{opacity:0.25} }
        .btn-pausa {
            background:rgba(255,255,255,0.06);
            border:1px solid #333;
            color:#aaa;
            font-size:1.1rem;
            width:34px;height:34px;
            border-radius:50%;
            cursor:pointer;
            display:flex;
            align-items:center;
            justify-content:center;
            transition:0.2s;
            flex-shrink:0;
        }
        .btn-fin {
            background:rgba(231,76,60,0.12);
            border:1px solid rgba(231,76,60,0.4);
            color:#e88;
            padding:8px 14px;
            border-radius:16px;
            font-size:0.68rem;
            cursor:pointer;
            letter-spacing:1px;
            font-family:'var(--dc-font-body)',sans-serif;
            transition:0.2s;
        }
        .btn-fin:active { background:rgba(231,76,60,0.25);color:#fff; }
        .btn-siguiente-set {
            background:rgba(46,255,112,0.1);
            border:1px solid rgba(46,255,112,0.35);
            color:var(--neon);
            padding:8px 14px;
            border-radius:12px;
            font-size:0.68rem;
            font-weight:bold;
            letter-spacing:1px;
            cursor:pointer;
            font-family:'var(--dc-font-body)',sans-serif;
        }
        .btn-siguiente-set:active { background:rgba(46,255,112,0.2); }
        .btn-bolas-tv {
            background:rgba(255,255,255,0.05);
            border:1px solid #444;
            color:#ddd;
            padding:6px 10px;
            border-radius:12px;
            font-size:0.6rem;
            cursor:pointer;
            font-family:'var(--dc-font-body)',sans-serif;
        }
        .btn-bolas-tv:active { background:rgba(255,255,255,0.15); }

        .barra-indicadores {
            display:flex;
            align-items:center;
            justify-content:center;
            gap:24px;
            padding:8px 18px 10px;
            font-size:0.88rem;
            color:#666;
            letter-spacing:1px;
            border-top:1px solid #111;
            flex-wrap:wrap;
        }
        .barra-indicadores .ind-val {
            color:var(--oro);
            font-family:'Courier New',monospace;
            font-size:1.05rem;
        }

        /* ── BARRA DE LOGOS (Paso 2: logo club + decarambola.com pequeño) ── */
        .tv-logos-bar {
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:8px 18px 6px;
            background:#000;
            border-bottom:1px solid #1a1a1a;
            min-height:44px;
        }
        .tv-logo-club-wrap {
            display:flex;
            align-items:center;
            min-height:40px;
        }
        .tv-logo-club-wrap img {
            max-height:44px;
            max-width:160px;
            object-fit:contain;
        }
        .tv-logo-club-placeholder {
            font-size:0.65rem;
            color:#444;
            letter-spacing:2px;
        }
        .tv-logo-decarambola {
            display:flex;
            align-items:center;
            gap:6px;
            opacity:0.7;
        }
        .tv-logo-decarambola img {
            height:22px;
            width:auto;
            object-fit:contain;
        }
        .tv-logo-decarambola .dc-com {
            font-size:0.6rem;
            color:#888;
            letter-spacing:1px;
            font-family:Arial,sans-serif;
        }

        /* ── CUERPO: 3 COLUMNAS (J1 | VIDEO | J2) ── */
        .tv-main {
            flex:1;
            display:grid;
            grid-template-columns:1fr 1fr 1fr;
            gap:0;
            padding:8px 10px 12px;
            padding-bottom:170px;
            min-height:0;
        }
        .panel-jugador {
            background:#0a0a0a;
            border:1px solid #1a1a1a;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:space-between;
            padding:14px 10px 12px;
        }
        .panel-jugador.activo {
            background:rgba(212,175,55,0.12);
            border:2px solid var(--oro);
            box-shadow:0 0 24px rgba(212,175,55,0.35), inset 0 0 0 1px rgba(212,175,55,0.15);
        }
        .panel-jugador h2 {
            font-size:0.8rem;
            letter-spacing:2px;
            color:#ccc;
            margin-bottom:10px;
            text-align:center;
        }
        .panel-meta {
            font-size:0.55rem;
            color:#555;
            letter-spacing:2px;
            margin-bottom:6px;
        }
        .panel-meta span {
            color:var(--oro);
        }
        .bola {
            width:min(72%,200px);
            height:min(72%,200px);
            aspect-ratio:1;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            position:relative;
        }
        .bola-blanca {
            background: var(--dc-bg);
                #ffffff 0%, #f0f0f0 15%, #d0d0d0 35%, #999 60%, #555 85%, #1a1a1a 100%);
            box-shadow:
                inset -14px -14px 28px rgba(0,0,0,0.65),
                inset 6px 6px 14px rgba(255,255,255,0.35),
                8px 10px 28px rgba(0,0,0,0.95),
                0 0 0 2px #111;
        }
        .bola-dorada {
            background: var(--dc-bg);
                #fffde0 0%, #fce84a 12%, #e8c020 30%, #c89a00 55%, #7a5500 80%, #2a1800 100%);
            box-shadow:
                inset -14px -14px 28px rgba(0,0,0,0.6),
                inset 6px 6px 14px rgba(255,230,80,0.4),
                8px 10px 28px rgba(0,0,0,0.95),
                0 0 0 2px #111,
                0 0 22px rgba(212,175,55,0.18);
        }
        .bola::after {
            content:'';
            position:absolute;
            top:12%;left:18%;
            width:30%;height:22%;
            background: var(--dc-bg);
            border-radius:50%;
            pointer-events:none;
        }
        .bola .pts {
            font-size:clamp(2rem,4vw,3.5rem);
            font-weight:900;
            color:#111;
            text-shadow:0 2px 4px rgba(255,255,255,0.25);
        }
        .bola.dorada .pts {
            color:#1a0f00;
            text-shadow:0 1px 3px rgba(255,200,0,0.2);
        }

        .stats-grid {
            margin-top:6px;
            width:100%;
            max-width:220px;
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:6px 14px;
            font-size:0.7rem;
            color:#aaa;
        }
        .stat-label {
            font-size:0.6rem;
            color:#777;
            letter-spacing:1px;
        }
        .stat-value {
            font-family:'Courier New',monospace;
            font-weight:900;
            color:#fff;
            font-size:clamp(1.1rem,2.2vw,1.6rem);
        }

        @media (max-height: 750px) {
            body { overflow-y:auto; }
            .tv-main { padding:4px 6px 8px; padding-bottom:170px; }
            .panel-jugador { padding:10px 8px 8px; }
        }

        .panel-meta-bar {
            width:100%;
            height:4px;
            background:#111;
            border-radius:2px;
            margin-top:8px;
            overflow:hidden;
        }
        .panel-meta-fill {
            height:100%;
            background:var(--oro);
            width:0%;
            transition:width 0.3s ease;
        }

        /* Columna central: video */
        .panel-video {
            background:#050505;
            border:1px solid #1a1a1a;
            display:flex;
            flex-direction:column;
            padding:10px 8px;
            align-items:center;
            justify-content:flex-start;
        }
        .panel-video h3 {
            font-size:0.6rem;
            color:#777;
            letter-spacing:2px;
            margin-bottom:6px;
        }
        .video-frame {
            width:100%;
            flex:1;
            display:flex;
            align-items:center;
            justify-content:center;
            background:#000;
            border-radius:10px;
            overflow:hidden;
        }
        .video-frame iframe,
        .video-frame video {
            width:100%;
            height:100%;
            object-fit:cover;
        }
        .video-frame iframe { border:none; }
        .video-placeholder {
            width:100%;
            height:100%;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            gap:12px;
            color:#666;
            font-size:0.65rem;
            letter-spacing:2px;
        }
        .video-placeholder .btn-ver-camara {
            padding:14px 24px;
            background:linear-gradient(135deg,rgba(212,175,55,0.25),rgba(212,175,55,0.1));
            border:2px solid var(--oro);
            color:var(--oro);
            border-radius:14px;
            font-size:0.8rem;
            font-weight:bold;
            letter-spacing:2px;
            cursor:pointer;
            font-family:var(--dc-font-body),sans-serif;
            box-shadow:0 0 16px rgba(212,175,55,0.2);
        }
        .video-placeholder .btn-ver-camara:hover {
            background:linear-gradient(135deg,rgba(212,175,55,0.35),rgba(212,175,55,0.15));
            box-shadow:0 0 20px rgba(212,175,55,0.35);
        }
        #video-cam-local { display:none; }
        #video-cam-local.activo { display:block; }
        .video-logo-overlay {
            position:absolute;
            bottom:12px;
            right:12px;
            width:56px;
            height:56px;
            border-radius:50%;
            object-fit:contain;
            background:rgba(0,0,0,0.4);
            padding:4px;
            opacity:0.5;
            pointer-events:none;
            z-index:2;
        }
        .video-frame { position:relative; }

        /* Teclado inferior (anotar carambolas) */
        .teclado-wrap {
            position:fixed;
            bottom:0;left:0;right:0;
            z-index:50;
            background:#000;
            border-top:1px solid #1a1a1a;
            padding:8px 10px 14px;
            height:155px;
            display:flex;
            flex-direction:column;
            gap:6px;
        }
        .teclado-header {
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:0 2px;
            height:36px;
            flex-shrink:0;
        }
        .turno-quien { display:flex; align-items:center; gap:8px; }
        .turno-bola { width:28px;height:28px; border-radius:50%; flex-shrink:0; }
        .turno-bola.blanca {
            background: var(--dc-bg);
            box-shadow:inset -3px -3px 6px rgba(0,0,0,0.5),2px 2px 6px rgba(0,0,0,0.8);
        }
        .turno-bola.dorada {
            background: var(--dc-bg);
            box-shadow:inset -3px -3px 6px rgba(0,0,0,0.5),2px 2px 6px rgba(0,0,0,0.8);
        }
        .turno-nombre { font-size:0.85rem; color:var(--oro); letter-spacing:2px; line-height:1; font-weight:900; }
        .turno-sub { font-size:0.5rem; color:#555; letter-spacing:2px; margin-top:2px; }
        .turno-metas { display:flex; align-items:center; gap:6px; }
        .turno-meta-item {
            display:flex; align-items:baseline; gap:2px;
            background:#0f0f0f; border:1px solid #1a1a1a;
            border-radius:10px; padding:4px 10px;
        }
        .turno-meta-item.activo { border-color:var(--oro); background:rgba(212,175,55,0.07); }
        .tm-val { font-size:1.1rem; font-weight:900; color:#fff; font-family:'Courier New',monospace; }
        .tm-tot { font-size:0.75rem; color:#555; font-family:'Courier New',monospace; }
        .tm-sep { color:#333;font-size:0.7rem;margin:0 1px; }

        .teclado { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; flex:1; }
        .btn-num {
            background:#111; border:1px solid #1c1c1c; color:#fff;
            border-radius:12px; font-size:1.5rem; font-weight:900;
            cursor:pointer; transition:0.1s; font-family:'var(--dc-font-body)',sans-serif; user-select:none;
        }
        .btn-num:active { background:#252525;transform:scale(0.9);border-color:var(--oro); }
        .btn-restar {
            background:rgba(231,76,60,0.1); border-color:rgba(231,76,60,0.2);
            color:var(--rojo);font-size:1.8rem;
        }
        .btn-restar:active { background:rgba(231,76,60,0.22); }
        .btn-sig {
            height:38px;
            background:linear-gradient(135deg,var(--azul),#1460a0);
            color:#fff;border:none;border-radius:12px;
            font-size:0.85rem;font-weight:900;
            cursor:pointer;letter-spacing:2px;
            font-family:'var(--dc-font-body)',sans-serif;
        }
        .btn-sig:active { transform:scale(0.97);opacity:0.85; }

        /* Modo OBS (?obs=1): zona central transparente, sin texto, para que solo se vea la cámara (Paso 3) */
        body.obs-mode .panel-video,
        body.obs-mode .video-frame,
        body.obs-mode .video-placeholder {
            background: transparent !important;
        }
        body.obs-mode .panel-video {
            border-color: transparent;
        }
        body.obs-mode .panel-video h3,
        body.obs-mode .video-placeholder {
            display: none !important;
        }
        /* En el navegador (Ver transparencia): borde para ver la zona transparente como en OBS */
        body.obs-mode.browser-preview .video-frame {
            box-shadow: inset 0 0 0 3px rgba(212,175,55,0.5);
            background: repeating-linear-gradient(45deg, transparent, transparent 14px, rgba(212,175,55,0.04) 14px, rgba(212,175,55,0.04) 15px) !important;
        }
        .btn-bolas-tv.desactivado { opacity:0.4; pointer-events:none; cursor:not-allowed; }
    </style>

</head>
<body id="body-tv" class="dc-ux dc-ux-skin m-root-legacy">
<div class="tv-root">

    <div class="tv-logos-bar">
        <div class="tv-logo-club-wrap">
            <img id="tv-logo-club" src="" alt="" style="display:none;">

        <a href="https://decarambola.com" target="_blank" rel="noopener" class="tv-logo-decarambola" title="decarambola.com">

            <span class="dc-com">decarambola.com</span>
        </a>
    </div>

    <div class="barra-top">
        <div class="barra-top-inner">
            <div class="meta-info">
                <span class="meta-lbl" id="lbl-meta1-top">META J1</span>
                <span class="meta-val" id="lbl-pts-meta1">— / —</span>
            </div>
            <div class="reloj-box">
                <span class="reloj-ent" id="lbl-ent-top">ENTRADA 1</span>
                <div style="display:flex;align-items:center;gap:8px;">
                    <div id="reloj">40</div>
                    <button id="btn-pausa" class="btn-pausa">⏸</button>

            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
                <div style="display:flex;gap:6px;align-items:center;">
                    <button class="btn-bolas-tv" id="btn-bolas-tv" title="Intercambiar bolas blanca/dorada">⚪⇄🟡</button>
                    <button class="btn-siguiente-set" id="btn-siguiente-set">▶ SIG. SET</button>
                    <button class="btn-fin" id="btn-fin">🏁 FINALIZAR</button>
                </div>
                <span class="meta-val" style="font-size:0.75rem;" id="lbl-pts-meta2">— / —</span>

        </div>
        <div class="barra-indicadores">
            <span>MESA <span class="ind-val" id="ind-mesa">—</span></span>

    <div class="tv-main">
        <div class="panel-jugador" id="panel-j1">

            <div class="bola bola-blanca" id="bola1-sb">
                <div class="pts" id="pts1-sb">0</div>
            </div>
            <div class="stats-grid">
                <div><div class="stat-label">ENTRADAS</div><div class="stat-value" id="ent1-sb">0</div></div>
                <div><div class="stat-label">PROMEDIO</div><div class="stat-value" id="prom1-sb">0.000</div></div>
                <div><div class="stat-label">SERIE</div><div class="stat-value" id="serie1-sb">0</div></div>
                <div><div class="stat-label">S. MAYOR</div><div class="stat-value" id="ms1-sb">0</div></div>
            </div>
            <div class="panel-meta-bar"><div class="panel-meta-fill" id="fill1-sb"></div></div>
        </div>

        <div class="panel-video">
            <h3 id="lbl-video-header">MESA — STREAM EN VIVO</h3>
            <div class="video-frame">
                <div class="video-placeholder" id="video-placeholder">
                    <span id="video-placeholder-text">Mesa 2 — Cámara</span>
                    <button type="button" class="btn-ver-camara" id="btn-ver-camara">Mostrar cámara Mesa 2</button>

                <img id="video-logo-overlay" class="video-logo-overlay" src="" alt="" style="display:none;">
            </div>
        </div>

        <div class="panel-jugador" id="panel-j2">
            <div>
                <h2 id="lbl2-sb">JUGADOR B</h2>
                <div class="panel-meta">META <span id="meta2-sb">0</span></div>
            </div>
            <div class="bola bola-dorada" id="bola2-sb">
                <div class="pts" id="pts2-sb">0</div>
            </div>
            <div class="stats-grid">
                <div><div class="stat-label">ENTRADAS</div><div class="stat-value" id="ent2-sb">0</div></div>
                <div><div class="stat-label">PROMEDIO</div><div class="stat-value" id="prom2-sb">0.000</div></div>
                <div><div class="stat-label">SERIE</div><div class="stat-value" id="serie2-sb">0</div></div>
                <div><div class="stat-label">S. MAYOR</div><div class="stat-value" id="ms2-sb">0</div></div>

            <div class="panel-meta-bar"><div class="panel-meta-fill" id="fill2-sb"></div></div>

    <div class="teclado-wrap">
        <div class="teclado-header">
            <div class="turno-quien">
                <div class="turno-bola" id="tk-bola"></div>
                <div>
                    <div class="turno-nombre" id="tk-nombre">—</div>
                    <div class="turno-sub" id="tk-entrada">ENTRADA 1</div>
                </div>
            </div>
            <div class="turno-metas">
                <div class="turno-meta-item" id="tk-meta1">
                    <span class="tm-val" id="tk-v1">0</span>
                    <span class="tm-sep">/</span>
                    <span class="tm-tot" id="tk-t1">∞</span>
                </div>
                <div class="turno-meta-item" id="tk-meta2">
                    <span class="tm-val" id="tk-v2">0</span>
                    <span class="tm-sep">/</span>
                    <span class="tm-tot" id="tk-t2">∞</span>
                </div>
            </div>
        </div>
        <div class="teclado">
            <button class="btn-num" onclick="sumar(1)">1</button>
            <button class="btn-num" onclick="sumar(2)">2</button>
            <button class="btn-num" onclick="sumar(3)">3</button>
            <button class="btn-num" onclick="sumar(4)">4</button>
            <button class="btn-num btn-restar" onclick="restar()">−</button>
        </div>
        <button class="btn-sig" onclick="cambio()">► SIGUIENTE ENTRADA</button>
    </div>
</div>

<script src="core.js"></script>
<script>
    (function() {
        var params = new URLSearchParams(window.location.search);
        var ua = (navigator.userAgent || '').toLowerCase();
        var enOBS = params.get('obs') === '1' || ua.indexOf('obs') !== -1 || ua.indexOf('cef') !== -1;
        if (enOBS) document.body.classList.add('obs-mode');
        if (params.get('obs') === '1') document.body.classList.add('browser-preview');
    })();
    (function() {
        var logoEl = document.getElementById('tv-logo-club');
        var ph = document.getElementById('tv-logo-club-ph');
        if (!logoEl) return;
        var clubUrl = (typeof window.WL !== 'undefined' && window.WL.getLogoUrl && window.WL.getLogoUrl()) || localStorage.getItem('wl_club_logo_url');
        var clubNombre = (localStorage.getItem('wl_club_nombre') || '').toUpperCase();
        function urlAsset(path) {
            var href = window.location.href || '';
            var base = href.replace(/[#?].*$/, '').replace(/\/[^/]*$/, '/');
            return base + path.replace(/^\//, '');
        }

        var MASTER_VIP_LOGO_URL = urlAsset('assets/logo-master-vip.svg');
        var overlay = document.getElementById('video-logo-overlay');
        function setLogoYOverlay(src, show) {
            if (logoEl) { logoEl.src = src; logoEl.style.display = show ? 'block' : 'none'; }
            if (ph) ph.style.display = show ? 'none' : 'block';
            if (overlay && src) { overlay.src = src; overlay.style.display = show ? 'block' : 'none'; }
        }
        if (clubUrl) {
            logoEl.alt = localStorage.getItem('wl_club_nombre') || 'Club';
            setLogoYOverlay(clubUrl, true);
        } else {
            logoEl.alt = 'Master V.I.P.';
            logoEl.src = MASTER_VIP_LOGO_URL;
            logoEl.style.display = 'block';
            if (ph) ph.style.display = 'none';
            if (overlay) { overlay.src = MASTER_VIP_LOGO_URL; overlay.style.display = 'block'; }
            logoEl.onerror = function() {
                var fallback = urlAsset('assets/logo-master-vip.svg');
                logoEl.src = fallback;
                if (overlay) overlay.src = fallback;
                logoEl.onerror = function() {
                    logoEl.style.display = 'none';
                    if (ph) ph.style.display = 'block';
                    if (overlay) overlay.style.display = 'none';
                };
            };
        }
        var deca = document.getElementById('img-decarambola');
        if (deca) deca.src = urlAsset('assets/logo-decarambola.svg');
    })();
    let bolasInvertidas = false;
    let d = { p1:0,p2:0,e1:0,e2:0,s1:0,s2:0,ms1:0,ms2:0,t:1 };
    let cfg = { meta1:25,meta2:25,tiempo:40,mesa:'2',streamUrl:'' };
    let tiempoRestante = cfg.tiempo;
    let timer = null;
    let pausado = false;
    let partidaStartTime = Date.now();
    let partidaTotalPausedMs = 0;
    let pauseStartTime = 0;
    let partidaTerminada = false;
    var permitirCambioBolas = true;

    function actualizarUI() {
        document.getElementById('lbl1-sb').innerText = 'JUGADOR A';
        document.getElementById('lbl2-sb').innerText = 'JUGADOR B';
        document.getElementById('pts1-sb').innerText = d.p1;
        document.getElementById('pts2-sb').innerText = d.p2;
        document.getElementById('ent1-sb').innerText = d.e1;
        document.getElementById('ent2-sb').innerText = d.e2;
        document.getElementById('prom1-sb').innerText = d.e1>0?(d.p1/d.e1).toFixed(3):'0.000';
        document.getElementById('prom2-sb').innerText = d.e2>0?(d.p2/d.e2).toFixed(3):'0.000';
        document.getElementById('serie1-sb').innerText = d.s1;
        document.getElementById('serie2-sb').innerText = d.s2;
        document.getElementById('ms1-sb').innerText = d.ms1;
        document.getElementById('ms2-sb').innerText = d.ms2;
        document.getElementById('meta1-sb').innerText = cfg.meta1;
        document.getElementById('meta2-sb').innerText = cfg.meta2;
        document.getElementById('fill1-sb').style.width = cfg.meta1>0?Math.min(100,(d.p1/cfg.meta1)*100)+'%':'0%';
        document.getElementById('fill2-sb').style.width = cfg.meta2>0?Math.min(100,(d.p2/cfg.meta2)*100)+'%':'0%';
        document.getElementById('lbl-pts-meta1').innerText = d.p1 + '/' + cfg.meta1;
        document.getElementById('lbl-pts-meta2').innerText = d.p2 + '/' + cfg.meta2;
        document.getElementById('ind-mesa').innerText = 'Mesa ' + cfg.mesa;
        actualizarTecladoHeader();
    }

    function actualizarTecladoHeader() {
        const nom1 = 'JUGADOR A', nom2 = 'JUGADOR B';
        const nomActivo = d.t===1?nom1:nom2;
        const bola = document.getElementById('tk-bola');
        var colorTurno = d.t===1?'blanca':'dorada';
        if (bolasInvertidas) colorTurno = colorTurno==='blanca'?'dorada':'blanca';
        bola.className = 'turno-bola ' + colorTurno;
        document.getElementById('tk-nombre').innerText = nomActivo;
        document.getElementById('tk-entrada').innerText = 'ENTRADA ' + (d.t===1?d.e1+1:d.e2+1);
        document.getElementById('tk-v1').innerText = d.p1;
        document.getElementById('tk-t1').innerText = cfg.meta1>0?cfg.meta1:'∞';
        document.getElementById('tk-v2').innerText = d.p2;
        document.getElementById('tk-t2').innerText = cfg.meta2>0?cfg.meta2:'∞';
        document.getElementById('tk-meta1').className = 'turno-meta-item' + (d.t===1?' activo':'');
        document.getElementById('tk-meta2').className = 'turno-meta-item' + (d.t===2?' activo':'');
        var p1 = document.getElementById('panel-j1'), p2 = document.getElementById('panel-j2');
        if (p1) p1.classList.toggle('activo', d.t === 1);
        if (p2) p2.classList.toggle('activo', d.t === 2);
        var btnBolas = document.getElementById('btn-bolas-tv');
        if (btnBolas) btnBolas.classList.toggle('desactivado', d.p1 + d.p2 > 0);
    }

    function actualizarIndicadoresTiempo() {
        if (!partidaStartTime) return;
        var elapsedMs = pausado ? (pauseStartTime - partidaStartTime - partidaTotalPausedMs) : (Date.now() - partidaStartTime - partidaTotalPausedMs);
        var elapsedSec = Math.max(0, Math.floor(elapsedMs / 1000));
        document.getElementById('ind-transcurrido').innerText = Math.floor(elapsedSec/60) + ':' + (elapsedSec%60<10?'0':'') + (elapsedSec%60);
    }

    function iniciarReloj() {
        clearInterval(timer);
        pausado = false;
        document.getElementById('reloj').innerText = tiempoRestante;
        timer = setInterval(function(){
            if (pausado) return;
            tiempoRestante--;
            document.getElementById('reloj').innerText = tiempoRestante;
            if (tiempoRestante<=10) document.getElementById('reloj').classList.add('urgente');
            if (tiempoRestante<=0) { clearInterval(timer); cambio(); }
            actualizarIndicadoresTiempo();
        },1000);
        actualizarIndicadoresTiempo();
    }

    function togglePausa() {
        pausado = !pausado;
        var btn = document.getElementById('btn-pausa');
        var rel = document.getElementById('reloj');
        if (pausado) {
            pauseStartTime = Date.now();
            btn.innerText = '▶';
            btn.style.color = '#2eff70';
            btn.style.borderColor = '#2eff70';
            rel.style.opacity = '0.4';
        } else {
            partidaTotalPausedMs += Date.now() - pauseStartTime;
            btn.innerText = '⏸';
            btn.style.color = '#aaa';
            btn.style.borderColor = '#333';
            rel.style.opacity = '1';
        }
        actualizarIndicadoresTiempo();
    }

    function sumar(n) {
        if (partidaTerminada) return;
        var meta = d.t === 1 ? cfg.meta1 : cfg.meta2;
        if (meta > 0 && d['p'+d.t] >= meta) return;
        if (meta > 0 && d['p'+d.t] + n >= meta) {
            mostrarConfirmacionMeta(n);
            return;
        }
        d['p'+d.t] += n;
        d['s'+d.t] += n;
        if (d['s'+d.t] > d['ms'+d.t]) d['ms'+d.t] = d['s'+d.t];
        actualizarUI();
    }
    function restar() {
        if (partidaTerminada) return;
        if (d['p'+d.t] > 0) { d['p'+d.t]--; if (d['s'+d.t]>0) d['s'+d.t]--; }
        actualizarUI();
    }
    function mostrarConfirmacionMeta(n) {
        var meta = d.t === 1 ? cfg.meta1 : cfg.meta2;
        var nom = d.t === 1 ? 'JUGADOR A' : 'JUGADOR B';
        var overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;z-index:998;background:rgba(0,0,0,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;';
        overlay.innerHTML =
            '<div style="font-size:2.5rem;">🎱</div>' +
            '<div style="color:#aaa;font-size:0.55rem;letter-spacing:3px;">¿ALCANZÓ LA META?</div>' +
            '<div style="color:var(--oro);font-size:1.1rem;letter-spacing:2px;text-align:center;">' + nom + ' llegó a ' + meta + ' carambolas</div>' +
            '<div style="color:#666;font-size:0.6rem;text-align:center;max-width:280px;">Confirmar ganador para terminar, o subir meta para seguir jugando.</div>' +
            '<div style="display:flex;flex-direction:column;gap:10px;width:100%;max-width:260px;">' +
            '<button type="button" id="btn-conf-ganador" style="background:linear-gradient(135deg,var(--oro),#a07800);color:#000;border:none;padding:14px 24px;border-radius:14px;font-size:0.85rem;font-weight:bold;cursor:pointer;">✓ CONFIRMAR GANADOR</button>' +
            '<button type="button" id="btn-subir-meta" style="background:rgba(46,255,112,0.15);color:#2eff70;border:1px solid rgba(46,255,112,0.4);padding:14px 24px;border-radius:14px;font-size:0.8rem;cursor:pointer;">Subir meta +5 y seguir</button>' +
            '</div>';
        overlay.querySelector('#btn-conf-ganador').onclick = function() {
            document.body.removeChild(overlay);
            partidaTerminada = true;
            clearInterval(timer);
            d['p'+d.t] += n;
            d['s'+d.t] += n;
            if (d['s'+d.t] > d['ms'+d.t]) d['ms'+d.t] = d['s'+d.t];
            actualizarUI();
            mostrarOpcionesCertificado();
        };
        overlay.querySelector('#btn-subir-meta').onclick = function() {
            document.body.removeChild(overlay);
            if (d.t === 1) cfg.meta1 += 5; else cfg.meta2 += 5;
            d['p'+d.t] += n;
            d['s'+d.t] += n;
            if (d['s'+d.t] > d['ms'+d.t]) d['ms'+d.t] = d['s'+d.t];
            actualizarUI();
        };
        document.body.appendChild(overlay);
    }

    function mostrarOpcionesCertificado() {
        var nom = d.p1 >= d.p2 ? 'JUGADOR A' : 'JUGADOR B';
        if (d.p1 === d.p2) nom = (d.ms1 >= d.ms2 ? 'JUGADOR A' : 'JUGADOR B');
        var ov = document.createElement('div');
        ov.style.cssText = 'position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;';
        ov.innerHTML =
            '<div style="font-size:3rem;">🏆</div>' +
            '<div style="color:var(--oro);font-size:1.3rem;letter-spacing:3px;">¡GANÓ ' + nom + '!</div>' +
            '<div style="color:#666;font-size:0.6rem;text-align:center;max-width:280px;">¿Emitir certificado? Si certifica, la partida se guarda en historial y cuenta para el promedio. Si no certifica, no se guarda ni cuenta.</div>' +
            '<div style="display:flex;flex-direction:column;gap:10px;width:100%;max-width:260px;">' +
            '<button type="button" id="btn-emitir-certi" style="background:linear-gradient(135deg,var(--oro),#a07800);color:#000;border:none;padding:14px 24px;border-radius:14px;font-size:0.85rem;font-weight:bold;cursor:pointer;">📄 EMITIR CERTIFICADO (QR)</button>' +
            '<button type="button" id="btn-no-certi" style="background:#222;color:#aaa;border:1px solid #333;padding:14px 24px;border-radius:14px;font-size:0.8rem;cursor:pointer;">No certificar / Nueva partida</button>' +
            '</div>';
        ov.querySelector('#btn-emitir-certi').onclick = function() {
            document.body.removeChild(ov);
            guardarPartidaTVEnHistorial();
            mostrarOverlayQR();
        };
        ov.querySelector('#btn-no-certi').onclick = function() {
            document.body.removeChild(ov);
            partidaTerminada = false;
            siguienteSet();
        };
        document.body.appendChild(ov);
    }

    function guardarPartidaTVEnHistorial() {
        try {
            if (typeof window.HISTORIAL === 'undefined' || !window.HISTORIAL.guardarPartida) return;
            var nom1 = 'JUGADOR A', nom2 = 'JUGADOR B';
            var fecha = new Date().toISOString();
            var entradaObj = cfg.meta1 || 0;
            var prom1 = d.e1 > 0 ? (d.p1 / d.e1) : 0;
            var prom2 = d.e2 > 0 ? (d.p2 / d.e2) : 0;
            HISTORIAL.guardarPartida({
                jugador_id: null, jugador_nombre: nom1, rival_nombre: nom2, rival_promedio: prom2,
                entrada_objetivo: entradaObj, entradas_jugador: d.e1, carambolas_jugador: d.p1,
                promedio_partida: prom1, gano: d.p1 >= d.p2, tipo: 'duelo', torneo_nombre: null,
                serie_mayor: d.ms1, fecha: fecha
            });
            HISTORIAL.guardarPartida({
                jugador_id: null, jugador_nombre: nom2, rival_nombre: nom1, rival_promedio: prom1,
                entrada_objetivo: entradaObj, entradas_jugador: d.e2, carambolas_jugador: d.p2,
                promedio_partida: prom2, gano: d.p2 >= d.p1, tipo: 'duelo', torneo_nombre: null,
                serie_mayor: d.ms2, fecha: fecha
            });
        } catch (e) {}
    }

    function mostrarOverlayQR() {
        var el1 = document.getElementById('lbl1-sb'), el2 = document.getElementById('lbl2-sb');
        var nom1 = (el1 && el1.innerText) ? el1.innerText.trim() : 'JUGADOR A';
        var nom2 = (el2 && el2.innerText) ? el2.innerText.trim() : 'JUGADOR B';
        var ganador = d.p1 >= d.p2 ? nom1 : (d.p2 >= d.p1 ? nom2 : (d.ms1 >= d.ms2 ? nom1 : nom2));
        var basePublica = (typeof localStorage !== 'undefined' && localStorage.getItem('wl_cert_base_url')) || 'https://decarambola.com';
        var base = basePublica.replace(/\/$/, '') + '/certificado_ver.html';
        var qs = '?n1=' + encodeURIComponent(nom1) + '&n2=' + encodeURIComponent(nom2) +
            '&p1=' + d.p1 + '&p2=' + d.p2 + '&e1=' + d.e1 + '&e2=' + d.e2 +
            '&ms1=' + d.ms1 + '&ms2=' + d.ms2 + '&ganador=' + encodeURIComponent(ganador);
        var urlCerti = base + qs;
        var qrSrc = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(urlCerti);
        var avisoCel = '<div style="color:#888;font-size:0.55rem;text-align:center;">Partida guardada. El jugador escanea el QR o abre el enlace desde el celular en decarambola.com y ve el certificado: con eso acepta el resultado.</div>';
        var ov = document.createElement('div');
        ov.style.cssText = 'position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:20px;';
        ov.innerHTML =
            '<div style="color:var(--oro);font-size:0.7rem;letter-spacing:3px;">CERTIFICADO EMITIDO</div>' +
            avisoCel +
            '<img src="' + qrSrc + '" alt="QR certificado" style="width:200px;height:200px;border:4px solid var(--oro);border-radius:12px;">' +
            '<button type="button" id="btn-nueva-despues-qr" style="background:linear-gradient(135deg,var(--oro),#a07800);color:#000;border:none;padding:14px 28px;border-radius:14px;font-size:0.9rem;font-weight:bold;cursor:pointer;">Nueva partida</button>';
        ov.querySelector('#btn-nueva-despues-qr').onclick = function() {
            document.body.removeChild(ov);
            partidaTerminada = false;
            siguienteSet();
        };
        document.body.appendChild(ov);
    }

    function cambio() {
        d['e'+d.t]++;
        d['s'+d.t]=0;
        d.t = d.t===1?2:1;
        tiempoRestante = cfg.tiempo;
        iniciarReloj();
        actualizarUI();
        document.getElementById('lbl-ent-top').innerText = 'ENTRADA ' + (d['e'+d.t]+1);
    }

    function intercambiarBolasTv() {
        if (d.p1 + d.p2 > 0) return;
        bolasInvertidas = !bolasInvertidas;
        var b1 = document.getElementById('bola1-sb');
        var b2 = document.getElementById('bola2-sb');
        function swap(el,a,b){
            if (!el) return;
            if (el.classList.contains(a)) { el.classList.remove(a);el.classList.add(b);}
            else if (el.classList.contains(b)) { el.classList.remove(b);el.classList.add(a);}
        }
        swap(b1,'bola-blanca','bola-dorada');
        swap(b2,'bola-blanca','bola-dorada');
        actualizarTecladoHeader();
    }
    function siguienteSet() {
        partidaTerminada = false;
        var btnBolas = document.getElementById('btn-bolas-tv');
        if (btnBolas) btnBolas.classList.remove('desactivado');
        d = { p1:0,p2:0,e1:0,e2:0,s1:0,s2:0,ms1:0,ms2:0,t:1 };
        tiempoRestante = cfg.tiempo;
        iniciarReloj();
        actualizarUI();
    }

    function conectarCamaraMesa2() {
        var v = document.getElementById('video-cam-local');
        var p = document.getElementById('video-placeholder');
        var i = document.getElementById('stream-iframe');
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return Promise.reject(new Error('Navegador sin soporte. Usa http://localhost.'));
        return navigator.mediaDevices.getUserMedia({ video: true, audio: false }).then(function(stream) {
            if (v) { v.srcObject = stream; v.classList.add('activo'); }
            if (p) p.style.display = 'none';
            if (i) i.style.display = 'none';
            return stream;
        });
    }

    function initVideoPanel() {
        var params = new URLSearchParams(window.location.search);
        var stream = params.get('stream');
        var iframe = document.getElementById('stream-iframe');
        var placeholder = document.getElementById('video-placeholder');
        var header = document.getElementById('lbl-video-header');
        var videoCam = document.getElementById('video-cam-local');
        var btnCam = document.getElementById('btn-ver-camara');
        if (stream) {
            cfg.streamUrl = stream;
            iframe.src = stream;
            iframe.style.display = 'block';
            placeholder.style.display = 'none';
            if (videoCam) videoCam.classList.remove('activo');
            header.innerText = 'MESA — STREAM EN VIVO';
        } else {
            iframe.style.display = 'none';
            if (videoCam) videoCam.classList.remove('activo');
            header.innerText = 'MESA 2 — VIDEO / STREAM';
            conectarCamaraMesa2().then(function() {
                placeholder.style.display = 'none';
            }).catch(function() {
                placeholder.style.display = 'flex';
                if (btnCam) {
                    btnCam.onclick = function() {
                        conectarCamaraMesa2().catch(function(err) {
                            alert('No se pudo usar la cámara. ' + (err.message || 'Abre la página con http://localhost y permite el acceso.'));
                        });
                    };
                }
            });
        }
    }

    document.getElementById('btn-pausa').onclick = togglePausa;
    document.getElementById('btn-bolas-tv').onclick = intercambiarBolasTv;
    document.getElementById('btn-siguiente-set').onclick = siguienteSet;

    actualizarUI();
    iniciarReloj();
    initVideoPanel();
</script>

</body>
</html>
