<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Overlay Marcador — DeCarambola</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --oro: #C9A84C;
      --oro-sutil: rgba(201, 168, 76, 0.5);
      --fondo: #0A0A0A;
      --panel: rgba(10, 10, 10, 0.92);
      --texto: #f0f0f0;
      --texto-muted: #888;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: transparent;
      font-family: 'Oswald', sans-serif;
      color: var(--texto);
      width: 1920px;
      height: 1080px;
      overflow: hidden;
    }
    .overlay-root {
      position: relative;
      width: 1920px;
      height: 1080px;
      display: flex;
      flex-direction: column;
      pointer-events: none;
    }

    /* Header fijo */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 32px;
      min-height: 56px;
      background: var(--panel);
      border-bottom: 1px solid var(--oro-sutil);
    }
    .logo-decarambola {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 4px;
      color: var(--oro);
    }
    .header-center {
      flex: 1;
      text-align: center;
      font-family: 'Oswald', sans-serif;
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 2px;
      color: var(--texto);
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .mesa-label {
      font-family: 'Oswald', sans-serif;
      font-size: 1rem;
      color: var(--texto-muted);
    }
    .logo-club {
      width: 40px;
      height: 40px;
      background: var(--fondo);
      border: 1px solid var(--oro-sutil);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: var(--oro);
    }

    /* Contenido central (espacio) */
    .spacer {
      flex: 1;
      min-height: 0;
    }

    /* Marcador inferior (~180px) */
    .score-section {
      padding: 16px 32px 24px;
      min-height: 180px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .score-bar {
      width: 100%;
      max-width: 1600px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: stretch;
      gap: 20px;
      background: var(--panel);
      border-radius: 12px;
      border: 1px solid var(--oro-sutil);
      padding: 20px 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    }
    .player-panel {
      display: flex;
      flex-direction: column;
      gap: 8px;
      border: 1px solid rgba(201, 168, 76, 0.25);
      border-radius: 8px;
      padding: 12px;
      transition: all 0.4s ease;
    }
    .player-panel.panel-ganando {
      border: 2px solid #E8C76A;
    }
    .player-panel.panel-ganando .player-name {
      color: #E8C76A;
      text-shadow: 0 0 12px rgba(232, 199, 106, 0.4);
    }
    .player-panel.panel-ganando .player-score-big {
      color: #E8C76A;
      text-shadow: 0 0 12px rgba(232, 199, 106, 0.35);
    }
    .player-panel.panel-perdiendo {
      border: 1px solid rgba(201, 168, 76, 0.25);
    }
    .player-panel.right {
      text-align: right;
      align-items: flex-end;
    }
    .player-name {
      font-family: 'Oswald', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 1px;
      color: var(--texto);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .player-score-big {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.2rem;
      line-height: 1;
      color: var(--oro);
    }
    .player-meta {
      font-family: 'Oswald', sans-serif;
      font-size: 0.75rem;
      color: var(--texto-muted);
      letter-spacing: 1px;
    }
    .progress-bar-wrap {
      height: 6px;
      background: var(--fondo);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 4px;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--oro);
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .score-center {
      min-width: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .vs-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 3px;
      color: var(--oro);
    }
    .ronda-nombre {
      font-family: 'Oswald', sans-serif;
      font-size: 0.8rem;
      color: var(--texto-muted);
      letter-spacing: 1px;
    }

    .badge-estado {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      padding: 6px 16px;
      background: var(--panel);
      border: 1px solid var(--oro);
      border-radius: 20px;
      font-family: 'Oswald', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 2px;
      color: var(--oro);
      display: none;
    }
    .badge-estado.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="overlay-root" id="overlay-root">
    <header class="header">
      <div class="logo-decarambola">DeCarambola</div>
      <div class="header-center" id="torneo-nombre">—</div>
      <div class="header-right">
        <span class="mesa-label" id="mesa-label">Mesa —</span>
        <div class="logo-club" id="logo-club">CLUB</div>
      </div>
    </header>

    <div class="spacer"></div>

    <div class="badge-estado" id="badge-estado"></div>

    <section class="score-section">
      <div class="score-bar">
        <div class="player-panel" id="p1-panel">
          <div class="player-name" id="j1-nombre">Jugador 1</div>
          <div class="player-score-big" id="j1-carambolas">0</div>
          <div class="player-meta" id="j1-meta">/ 0 · Entradas 0 · PROM 0.000</div>
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="j1-progress" style="width: 0%"></div>
          </div>
        </div>
        <div class="score-center">
          <div class="vs-text">VS</div>
          <div class="ronda-nombre" id="ronda-nombre">Ronda</div>
        </div>
        <div class="player-panel right" id="p2-panel">
          <div class="player-name" id="j2-nombre">Jugador 2</div>
          <div class="player-score-big" id="j2-carambolas">0</div>
          <div class="player-meta" id="j2-meta">/ 0 · Entradas 0 · PROM 0.000</div>
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="j2-progress" style="width: 0%"></div>
          </div>
        </div>
      </div>
    </section>
  </div>
  <script>
    (function () {
      'use strict';
      var API_URL = 'https://sensei-billar-api.onrender.com/overlay/state';
      var POLL_MS = 3000;
      var timer = null;

      function qs(id) { return document.getElementById(id); }

      function getMatchId() {
        try {
          var p = new URLSearchParams(window.location.search);
          return p.get('match_id') || null;
        } catch (e) {
          return null;
        }
      }

      function applyState(s) {
        if (!s) return;
        qs('j1-nombre').textContent = s.j1_nombre != null ? String(s.j1_nombre) : 'Jugador 1';
        qs('j2-nombre').textContent = s.j2_nombre != null ? String(s.j2_nombre) : 'Jugador 2';
        var c1 = s.j1_carambolas != null ? Number(s.j1_carambolas) : 0;
        var c2 = s.j2_carambolas != null ? Number(s.j2_carambolas) : 0;
        var obj = s.objetivo != null ? Number(s.objetivo) : 0;
        var e1 = s.j1_entradas != null ? Number(s.j1_entradas) : 0;
        var e2 = s.j2_entradas != null ? Number(s.j2_entradas) : 0;
        var pr1 = s.j1_promedio != null ? Number(s.j1_promedio) : 0;
        var pr2 = s.j2_promedio != null ? Number(s.j2_promedio) : 0;

        qs('j1-carambolas').textContent = c1;
        qs('j2-carambolas').textContent = c2;
        qs('j1-meta').textContent = '/ ' + obj + ' · Entradas ' + e1 + ' · PROM ' + pr1.toFixed(3);
        qs('j2-meta').textContent = '/ ' + obj + ' · Entradas ' + e2 + ' · PROM ' + pr2.toFixed(3);

        var pct1 = obj > 0 ? Math.min(100, (c1 / obj) * 100) : 0;
        var pct2 = obj > 0 ? Math.min(100, (c2 / obj) * 100) : 0;
        qs('j1-progress').style.width = pct1 + '%';
        qs('j2-progress').style.width = pct2 + '%';

        qs('ronda-nombre').textContent = s.ronda_nombre != null ? String(s.ronda_nombre) : 'Ronda';
        qs('torneo-nombre').textContent = s.torneo_nombre != null ? String(s.torneo_nombre) : '—';
        qs('mesa-label').textContent = s.mesa != null ? 'Mesa ' + s.mesa : 'Mesa —';

        var estado = (s.estado != null && String(s.estado).trim() !== '') ? String(s.estado) : 'LIBRE';
        var badge = qs('badge-estado');
        if (estado !== 'LIBRE') {
          badge.textContent = estado;
          badge.classList.add('visible');
        } else {
          badge.classList.remove('visible');
        }

        var p1 = qs('p1-panel');
        var p2 = qs('p2-panel');
        p1.classList.remove('panel-ganando', 'panel-perdiendo');
        p2.classList.remove('panel-ganando', 'panel-perdiendo');
        if (c1 > c2) {
          p1.classList.add('panel-ganando');
          p2.classList.add('panel-perdiendo');
        } else if (c2 > c1) {
          p2.classList.add('panel-ganando');
          p1.classList.add('panel-perdiendo');
        }
      }

      function fetchState() {
        var matchId = getMatchId();
        if (!matchId) return;
        var url = API_URL + '?match_id=' + encodeURIComponent(matchId);
        fetch(url)
          .then(function (res) { return res.ok ? res.json() : null; })
          .then(function (data) { if (data) applyState(data); })
          .catch(function () {});
      }

      function start() {
        fetchState();
        timer = setInterval(fetchState, POLL_MS);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', start);
      } else {
        start();
      }
    })();
  </script>
</body>
</html>
