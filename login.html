<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — DeCarambola</title>
  <style>
    :root { --oro: #c9a84c; --fondo: #0b0b0b; --card: #14100a; --texto: #eaeaea; --muted: #888; --err: #e74c3c; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--fondo);
      color: var(--texto);
    }
    .wrap { width: 100%; max-width: 400px; }
    h1 {
      font-family: Georgia, serif;
      font-style: italic;
      color: var(--oro);
      font-size: 1.35rem;
      text-align: center;
      margin-bottom: 8px;
    }
    .sub { text-align: center; color: var(--muted); font-size: 0.75rem; margin-bottom: 24px; line-height: 1.4; }
    .card {
      background: linear-gradient(165deg, var(--card), #0a0806);
      border: 1px solid rgba(201, 168, 76, 0.22);
      border-radius: 18px;
      padding: 22px 20px;
    }
    label { display: block; font-size: 0.65rem; letter-spacing: 0.12em; color: #666; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #2a2a2a;
      background: #0a0a0a;
      color: #fff;
      font-size: 1rem;
      margin-bottom: 14px;
    }
    input:focus { outline: none; border-color: rgba(201, 168, 76, 0.45); }
    button[type="submit"] {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: none;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      background: #c9a84c;
      color: #0a0a0a;
    }
    button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { font-size: 0.8rem; padding: 12px; border-radius: 12px; margin-bottom: 14px; display: none; }
    .msg.err { display: block; background: rgba(231, 76, 60, 0.12); border: 1px solid rgba(231, 76, 60, 0.35); color: #eaa; }
    .msg.ok { display: block; background: rgba(46, 255, 112, 0.08); border: 1px solid rgba(46, 255, 112, 0.25); color: #8d8; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>DeCarambola</h1>
    <p class="sub">Iniciá sesión con correo y contraseña.</p>
    <div class="card">
      <div id="msg" class="msg" aria-live="polite"></div>
      <form id="login-form" novalidate>
        <label for="email">Correo</label>
        <input id="email" name="email" type="email" autocomplete="email" required placeholder="tu@correo.com">

        <label for="password">Contraseña</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required placeholder="Contraseña">

        <button type="submit" id="btn-submit">Entrar</button>
      </form>
    </div>
  </div>

  <script type="module">
    import { supabase } from '/js/supabase-client.js';
    import { getRole } from '/js/auth-manager.js';

    var form = document.getElementById('login-form');
    var elMsg = document.getElementById('msg');
    var elBtn = document.getElementById('btn-submit');

    try {
      var qs = new URLSearchParams(window.location.search);
      if (qs.get('reset') === 'ok') {
        elMsg.className = 'msg ok';
        elMsg.textContent = 'Contraseña actualizada correctamente. Ya podés iniciar sesión.';
      }
    } catch (_e) {}

    function showMsg(text, ok) {
      elMsg.className = 'msg ' + (ok ? 'ok' : 'err');
      elMsg.textContent = text;
    }
    function clearMsg() {
      elMsg.className = 'msg';
      elMsg.textContent = '';
    }
    function showError(msg) { showMsg(msg, false); }

    function safeNextFromQuery() {
      try {
        var q = new URLSearchParams(window.location.search);
        var n = (q.get('next') || '').trim();
        if (!n || !n.startsWith('/') || n.startsWith('//')) return null;
        var abs = new URL(n, window.location.origin);
        if (abs.origin !== window.location.origin) return null;
        return abs.pathname + abs.search + abs.hash;
      } catch (_e) {
        return null;
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMsg();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      if (!email.trim() || !password) {
        showMsg('Escribí correo y contraseña.', false);
        return;
      }
      elBtn.disabled = true;
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      elBtn.disabled = false;
      if (error) { showError('Email o contraseña incorrectos'); return; }

      const rRole = await getRole();
      const role = rRole.error ? 'jugador' : (rRole.data || 'jugador');

      const next = safeNextFromQuery();
      if (next) {
        window.location.replace(next);
        return;
      }

      const paths = {
          jugador: '/jugador/index.html',
          organizador: '/apps/organizador/organizador.html',
          superadmin: '/admin/index.html',
          club_admin: '/apps/club/club.html'
      };
      window.location.replace(paths[role] || '/jugador/index.html');
    });
  </script>
</body>
</html>
