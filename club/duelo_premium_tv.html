<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#c9a84c">
    <title>TV Salón — DeCarambola</title>
    <link rel="stylesheet" href="/css/dc-system.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --oro: var(--dc-gold);
            --neon: #2eff70;
            --rojo: #e74c3c;
            --azul: #3498db;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0a0a0a;
            color: var(--dc-text, #f0f0f0);
            font-family: var(--dc-font-body, "DM Sans", system-ui, sans-serif);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #p-inicio {
            position: fixed;
            inset: 0;
            z-index: 50;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(16px, 4vw, 32px);
        }
        #p-inicio.oculta {
            display: none !important;
        }
        .p-inicio-inner {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .p-inicio-wl-logo-wrap {
            text-align: center;
            min-height: 0;
        }
        .p-inicio-wl-logo-wrap[hidden] {
            display: none !important;
        }
        @keyframes p-inicio-wl-pulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.9;
                transform: scale(1.04);
            }
        }
        .p-inicio-wl-logo-img {
            max-height: 160px;
            width: auto;
            max-width: 100%;
            object-fit: contain;
            display: block;
            margin: 0 auto;
            animation: p-inicio-wl-pulse 2.8s ease-in-out infinite;
        }
        .p-inicio-wl-nombre {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: clamp(1rem, 3.2vw, 1.35rem);
            font-weight: 700;
            letter-spacing: 0.06em;
            color: #c9a84c;
            text-align: center;
            line-height: 1.25;
        }
        .p-inicio-wl-nombre[hidden] {
            display: none !important;
        }
        .p-inicio-tit {
            font-size: clamp(1rem, 3.5vw, 1.35rem);
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #c9a84c;
            text-align: center;
        }
        .btn-casual {
            width: 100%;
            padding: 18px 22px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #0a0a0a;
            background: #c9a84c;
            border: 2px solid rgba(201, 168, 76, 0.5);
            border-radius: 14px;
            cursor: pointer;
            transition: filter 0.15s, transform 0.12s;
        }
        .btn-casual:hover { filter: brightness(1.08); }
        .btn-casual:active { transform: scale(0.99); }
        .btn-bolas-lados-casual {
            padding: 8px 12px;
            font-family: inherit;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: #e8e0d0;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(201, 168, 76, 0.4);
            border-radius: 10px;
            cursor: pointer;
            touch-action: manipulation;
            transition: background 0.15s, border-color 0.15s;
        }
        .btn-bolas-lados-casual:active:not(:disabled) {
            transform: scale(0.98);
        }
        .btn-bolas-lados-casual:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .btn-pro-grande {
            width: 100%;
            padding: 18px 22px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #c9a84c;
            background: rgba(201, 168, 76, 0.08);
            border: 2px solid #c9a84c;
            border-radius: 14px;
            cursor: pointer;
            transition: filter 0.15s, transform 0.12s, background 0.15s;
        }
        .btn-pro-grande:hover {
            filter: brightness(1.06);
            background: rgba(201, 168, 76, 0.14);
        }
        .btn-pro-grande:active { transform: scale(0.99); }
        .pro-flow-oculto {
            display: none !important;
        }
        .pro-flow-visible {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
        }
        .p-inicio-sep {
            display: flex;
            align-items: center;
            gap: 14px;
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.72rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }
        .p-inicio-sep::before,
        .p-inicio-sep::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(201, 168, 76, 0.25);
        }
        .pro-busca-row {
            display: flex;
            gap: 10px;
            align-items: stretch;
        }
        .pro-busca-row input {
            flex: 1;
            min-width: 0;
            padding: 12px 14px;
            font-family: inherit;
            font-size: 0.95rem;
            color: #f0f0f0;
            background: #111;
            border: 1px solid rgba(201, 168, 76, 0.22);
            border-radius: 10px;
        }
        .pro-busca-row input::placeholder { color: #666; }
        .pro-busca-row input:focus {
            outline: none;
            border-color: #c9a84c;
        }
        .btn-buscar-pro {
            flex-shrink: 0;
            padding: 12px 18px;
            font-family: inherit;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #c9a84c;
            background: rgba(201, 168, 76, 0.1);
            border: 1px solid rgba(201, 168, 76, 0.45);
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-buscar-pro:hover { background: rgba(201, 168, 76, 0.18); }
        .pro-msg {
            min-height: 1.25em;
            font-size: 0.85rem;
            color: #e66;
            text-align: center;
        }
        #dc-tv-grid {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: none;
        }
        #dc-tv-grid.grid-listo {
            display: block;
        }
        /* Una mesa activa a la vez; misma geometría que duelo móvil + columna video al centro */
        .card {
            display: none;
            width: 100%;
            height: 100%;
            position: absolute;
            inset: 0;
            flex-direction: column;
        }
        .card.activa {
            display: flex;
        }
        .premium-row {
            flex: 1;
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(280px, 1.35fr) minmax(0, 1fr);
            grid-template-rows: 1fr;
            gap: 10px;
            padding: 10px 12px 14px;
            min-height: 0;
            align-items: stretch;
        }
        @media (max-width: 900px) {
            .premium-row:not(.premium-salon-duelo) {
                grid-template-columns: minmax(0, 1fr) minmax(200px, 1.2fr) minmax(0, 1fr);
                gap: 6px;
                padding: 6px;
            }
        }
        .col-side {
            background: var(--dc-surface, #111111);
            border: 1px solid var(--dc-border, rgba(201, 168, 76, 0.12));
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 14px 10px;
            min-width: 0;
            min-height: 0;
        }
        .col-side.der { border-color: rgba(201, 168, 76, 0.2); }
        .col-side .lbl {
            font-family: var(--dc-font-display, "Playfair Display", Georgia, serif);
            font-size: 0.58rem;
            letter-spacing: 0.18em;
            color: var(--dc-text-muted, #888);
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .col-side .nombre {
            font-size: clamp(0.85rem, 1.8vw, 1.15rem);
            font-weight: 700;
            letter-spacing: 0.06em;
            color: var(--dc-text, #f0f0f0);
            line-height: 1.25;
            word-break: break-word;
            max-width: 100%;
        }
        .col-side .crono-big {
            font-family: var(--dc-font-mono, "JetBrains Mono", monospace);
            font-size: clamp(1.4rem, 3.2vw, 2.1rem);
            color: var(--dc-gold, #c9a84c);
            margin-top: 10px;
            text-shadow: 0 0 12px rgba(201, 168, 76, 0.22);
            transition: color 0.2s ease;
        }
        .col-side .mesa-num {
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 800;
            font-family: var(--dc-font-mono, "JetBrains Mono", monospace);
            color: var(--dc-gold, #c9a84c);
            line-height: 1;
        }
        .col-side .mesa-sub {
            font-size: 0.72rem;
            color: var(--dc-text-muted, #888);
            margin-top: 8px;
            letter-spacing: 0.1em;
        }
        .col-video {
            background: #000;
            border: 1px solid var(--g1);
            border-radius: 12px;
            min-width: 0;
            min-height: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        /* Mismo bloque que duelo-movil.html (.panel-video + .video-frame) */
        .col-video .panel-video {
            background: #050505;
            border: none;
            display: flex;
            flex-direction: column;
            padding: 10px 8px;
            align-items: center;
            justify-content: flex-start;
            flex: 1;
            min-height: 0;
            width: 100%;
        }
        .col-video .panel-video h3 {
            font-size: 0.6rem;
            color: #777;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }
        .col-video .video-frame {
            width: 100%;
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
        }
        .col-video .video-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .col-video .video-frame video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: none;
            background: #000;
        }
        .col-video .video-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 0.7rem;
            letter-spacing: 1px;
        }
        /* Marcador TV salón: PRO y CASUAL comparten 3 zonas (header / grid 3 cols / footer); PRO tecla en footer */
        .card.activa.premium-salon-card {
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        /* ——— Casual: header fijo ~80px, medio flex:1 (3 cols iguales), footer fijo ~120px (teclado) ——— */
        .salon-casual-root {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-height: 100vh;
            min-height: 0;
            box-sizing: border-box;
            background: #0a0a0a;
        }
        /* Casual header: TIEMPO · $COSTO · cronómetro */
        .salon-casual-z1 {
            flex: 0 0 auto;
            min-height: 64px;
            background: #000;
            border-bottom: 1px solid #1a1a1a;
            box-sizing: border-box;
            padding: 10px 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .salon-casual-header-simple {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(10px, 2vw, 18px);
            flex-wrap: wrap;
            row-gap: 8px;
            font-size: clamp(1rem, 2.4vw, 1.5rem);
            font-weight: 600;
            color: #b8b8b8;
            letter-spacing: 0.02em;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .salon-casual-header-simple .salon-casual-hdr-reloj-wrap {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .salon-casual-header-simple .salon-casual-reloj-ent {
            font-size: 0.72em;
            color: #777;
            letter-spacing: 0.1em;
            font-family: 'var(--dc-font-body)', sans-serif;
        }
        .salon-casual-header-simple #reloj {
            font-size: clamp(1.2rem, 3vw, 1.85rem);
            color: var(--neon);
            font-family: 'Courier New', monospace;
            min-width: 44px;
            text-align: center;
            line-height: 1;
        }
        .salon-casual-header-simple .btn-pausa {
            width: 40px;
            height: 40px;
            font-size: 1rem;
        }
        .salon-casual-header-simple .salon-casual-hdr-sep {
            color: #444;
            font-weight: 400;
            user-select: none;
        }
        .salon-casual-header-simple .salon-casual-hdr-strong {
            color: #f0f0f0;
            font-family: 'Courier New', monospace;
            font-weight: 800;
        }
        .salon-casual-header-simple .salon-casual-hdr-oro {
            color: var(--oro);
            font-family: 'Courier New', monospace;
            font-weight: 800;
        }
        .salon-casual-header-simple .salon-casual-hdr-costo {
            color: #9a9a9a;
            font-family: 'Courier New', monospace;
            font-weight: 700;
        }
        .btn-tema-salon-casual {
            padding: 6px 10px;
            font-size: 1.35rem;
            line-height: 1;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.06);
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            vertical-align: middle;
        }
        .btn-tema-salon-casual:active {
            transform: scale(0.96);
        }
        .btn-tema-salon-inicio {
            width: 100%;
        }
        /* MODO SOL ☀️ — body.tema-sol; localStorage dc_tema_salon: sol | oscuro (claro hereda a sol) */
        body.tema-sol {
            background: #ffffff;
            color: #1a1a1a;
        }
        body.tema-sol #p-inicio {
            background: #ffffff;
        }
        body.tema-sol .p-inicio-tit {
            color: #5a3800;
        }
        body.tema-sol .p-inicio-wl-nombre {
            color: #8a6200;
        }
        body.tema-sol .p-inicio-sep {
            color: rgba(90, 56, 0, 0.4);
        }
        body.tema-sol .pro-busca-row input {
            background: #fff;
            color: #1a1a1a;
            border-color: #ccc;
        }
        body.tema-sol .btn-tema-salon-casual,
        body.tema-sol .btn-tema-salon-inicio {
            background: rgba(90, 56, 0, 0.08);
            color: #5a3800;
            border: 1px solid rgba(201, 168, 76, 0.55);
        }
        body.tema-sol .salon-casual-root {
            background: #ffffff;
            color: #1a1a1a;
        }
        body.tema-sol .salon-casual-z1,
        body.tema-sol .salon-casual-z3 {
            background: #c9a84c;
            color: #5a3800;
            border-color: rgba(90, 56, 0, 0.18);
        }
        body.tema-sol .salon-casual-header-simple,
        body.tema-sol .salon-casual-header-simple .salon-casual-hdr-sep,
        body.tema-sol .salon-casual-header-simple .salon-casual-hdr-oro,
        body.tema-sol .salon-casual-header-simple .salon-casual-hdr-costo {
            color: #5a3800;
        }
        body.tema-sol .salon-casual-controls-bar {
            background: #b8922e;
            border-bottom-color: rgba(90, 56, 0, 0.25);
        }
        body.tema-sol .salon-casual-controls-bar .btn-salir-config,
        body.tema-sol .salon-casual-controls-bar .btn-siguiente-set,
        body.tema-sol .salon-casual-controls-bar .btn-fin,
        body.tema-sol .salon-casual-controls-bar .btn-bolas-lados-casual,
        body.tema-sol .salon-casual-controls-bar .btn-bolas-tv {
            border-color: rgba(90, 56, 0, 0.35);
            color: #5a3800;
            background: rgba(255, 255, 255, 0.2);
        }
        body.tema-sol .salon-casual-controls-bar #btn-bolas-tv {
            width: 28px;
            height: 28px;
            filter: brightness(1.5);
            border: 2px solid #8a6200 !important;
            box-sizing: border-box;
        }
        body.tema-sol .salon-casual-controls-bar .btn-fin {
            border-color: rgba(90, 56, 0, 0.45);
        }
        body.tema-sol .salon-casual-controls-bar .btn-obs-transmitir {
            background: linear-gradient(180deg, #f0d78c 0%, #c9a84c 50%, #8a7028 100%) !important;
            color: #1a1204 !important;
            border-color: #5a4010 !important;
            box-shadow: 0 0 12px rgba(90, 56, 0, 0.2);
        }
        body.tema-sol .salon-casual-z2 {
            background: #f5f0e8 !important;
        }
        body.tema-sol .salon-casual-root:not(.salon-pro-root) aside.salon-casual-col.salon-casual-col-j1.col-side,
        body.tema-sol .salon-casual-root:not(.salon-pro-root) aside.salon-casual-col.salon-casual-col-j2.col-side {
            background: #ffffff !important;
            border: 1px solid rgba(201, 168, 76, 0.15) !important;
            box-shadow: none !important;
        }
        body.tema-sol
            .salon-casual-root:not(.salon-pro-root)
            aside.salon-casual-col-j1.col-side:has(#panel-j1.activo),
        body.tema-sol
            .salon-casual-root:not(.salon-pro-root)
            aside.salon-casual-col-j2.col-side:has(#panel-j2.activo) {
            border: 3px solid #c9a84c !important;
            box-shadow: none !important;
        }
        body.tema-sol
            .salon-casual-root:not(.salon-pro-root)
            .premium-salon-duelo
            .salon-casual-col-j1
            .panel-jugador.panel-jugador-casual-mid,
        body.tema-sol
            .salon-casual-root:not(.salon-pro-root)
            .premium-salon-duelo
            .salon-casual-col-j2
            .panel-jugador.panel-jugador-casual-mid {
            background: #ffffff !important;
        }
        body.tema-sol
            .salon-casual-root:not(.salon-pro-root)
            .premium-salon-duelo
            .salon-casual-col-j1
            .panel-jugador.panel-jugador-casual-mid.activo,
        body.tema-sol
            .salon-casual-root:not(.salon-pro-root)
            .premium-salon-duelo
            .salon-casual-col-j2
            .panel-jugador.panel-jugador-casual-mid.activo {
            background: rgba(212, 175, 55, 0.12) !important;
        }
        body.tema-sol .salon-pro-root aside.salon-casual-col-j1.col-side:has(#panel-j1.activo),
        body.tema-sol .salon-pro-root aside.salon-casual-col-j2.col-side:has(#panel-j2.activo) {
            background: #fdf8ec !important;
            border: 3px solid #c9a84c !important;
            box-shadow: none !important;
        }
        body.tema-sol .salon-pro-root aside.salon-casual-col-j1.col-side:not(:has(#panel-j1.activo)),
        body.tema-sol .salon-pro-root aside.salon-casual-col-j2.col-side:not(:has(#panel-j2.activo)) {
            background: #ffffff !important;
            border: 1px solid rgba(201, 168, 76, 0.15) !important;
            box-shadow: none !important;
        }
        body.tema-sol .salon-pro-root .panel-jugador-pro-mid,
        body.tema-sol .salon-pro-root .panel-jugador-pro-mid.activo {
            background: transparent !important;
        }
        body.tema-sol .salon-pro-root .panel-head-pro-mid .panel-meta {
            color: #555;
        }
        body.tema-sol .salon-pro-root .salon-pro-stat-val {
            color: #5a3800 !important;
            font-size: 1.2rem !important;
            font-weight: 700 !important;
        }
        body.tema-sol .salon-pro-stat-lbl {
            color: #7a5c00 !important;
        }
        body.tema-sol .salon-pro-hdr-scores {
            color: #5a3800;
        }
        body.tema-sol .salon-pro-hdr-ent {
            color: #777;
        }
        body.tema-sol .salon-pro-stat-cell {
            background: #f5f0e8 !important;
            border: 1px solid rgba(201, 168, 76, 0.35) !important;
        }
        body.tema-sol .premium-salon-duelo .panel-jugador-casual-mid .panel-nombre-editable,
        body.tema-sol .premium-salon-duelo .panel-jugador-casual-mid .panel-nombre-editable span,
        body.tema-sol .premium-salon-duelo .panel-jugador-pro-mid .panel-nombre-editable,
        body.tema-sol .premium-salon-duelo .panel-jugador-pro-mid .panel-nombre-editable span {
            color: #0a0a0a !important;
        }
        body.tema-sol .premium-salon-duelo .panel-nombre-inp {
            color: #0a0a0a !important;
            background: #fff;
            border: 1px solid #ccc;
        }
        body.tema-sol .premium-salon-duelo .salon-casual-score-big.salon-casual-score-big--lider {
            color: #7a5c00 !important;
        }
        body.tema-sol .premium-salon-duelo .salon-casual-score-big.salon-casual-score-big--perdiendo {
            color: #aaa !important;
        }
        body.tema-sol .salon-pro-root .salon-pro-col-marcador.salon-casual-score-big--lider,
        body.tema-sol .salon-pro-root .salon-pro-col-marcador.salon-casual-score-big--perdiendo {
            color: #7a5c00 !important;
        }
        body.tema-sol .premium-salon-duelo .btn-mini-num:not(.btn-mini-restar) {
            background: #c9a84c;
            color: #1a1a1a;
            border: 1px solid #a07820;
        }

        #modal-identificar-pro {

        .modal-ident-inner h2 {

            opacity: 0.95;

        body.tema-sol .overlay-logo-club {

        .overlay-marca {

            color: #555;
            font-size: 0.8rem;
            max-width: 90vw;
            line-height: 1.5;
        }
    </style>
</head>
<body>
<div id="p-inicio">
    <div class="p-inicio-inner">
        <div class="p-inicio-wl-logo-wrap" id="p-inicio-wl-logo-wrap" hidden>
            <img class="p-inicio-wl-logo-img" id="p-inicio-wl-logo" alt="" />
        </div>
        <div class="p-inicio-tit">TV Salón</div>
        <button type="button" class="btn-tema-salon-casual btn-tema-salon-inicio" id="btn-tema-salon-inicio" title="Modo sol" aria-pressed="false">☀️</button>
        <div class="p-inicio-wl-nombre" id="p-inicio-wl-nombre" hidden></div>
        <button type="button" class="btn-casual" id="btn-iniciar-casual">INICIAR CASUAL</button>
        <button type="button" class="btn-pro-grande" id="btn-iniciar-pro">INICIAR PRO</button>
        <p class="pro-msg" id="pro-msg" aria-live="polite"></p>
    </div>
</div>
<button type="button" class="nav-mesas nav-prev oculto" id="btn-prev" onclick="navMesa(-1)">‹</button>
<button type="button" class="nav-mesas nav-next oculto" id="btn-next" onclick="navMesa(1)">›</button>
<div class="mesa-indicator" id="mesa-indicator"></div>
<div id="dc-tv-grid"></div>
<div id="modal-identificar-pro" aria-hidden="true">
    <div class="modal-ident-inner">
        <h2>Identificar jugador (PRO)</h2>
        <div class="pro-busca-row">
            <input type="search" id="modal-pro-input" autocomplete="off" placeholder="Cédula o nombre" data-dc-keyboard />
            <button type="button" class="btn-buscar-pro" id="modal-pro-buscar">BUSCAR</button>
        </div>
        <p class="pro-msg" id="modal-pro-msg"></p>
        <div class="modal-ident-actions">
            <button type="button" class="btn-modal-cerrar" id="modal-pro-cerrar">Cerrar</button>
        </div>
    </div>
</div>
<div class="overlay-mda">
    <div class="overlay-logo-club" id="overlay-club">CLUB</div>
    <div class="overlay-marca">decarambola.com</div>
</div>
<script type="module">
    import { supabase } from '../js/supabase-client.js';

    function getClubIdFromPage() {
        try {
            var q = new URLSearchParams(window.location.search).get('club');
            if (q && String(q).trim()) return String(q).trim();
        } catch (e) {}
        try {
            var p = JSON.parse(localStorage.getItem('mi_perfil') || '{}');
            if (p && p.club_id) return String(p.club_id).trim();
        } catch (e2) {}
        return 'ab2314a3-095b-4a2f-be97-ed7433196f87';
    }

    function urlStreamingMesa(m) {
        if (!m) return '';
        var u = (m.url_camara || '').trim();
        if (!u && m.urls_camaras && m.urls_camaras.length) {
            var first = m.urls_camaras[0];
            u = (first && typeof first === 'object' && first.url) ? String(first.url).trim() : (typeof first === 'string' ? first.trim() : '');
        }
        return u || '';
    }

    function escAttr(s) {
        return String(s == null ? '' : s)
            .replace(/&/g, '&amp;')
            .replace(/"/g, '&quot;')
            .replace(/</g, '&lt;');
    }
    function escHtml(s) {
        return String(s == null ? '' : s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    function getObjLocalStorage(key) {
        try {
            return JSON.parse(localStorage.getItem(key) || '{}');
        } catch (e) {
            return {};
        }
    }

    /** Base pública para URLs relativas (misma idea que duelo-movil.html / certificados). */
    function getWlPublicBaseUrl() {
        return (
            (typeof localStorage !== 'undefined' && localStorage.getItem('wl_cert_base_url')) ||
            window.location.origin ||
            ''
        )
            .replace(/\/$/, '');
    }

    function absolutizarClubLogoUrl(url) {
        var u = String(url || '').trim();
        if (!u) return '';
        if (/^https?:\/\//i.test(u) || /^data:/i.test(u) || /^blob:/i.test(u)) return u;
        var base = getWlPublicBaseUrl();
        if (!base) return u;
        if (u.charAt(0) === '/') return base + u;
        return base + '/' + u;
    }

    /**
     * White label: CLUB_CONFIG + wl_club_nombre / wl_club_logo(_url), alineado con duelo-movil.html (window.WL).
     */
    function leerClubWhiteLabel() {
        var cfg = getObjLocalStorage('CLUB_CONFIG');
        var nombre = '';
        try {
            nombre =
                (window.WL && window.WL.getNombreClub && String(window.WL.getNombreClub() || '').trim()) ||
                (localStorage.getItem('wl_club_nombre') || '').trim() ||
                (cfg.nombre && String(cfg.nombre).trim()) ||
                '';
        } catch (e) {
            nombre = '';
        }
        if (!nombre) {
            try {
                var perfil = JSON.parse(localStorage.getItem('mi_perfil') || '{}');
                if (perfil && perfil.club) nombre = String(perfil.club).trim();
            } catch (e2) {}
        }
        var clubActivo = getObjLocalStorage('club_activo');
        var logoRaw = '';
        try {
            logoRaw =
                (window.WL && window.WL.getLogoUrl && String(window.WL.getLogoUrl() || '').trim()) ||
                (localStorage.getItem('wl_club_logo_url') || '').trim() ||
                (localStorage.getItem('wl_club_logo') || '').trim() ||
                (clubActivo.logo_url && String(clubActivo.logo_url).trim()) ||
                (clubActivo.logoUrl && String(clubActivo.logoUrl).trim()) ||
                (cfg.logoUrl && String(cfg.logoUrl).trim()) ||
                (cfg.logo && String(cfg.logo).trim()) ||
                '';
        } catch (e3) {
            logoRaw = '';
        }
        return {
            nombre: nombre,
            logo: absolutizarClubLogoUrl(logoRaw)
        };
    }

    /** Logo de prueba MVIP si no hay club_id en perfil (fallback). */
    var MVIP_FALLBACK_LOGO_URL =
        'https://iwvogyloebvieloequzr.supabase.co/storage/v1/object/public/imagen_maste_v_i_p_.png/imagen%20maste%20v.i.p..png';

    function isClubKeyLikelyUuid(key) {
        return /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(
            String(key || '').trim()
        );
    }

    function clubActivoObjSafe() {
        try {
            var raw = localStorage.getItem('club_activo');
            if (!raw || raw === 'null') return {};
            var o = JSON.parse(raw);
            return o && typeof o === 'object' && !Array.isArray(o) ? o : {};
        } catch (e) {
            return {};
        }
    }

    /** true si ya hay URL de logo en localStorage (mismas fuentes que leerClubWhiteLabel). */
    function tieneLogoClubEnLocalStorage() {
        try {
            if (window.WL && window.WL.getLogoUrl && String(window.WL.getLogoUrl() || '').trim()) return true;
        } catch (e) {}
        if ((localStorage.getItem('wl_club_logo_url') || '').trim()) return true;
        if ((localStorage.getItem('wl_club_logo') || '').trim()) return true;
        var cfg = getObjLocalStorage('CLUB_CONFIG');
        if (cfg && typeof cfg === 'object') {
            if ((cfg.logoUrl && String(cfg.logoUrl).trim()) || (cfg.logo && String(cfg.logo).trim())) return true;
        }
        var ca = clubActivoObjSafe();
        if ((ca.logo_url && String(ca.logo_url).trim()) || (ca.logoUrl && String(ca.logoUrl).trim())) return true;
        return false;
    }

    /** club_id de perfil: mi_perfil.club_id o club_activo.id */
    function obtenerClubKeyParaConsultaClubs() {
        try {
            var p = JSON.parse(localStorage.getItem('mi_perfil') || '{}');
            if (p && p.club_id) return String(p.club_id).trim();
        } catch (e) {}
        var ca = clubActivoObjSafe();
        if (ca.id) return String(ca.id).trim();
        return '';
    }

    function guardarClubConfigMerge(partial) {
        var cfg = getObjLocalStorage('CLUB_CONFIG');
        if (!cfg || typeof cfg !== 'object' || Array.isArray(cfg)) cfg = {};
        Object.keys(partial || {}).forEach(function (k) {
            var v = partial[k];
            if (v !== undefined && v !== null && String(v).trim() !== '') cfg[k] = v;
        });
        try {
            localStorage.setItem('CLUB_CONFIG', JSON.stringify(cfg));
        } catch (e) {}
    }

    /**
     * Si no hay logo en localStorage, lee clubs en Supabase y guarda CLUB_CONFIG
     * (nombre, logo ← logo_url, color_primario). Sin club_id: solo logo MVIP de prueba.
     */
    async function hidratarClubConfigDesdeSupabaseSiFaltaLogo() {
        if (tieneLogoClubEnLocalStorage()) return;
        var key = obtenerClubKeyParaConsultaClubs();
        if (!key) {
            guardarClubConfigMerge({
                logo: MVIP_FALLBACK_LOGO_URL,
                logoUrl: MVIP_FALLBACK_LOGO_URL
            });
            return;
        }
        var sel = 'nombre,logo_url,color_primario';
        var row = null;
        try {
            if (isClubKeyLikelyUuid(key)) {
                var byId = await supabase.from('clubs').select(sel).eq('id', key).maybeSingle();
                if (!byId.error && byId.data) row = byId.data;
                if (!row) {
                    var byCod = await supabase.from('clubs').select(sel).eq('codigo', key).maybeSingle();
                    if (!byCod.error && byCod.data) row = byCod.data;
                }
            } else {
                var byCode = await supabase.from('clubs').select(sel).eq('codigo', key).maybeSingle();
                if (!byCode.error && byCode.data) row = byCode.data;
            }
        } catch (e) {
            row = null;
        }
        if (!row) return;
        var logo = (row.logo_url && String(row.logo_url).trim()) || '';
        var patch = {
            nombre: row.nombre != null ? String(row.nombre).trim() : '',
            logo: logo,
            logoUrl: logo,
            color_primario: row.color_primario != null ? String(row.color_primario).trim() : ''
        };
        guardarClubConfigMerge(patch);
        try {
            if (patch.nombre) localStorage.setItem('wl_club_nombre', patch.nombre);
            if (logo) localStorage.setItem('wl_club_logo_url', logo);
            if (patch.color_primario) localStorage.setItem('wl_club_color', patch.color_primario);
        } catch (e2) {}
    }

    function aplicarWhiteLabelPInicio() {
        var w = leerClubWhiteLabel();
        var wrap = document.getElementById('p-inicio-wl-logo-wrap');
        var img = document.getElementById('p-inicio-wl-logo');
        var nomEl = document.getElementById('p-inicio-wl-nombre');
        if (w.logo && img && wrap) {
            img.src = w.logo;
            img.alt = w.nombre || 'Club';
            wrap.hidden = false;
        } else if (wrap && img) {
            wrap.hidden = true;
            img.removeAttribute('src');
            img.alt = '';
        }
        if (nomEl) {
            if (w.nombre) {
                nomEl.textContent = w.nombre;
                nomEl.hidden = false;
            } else {
                nomEl.textContent = '';
                nomEl.hidden = true;
            }
        }
    }

    /** Esquina superior izquierda durante partida; oculto en pantalla de inicio (logo ya en #p-inicio). */
    function aplicarWhiteLabelOverlay() {
        var el = document.getElementById('overlay-club');
        if (!el) return;
        el.classList.remove('overlay-club--off');
        el.innerHTML = '';
        el.style.opacity = '';
        var pin = document.getElementById('p-inicio');
        var inicioVisible = pin && !pin.classList.contains('oculta');
        if (inicioVisible) {
            el.classList.add('overlay-club--off');
            return;
        }
        var w = leerClubWhiteLabel();
        if (tvSession && w.logo) {
            var im = document.createElement('img');
            im.className = 'overlay-club-logo-img';
            im.src = w.logo;
            im.alt = w.nombre || 'Club';
            el.appendChild(im);
            el.style.opacity = '1';
        } else if (tvSession && w.nombre) {
            el.textContent = w.nombre.toUpperCase();
            el.style.opacity = '0.9';
        } else {
            el.textContent = 'CLUB';
        }
        var om = document.querySelector('.overlay-marca');
        if (om) om.style.display = tvSession ? 'none' : '';
    }

    function aplicarMarcaClubTV() {
        aplicarWhiteLabelPInicio();
        aplicarWhiteLabelOverlay();
    }

    var clubId = getClubIdFromPage();
    var mesasById = {};
    var sesionesByMesa = {};
    var tickTimer = null;
    /** Sesión iniciada desde la pantalla de inicio (casual o PRO). */
    var tvSession = null;
    /** Columna desde la que se abrió el modal Identificar PRO (1 = J1, 2 = J2). */
    var identificarProSlot = 1;

    function tvSetText(id, text) {
        var el = document.getElementById(id);
        if (el) el.innerText = text;
    }

    function actualizarIndicadorTvSalon() {
        if (!tvSession) return;
        var ind = document.getElementById('mesa-indicator');
        if (!ind) return;
        var meta = tvSession.meta != null ? tvSession.meta : 40;
        if (tvSession.type === 'pro') {
            ind.textContent =
                'PRO · ' +
                (tvSession.jugador && tvSession.jugador.nombre ? tvSession.jugador.nombre : '') +
                ' · Meta ' +
                meta;
        } else {
            ind.textContent =
                'CASUAL · ' + (tvSession.j1 || '') + ' vs ' + (tvSession.j2 || '') + ' · Meta ' + meta;
        }
    }

    function minutosTranscurridosPartidaSalon() {
        if (!partidaStartTime) return 0;
        var elapsedMs = pausado
            ? pauseStartTime - partidaStartTime - partidaTotalPausedMs
            : Date.now() - partidaStartTime - partidaTotalPausedMs;
        return Math.max(0, elapsedMs / 60000);
    }

    function formatPesosSalon(valor) {
        var n = Math.round(Number(valor));
        if (!isFinite(n)) n = 0;
        return '$' + n.toLocaleString('es-CO', { maximumFractionDigits: 0 });
    }

    function actualizarCasualCostoHeader() {
        if (!tvSession || tvSession.type !== 'casual') return;
        var el = document.getElementById('salon-casual-costo');
        if (!el) return;
        var tarifa = tvSession.tarifaHora;
        if (tarifa != null && isFinite(tarifa) && tarifa > 0) {
            var minutos = minutosTranscurridosPartidaSalon();
            var importe = minutos * (tarifa / 60);
            el.textContent = formatPesosSalon(importe);
            return;
        }
        var c =
            tvSession.costoSalon != null ? String(tvSession.costoSalon).trim() : '';
        if (!c || c === '—') {
            el.textContent = '$—';
            return;
        }
        el.textContent = c.charAt(0) === '$' ? c : '$' + c;
    }

    var LS_TEMA_SALON = 'dc_tema_salon';

    function getTemaSalonPreferido() {
        try {
            var v = (localStorage.getItem(LS_TEMA_SALON) || '').trim();
            if (v === 'sol' || v === 'claro') return 'sol';
            return 'oscuro';
        } catch (e) {
            return 'oscuro';
        }
    }

    function syncTemaSalonBotones(esSol) {
        var icon = esSol ? '🌙' : '☀️';
        var title = esSol ? 'Modo oscuro' : 'Modo sol ☀️';
        var pressed = esSol ? 'true' : 'false';
        ['btn-tema-salon', 'btn-tema-salon-inicio'].forEach(function (id) {
            var b = document.getElementById(id);
            if (b) {
                b.textContent = icon;
                b.title = title;
                b.setAttribute('aria-pressed', pressed);
            }
        });
    }

    function aplicarTemaSalon() {
        var esSol = getTemaSalonPreferido() === 'sol';
        document.body.classList.toggle('tema-sol', esSol);
        syncTemaSalonBotones(esSol);
    }

    function aplicarTemaSalonCasual() {
        aplicarTemaSalon();
    }

    function toggleTemaSalonCasual() {
        var next = getTemaSalonPreferido() === 'sol' ? 'oscuro' : 'sol';
        try {
            localStorage.setItem(LS_TEMA_SALON, next);
        } catch (e) {}
        aplicarTemaSalon();
    }

    function entrarSalonDesdeInicio() {
        var pin = document.getElementById('p-inicio');
        if (pin) pin.classList.add('oculta');
        var g = document.getElementById('dc-tv-grid');
        if (g) g.classList.add('grid-listo');
        aplicarWhiteLabelOverlay();
    }

    function resetPantallaProInicio() {
        var pm = document.getElementById('pro-msg');
        if (pm) pm.textContent = '';
    }

    function iniciarPro() {
        resetPantallaProInicio();
        tvSession = {
            type: 'pro',
            meta: 40,
            j1: 'Jugador A',
            j2: 'Jugador B',
            jugador: null,
            jugador2: null
        };
        entrarSalonDesdeInicio();
        render();
    }
    window.iniciarPro = iniciarPro;

    function abrirFlujoProDesdeInicio() {
        iniciarPro();
    }
    window.abrirFlujoProDesdeInicio = abrirFlujoProDesdeInicio;

    function ilikeBusquedaSegura(q) {
        return String(q || '').replace(/[%_\\]/g, '').trim();
    }

    async function buscarJugadorProDesdeTexto(qRaw) {
        if (!qRaw || !String(qRaw).trim()) return { row: null, err: 'Ingresá cédula o nombre.', multi: false };
        var row = null;
        var cedTry = qRaw.replace(/\s/g, '');
        var rCed = await supabase.from('jugadores').select('*').eq('cedula', cedTry).maybeSingle();
        if (!rCed.error) row = rCed.data;
        if (!row) {
            var digits = qRaw.replace(/\D/g, '');
            if (digits.length >= 4) {
                var rDig = await supabase.from('jugadores').select('*').eq('cedula', digits).maybeSingle();
                if (!rDig.error) row = rDig.data;
            }
        }
        if (!row) {
            var safe = ilikeBusquedaSegura(qRaw);
            if (!safe) return { row: null, err: 'Ingresá cédula o nombre.', multi: false };
            var qNom = supabase.from('jugadores').select('*').ilike('nombre', '%' + safe + '%').limit(8);
            if (clubId) qNom = qNom.eq('club_id', clubId);
            var rNom = await qNom;
            if (rNom.error) return { row: null, err: 'No se pudo buscar. Reintentá.', multi: false };
            var rows = rNom.data || [];
            if (rows.length === 0) return { row: null, err: 'No se encontró jugador.', multi: false };
            if (rows.length > 1) return { row: null, err: 'Varios resultados. Afiná el nombre o usá la cédula.', multi: true };
            row = rows[0];
        }
        if (!row) return { row: null, err: 'No se encontró jugador.', multi: false };
        return { row: row, err: null, multi: false };
    }

    async function buscarPro() {
        iniciarPro();
    }
    window.buscarPro = buscarPro;

    function iniciarCasual() {
        var pm = document.getElementById('pro-msg');
        if (pm) pm.textContent = '';
        resetPantallaProInicio();
        var costoQ = '';
        var tarifaHora = null;
        try {
            var params = new URLSearchParams(window.location.search);
            costoQ = (params.get('costo') || '').trim();
            var tRaw = (params.get('tarifa_hora') || params.get('tarifa') || '').trim().replace(',', '.');
            var tNum = parseFloat(tRaw);
            if (isFinite(tNum) && tNum > 0) tarifaHora = tNum;
        } catch (e) {}
        tvSession = {
            type: 'casual',
            meta: 40,
            j1: 'Jugador A',
            j2: 'Jugador B',
            costoSalon: costoQ || '—',
            tarifaHora: tarifaHora
        };
        entrarSalonDesdeInicio();
        render();
    }
    window.iniciarCasual = iniciarCasual;

    function salonSalirInicio(skipConfirm) {
        if (!skipConfirm && !confirm('¿Salir al inicio? El marcador se reiniciará.')) return;
        try {
            clearInterval(timer);
        } catch (e) {}
        timer = null;

            j1_nombre: nomJ1,
            j2_nombre: nomJ2,

            j2_promedio: d.e2 > 0 ? d.p2 / d.e2 : 0,
            objetivo: cfg.meta1 | 0,
            estado:

            cid && String(cid).trim()

                : 'ab2314a3-095b-4a2f-be97-ed7433196f87';
        if (mergeSb && mergeSb.stream_bridge_status != null && mergeSb.stream_bridge_status !== '') {
            row.stream_bridge_status = mergeSb.stream_bridge_status;
            if (mergeSb.stream_bridge_at != null) row.stream_bridge_at = mergeSb.stream_bridge_at;
        }
        if (salonForceStreamPendiente) {
            row.stream_bridge_status = 'pendiente';
            row.stream_bridge_at = new Date().toISOString();

    function schedulePublicarOverlayStateThrottled() {
        if (!tvSession || !salonOverlayMatchId) return;
        var now = Date.now();
        if (now - salonTvOverlayLastPublish >= OVERLAY_STATE_THROTTLE_MS) {
            salonTvOverlayLastPublish = now;
            publicarOverlayState();
            return;
        }
        if (salonTvOverlayPublishTimer) return;
        salonTvOverlayPublishTimer = setTimeout(function () {
            salonTvOverlayPublishTimer = null;
            salonTvOverlayLastPublish = Date.now();
            publicarOverlayState();
        }, OVERLAY_STATE_THROTTLE_MS - (now - salonTvOverlayLastPublish));
    }

    /**
     * Un toque: upsert estado transmitir + pendiente; el bridge (Node en el Mac con OBS) hace OBS/YouTube.
     */
    async function salonSolicitarTransmitirObs() {
        var btn = document.getElementById('btn-obs-transmitir-vivo');
        var lab = document.getElementById('btn-obs-transmitir-label');
        if (!tvSession || !salonOverlayMatchId) {
            alert('Iniciá una partida primero para tener match_id.');
            return;
        }
        if (!supabase || typeof supabase.from !== 'function') {
            alert('Sin cliente Supabase. No se puede enviar la señal.');
            return;
        }
        salonLimpiarWatchTransmitir();
        if (lab) lab.textContent = 'Conectando...';
        if (btn) btn.disabled = true;
        salonTransmitirVentanaHasta = Date.now() + 120000;
        salonForceStreamPendiente = true;
        var mid = salonOverlayMatchId;
        try {
            await publicarOverlayState();
            if (typeof console !== 'undefined' && console.log) {
                console.log('[TV] transmitir + pendiente match_id=', mid);
            }
        } catch (e) {
            if (lab) lab.textContent = 'Error OBS no conectado';
            if (btn) btn.disabled = false;
            if (typeof console !== 'undefined' && console.warn) {
                console.warn('[TV] publicar transmitir:', e);
            }
            return;
        }

        var ch = supabase
            .channel('tv-tr-' + mid + '-' + Date.now())
            .on(
                'postgres_changes',
                {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'overlay_state',
                    filter: 'match_id=eq.' + mid
                },
                function (p) {
                    var st = p.new && p.new.stream_bridge_status;
                    if (!st) return;
                    if (st === 'live') {
                        if (lab) lab.textContent = '● EN VIVO';
                        if (btn) btn.disabled = false;
                        salonLimpiarWatchTransmitir();
                    }
                    if (st === 'error_obs') {
                        if (lab) lab.textContent = 'Error OBS no conectado';
                        if (btn) btn.disabled = false;
                        salonLimpiarWatchTransmitir();
                    }
                }
            )
            .subscribe();
        salonTransmitUnsub = function () {
            try {
                supabase.removeChannel(ch);
            } catch (e2) {}
        };

        salonTransmitTimer = setTimeout(function () {
            if (lab && lab.textContent === 'Conectando...') {
                lab.textContent = 'Error OBS no conectado';
                if (btn) btn.disabled = false;
            }
            salonLimpiarWatchTransmitir();
        }, 45000);
    }

    function promedioRegistroDesdeRow(row) {
        if (!row || row.promedio == null || row.promedio === '') return null;

        return isFinite(p) && p > 0 ? p : null;
    }

    /** Handicap orientativo: carambolas sugeridas a favor del jugador con promedio registro más bajo. */
    function calcHandicapSugeridoPromedios(pr1, pr2, meta) {
        var diff = Math.abs(pr1 - pr2);
        if (diff < 0.001 || meta < 1) return null;
        var X = Math.round(diff * (meta / 40) * 10);
        X = Math.max(0, Math.min(X, Math.max(1, meta) - 1));
        if (X < 1) return null;
        var weakerIs1 = pr1 < pr2;
        return { x: X, weakerIs1: weakerIs1 };
    }

    function sumarCasualBolaTap(jugador) {
        var j = jugador === 2 ? 2 : 1;
        sumarParaJugador(j, 1);
    }

    function sumarParaJugador(jugador, n) {
        var j = jugador === 2 ? 2 : 1;
        if (partidaTerminada) return;
        var meta = j === 1 ? cfg.meta1 : cfg.meta2;
        if (meta > 0 && d['p' + j] >= meta) return;
        if (tvSession && tvSession.type === 'casual') animarBolaCasualBump(j);
        if (meta > 0 && d['p' + j] + n >= meta) {
            mostrarConfirmacionMeta(n, j);
            return;
        }
        d['p' + j] += n;
        d['s' + j] += n;
        if (d['s' + j] > d['ms' + j]) d['ms' + j] = d['s' + j];
        registrarUltimaJugadaCasual(j, n);
        actualizarUI();
    }

    function sumar(n) {
        sumarParaJugador(d.t, n);
    }

    function restar() {
        if (partidaTerminada) return;
        if (d['p' + d.t] > 0) {
            d['p' + d.t]--;
            if (d['s' + d.t] > 0) d['s' + d.t]--;
        }
        actualizarUI();
    }

    /** Casual: resta 1 al jugador de esa columna (mini teclado − en modo sol). */
    function restarCasualColumna(jugador) {
        if (!tvSession || tvSession.type !== 'casual') return;
        if (partidaTerminada) return;
        var j = jugador === 2 ? 2 : 1;
        if (d['p' + j] <= 0) return;
        d['p' + j]--;
        if (d['s' + j] > 0) d['s' + j]--;
        actualizarUI();
    }

    /** PRO: deshace la última “SIGUIENTE ENTRADA” (CANCEL). Casual: revierte la última anotación del mini teclado. */
    function cancelarJugadaEntrada() {
        if (partidaTerminada) return;
        if (tvSession && tvSession.type === 'casual') {
            var j = ultimaJugadaJ1 > 0 ? 1 : ultimaJugadaJ2 > 0 ? 2 : 0;
            var quitar = j === 1 ? ultimaJugadaJ1 : j === 2 ? ultimaJugadaJ2 : 0;
            if (j === 0 || quitar <= 0) return;
            d['p' + j] -= quitar;
            if (d['p' + j] < 0) d['p' + j] = 0;
            d['s' + j] = Math.max(0, d['s' + j] - quitar);
            ultimaJugadaJ1 = 0;
            ultimaJugadaJ2 = 0;
            actualizarUI();
            return;
        }
        if (tvSession && tvSession.type === 'pro') {
            if (!proUltimoCambio) return;
            var finisher = proUltimoCambio.finisher;
            var pts = proUltimoCambio.puntos | 0;
            if (finisher !== 1 && finisher !== 2) return;
            d['p' + finisher] -= pts;
            if (d['p' + finisher] < 0) d['p' + finisher] = 0;
            if (d['e' + finisher] > 0) d['e' + finisher]--;
            d['s' + finisher] = pts;
            d.t = finisher;
            proUltimoCambio = null;
            tiempoRestante = cfg.tiempo;
            iniciarReloj();
            actualizarUI();
            return;
        }
        var t = d.t;
        var quitar = d['s' + t];
        if (quitar <= 0) return;
        d['p' + t] -= quitar;
        if (d['p' + t] < 0) d['p' + t] = 0;
        d['s' + t] = 0;
        actualizarUI();
    }

    async function guardarPartidaTVEnHistorial() {
        var vacio = {
            ok: false,
            partida_id_ganador: null,
            partida_id_j1: null,
            partida_id_j2: null
        };
        try {
            if (typeof window.HISTORIAL === 'undefined' || !window.HISTORIAL.guardarPartida) return vacio;
            var nom1 = nomJ1;
            var nom2 = nomJ2;
            var fecha = new Date().toISOString();
            var entradaObj = cfg.meta1 || 0;
            var prom1 = d.e1 > 0 ? d.p1 / d.e1 : 0;
            var prom2 = d.e2 > 0 ? d.p2 / d.e2 : 0;
            var r1 = await HISTORIAL.guardarPartida({
                jugador_id: jugadorIdJ1,
                jugador_nombre: nom1,
                rival_nombre: nom2,
                rival_promedio: prom2,
                entrada_objetivo: entradaObj,
                entradas_jugador: d.e1,
                carambolas_jugador: d.p1,
                promedio_partida: prom1,
                gano: d.p1 >= d.p2,
                tipo: 'duelo',
                torneo_nombre: null,
                serie_mayor: d.ms1,
                fecha: fecha
            });
            var r2 = await HISTORIAL.guardarPartida({
                jugador_id: jugadorIdJ2,
                jugador_nombre: nom2,
                rival_nombre: nom1,
                rival_promedio: prom1,
                entrada_objetivo: entradaObj,
                entradas_jugador: d.e2,
                carambolas_jugador: d.p2,
                promedio_partida: prom2,
                gano: d.p2 >= d.p1,
                tipo: 'duelo',
                torneo_nombre: null,
                serie_mayor: d.ms2,
                fecha: fecha
            });
            var idJ1 = r1 && r1.partida_id != null ? r1.partida_id : null;
            var idJ2 = r2 && r2.partida_id != null ? r2.partida_id : null;
            var gana1;
            if (d.p1 >= d.p2) gana1 = true;
            else if (d.p2 >= d.p1) gana1 = false;
            else gana1 = d.ms1 >= d.ms2;
            var partida_id_ganador = gana1 ? idJ1 : idJ2;
            return {
                ok: true,
                partida_id_ganador: partida_id_ganador,
                partida_id_j1: idJ1,
                partida_id_j2: idJ2
            };
        } catch (e) {
            if (typeof console !== 'undefined' && console.warn) console.warn('[duelo_premium_tv] guardarPartidaTVEnHistorial:', e);
            return vacio;
        }
    }

    function setupNombresProTv() {
        if (!tvSession || tvSession.type !== 'pro') return;
        [1, 2].forEach(function (j) {
            var h2 = document.getElementById('nombre-pro-wrap-j' + j);
            var span = document.getElementById(j === 1 ? 'lbl1-sb' : 'lbl2-sb');

            if (!h2 || !span || !inp) return;
            function showView() {
                h2.style.display = '';
                inp.style.display = 'none';
            }
            async function commit() {
                var qRaw = (inp.value || '').trim();
                showView();
                if (!qRaw || qRaw === span.textContent.trim()) {
                    inp.value = '';
                    return;
                }
                var res = await buscarJugadorProDesdeTexto(qRaw);
                if (res.err || !res.row) {
                    span.textContent = qRaw;
                    if (j === 1) {
                        nomJ1 = qRaw;
                        tvSession.j1 = qRaw;
                        tvSession.jugador = null;
                        jugadorIdJ1 = null;

                    } else {
                        nomJ2 = qRaw;
                        tvSession.j2 = qRaw;
                        tvSession.jugador2 = null;
                        jugadorIdJ2 = null;
                        cfg.ced2 = '';
                    }
                } else {
                    var nom = res.row.nombre || qRaw;
                    span.textContent = nom;
                    if (j === 1) {
                        nomJ1 = nom;
                        tvSession.j1 = nom;
                        tvSession.jugador = res.row;
                        jugadorIdJ1 = res.row.id || null;
                        cfg.ced1 = res.row.cedula ? String(res.row.cedula) : '';
                    } else {
                        nomJ2 = nom;
                        tvSession.j2 = nom;
                        tvSession.jugador2 = res.row;
                        jugadorIdJ2 = res.row.id || null;
                        cfg.ced2 = res.row.cedula ? String(res.row.cedula) : '';
                    }
                }
                inp.value = '';
                actualizarUI();
                actualizarIndicadorTvSalon();

                inp.focus();
                inp.select();

            inp.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    inp.blur();
                }
                if (e.key === 'Escape') {
                    inp.value = span.textContent;
                    inp.blur();
                }
            });
            inp.addEventListener('blur', function () {
                commit();
            });
        });
    }

    /** Meta numérica en cabecera (puntos/meta): tocar el valor de meta abre input inline (casual y PRO). */
    function setupMetaHeaderEditableTv() {
        if (!tvSession) return;
        [1, 2].forEach(function (j) {
            var metaTap = document.getElementById(j === 1 ? 'lbl-meta1-top' : 'lbl-meta2-top');
            var inp = document.getElementById('inp-meta-hdr-j' + j);
            if (!metaTap || !inp) return;
            function showView() {
                metaTap.style.display = '';
                inp.style.display = 'none';
            }
            function commit() {
                var n = parseInt(inp.value, 10);
                if (!isFinite(n) || n < 1) n = j === 1 ? cfg.meta1 : cfg.meta2;
                n = Math.min(999, Math.max(1, n));
                if (j === 1) cfg.meta1 = n;
                else cfg.meta2 = n;
                tvSession.meta = Math.max(cfg.meta1 | 0, cfg.meta2 | 0);
                metaTap.textContent = String(n);
                showView();
                actualizarUI();
                actualizarIndicadorTvSalon();
            }
            metaTap.addEventListener('click', function (e) {
                e.preventDefault();
                e.stopPropagation();
                metaTap.style.display = 'none';
                inp.style.display = 'inline-block';
                inp.value = String(j === 1 ? cfg.meta1 : cfg.meta2);
                try {
                    inp.focus();
                    inp.select();
                } catch (ex) {}
            });
            inp.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    inp.blur();
                }
                if (e.key === 'Escape') {
                    e.preventDefault();
                    inp.dataset.skipMetaHdrCommit = '1';
                    inp.blur();
                }
            });
            inp.addEventListener('blur', function () {
                if (inp.dataset.skipMetaHdrCommit === '1') {
                    inp.dataset.skipMetaHdrCommit = '';
                    showView();
                    return;
                }
                commit();
            });
        });
    }

    function setupMetaEditablePro() {
        if (!tvSession || tvSession.type !== 'pro') return;
        var inp = document.getElementById('inp-meta-pro');
        var w1 = document.getElementById('wrap-meta-pro-primary');
        var w2 = document.getElementById('wrap-meta-pro-secondary');
        if (!inp || !w1 || !w2) return;
        function showStatic() {
            inp.style.display = 'none';
            var s1 = w1.querySelector('.salon-pro-meta-static');
            var s2 = w2.querySelector('.salon-pro-meta-static');
            if (s1) s1.style.display = '';
            if (s2) s2.style.display = '';
        }
        function openEditor() {
            var s1 = w1.querySelector('.salon-pro-meta-static');
            var s2 = w2.querySelector('.salon-pro-meta-static');
            if (s1) s1.style.display = 'none';
            if (s2) s2.style.display = 'none';
            inp.style.display = 'inline-block';
            inp.value = String(cfg.meta1);
            try {
                inp.focus();
                inp.select();
            } catch (e) {}
        }
        function commitMeta() {
            var n = parseInt(inp.value, 10);
            if (!isFinite(n) || n < 1) n = cfg.meta1;
            n = Math.min(999, Math.max(1, n));
            cfg.meta1 = n;
            cfg.meta2 = n;
            tvSession.meta = n;
            showStatic();
            actualizarUI();
        }
        w1.addEventListener('click', function (e) {
            if (e.target === inp) return;
            openEditor();
        });
        w2.addEventListener('click', function (e) {
            if (e.target === inp) return;
            openEditor();
        });
        inp.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                inp.blur();
            }
            if (e.key === 'Escape') {
                inp.value = String(cfg.meta1);
                inp.blur();
            }
        });
        inp.addEventListener('blur', commitMeta);
    }

    async function aplicarProDesdeModal() {

        var input = document.getElementById('modal-pro-input');
        var qRaw = input && input.value ? String(input.value).trim() : '';

    /** Intercambia jugadores en sesión casual: nombres, PRO vinculados y cfg; opcionalmente el marcador en curso. */
    function swapCasualLadosEnSesionYConfig(conMarcador) {
        var t;
        t = tvSession.j1;
        tvSession.j1 = tvSession.j2;
        tvSession.j2 = t;
        var jg = tvSession.jugador;
        tvSession.jugador = tvSession.jugador2;

        nomJ2 = t;
        t = cfg.ced1;
        cfg.ced1 = cfg.ced2;
        cfg.ced2 = t;
        t = cfg.meta1;
        cfg.meta1 = cfg.meta2;
        cfg.meta2 = t;
        t = jugadorIdJ1;
        jugadorIdJ1 = jugadorIdJ2;
        jugadorIdJ2 = t;
        if (conMarcador && d) {
            t = d.p1;
            d.p1 = d.p2;
            d.p2 = t;
            t = d.e1;
            d.e1 = d.e2;
            d.e2 = t;
            t = d.s1;
            d.s1 = d.s2;
            d.s2 = t;
            t = d.ms1;
            d.ms1 = d.ms2;
            d.ms2 = t;
            d.t = d.t === 1 ? 2 : 1;
            t = ultimaJugadaJ1;
            ultimaJugadaJ1 = ultimaJugadaJ2;
            ultimaJugadaJ2 = t;
        }
    }

    function normalizarEstado(e) {
        return String(e || '')
            .toLowerCase()
            .replace(/\s+/g, '_');
    }

    async function cargarSnapshot() {
        if (!clubId) return;
        if (tvSession) return;
        var m = await supabase.from('mesas').select('*').eq('club_id', clubId);
        if (m.error) return;
        mesasById = {};
        (m.data || []).forEach(function (row) {
            mesasById[row.id] = row;
        });
        var h = await supabase.from('mesas_historial').select('*').eq('club_id', clubId).eq('estado', 'abierta');
        if (h.error) return;
        sesionesByMesa = {};
        (h.data || []).forEach(function (row) {
            if (row.mesa_id) sesionesByMesa[row.mesa_id] = row;
        });
        render();
    }

    function fmtCrono(inicioIso) {
        var t0 = new Date(inicioIso).getTime();
        if (isNaN(t0)) return '—';
        var seg = Math.floor((Date.now() - t0) / 1000);
        var h = Math.floor(seg / 3600),
            mi = Math.floor((seg % 3600) / 60),
            s = seg % 60;
        return (h ? h + ':' : '') + (mi < 10 ? '0' : '') + mi + ':' + (s < 10 ? '0' : '') + s;
    }

    var mesasOcupadas = [];
    var mesaActualIdx = 0;

    /** Un solo getUserMedia para paneles sin URL (varias mesas comparten la misma cámara). */
    var dcSalonLocalMediaStream = null;
    var dcSalonLocalMediaPromise = null;

    function dcStopSalonLocalCameraIfAny() {
        if (dcSalonLocalMediaStream) {
            try {
                dcSalonLocalMediaStream.getTracks().forEach(function (t) {
                    try {
                        t.stop();
                    } catch (e) {}
                });
            } catch (e2) {}
            dcSalonLocalMediaStream = null;
        }
        dcSalonLocalMediaPromise = null;
    }

    function dcHeaderStreamForPanel(panelVideoRoot, idle) {
        var idl = String(idle || '');
        if (idl.indexOf('SALÓN') !== -1) return 'SALÓN — STREAM EN VIVO';
        return 'MESA — STREAM EN VIVO';
    }

    function dcHeaderLocalForPanel(panelVideoRoot, idle) {
        var idl = String(idle || '');
        if (idl.indexOf('SALÓN') !== -1) return 'SALÓN — CÁMARA LOCAL';
        return 'MESA — CÁMARA LOCAL';
    }

    function ensureDcSalonLocalCameraStream() {
        if (dcSalonLocalMediaStream) return Promise.resolve(dcSalonLocalMediaStream);
        if (dcSalonLocalMediaPromise) return dcSalonLocalMediaPromise;
        if (!navigator.mediaDevices || typeof navigator.mediaDevices.getUserMedia !== 'function') {
            return Promise.reject(new Error('getUserMedia no disponible'));
        }
        dcSalonLocalMediaPromise = navigator.mediaDevices
            .getUserMedia({ video: true, audio: false })
            .then(function (s) {
                dcSalonLocalMediaStream = s;
                dcSalonLocalMediaPromise = null;
                return s;
            })
            .catch(function (e) {
                dcSalonLocalMediaPromise = null;
                throw e;
            });
        return dcSalonLocalMediaPromise;
    }

    function navMesa(dir) {
        if (mesasOcupadas.length < 2) return;
        mesaActualIdx = (mesaActualIdx + dir + mesasOcupadas.length) % mesasOcupadas.length;
        mostrarMesaActual();
        var ind = document.getElementById('mesa-indicator');
        if (ind && mesasOcupadas.length) {
            var cur = mesasOcupadas[mesaActualIdx];
            ind.textContent = 'MESA ' + (cur.numero != null ? cur.numero : '—') + ' · ' + (mesaActualIdx + 1) + '/' + mesasOcupadas.length;
        }
    }

    function mostrarMesaActual() {
        if (tvSession) return;
        var cards = document.querySelectorAll('#dc-tv-grid .card');
        cards.forEach(function (c) { c.classList.remove('activa'); });
        if (cards[mesaActualIdx]) cards[mesaActualIdx].classList.add('activa');

        var mesa = mesasOcupadas[mesaActualIdx];
        var ses = mesa ? sesionesByMesa[mesa.id] : null;
        var active = document.querySelector('#dc-tv-grid .card.activa');
        if (!active) return;

        var elNom = active.querySelector('.js-cli-nombre');
        var elCro = active.querySelector('.js-cli-crono');
        if (elNom) elNom.textContent = ses && ses.jugador_nombre ? ses.jugador_nombre : '—';
        if (elCro) elCro.textContent = ses && ses.inicio_sesion ? fmtCrono(ses.inicio_sesion) : '00:00';
    }

    /**
     * Misma lógica que duelo-movil.html → initVideoPanel():
     * ?stream= en URL o URL por mesa; si hay stream → iframe.src = stream y display block;
     * si no → getUserMedia (cámara del dispositivo) o placeholder si deniega / no hay API.
     * data-header-idle en .panel-video restaura el título del bloque (MESA vs SALÓN).
     */
    function initVideoPanelForCard(panelVideoRoot, stream) {
        var streamNorm = (stream && String(stream).trim()) || '';
        var iframe = panelVideoRoot.querySelector('.stream-iframe');
        var placeholder = panelVideoRoot.querySelector('.video-placeholder');
        var header = panelVideoRoot.querySelector('.lbl-video-header');
        var localVideo = panelVideoRoot.querySelector('.local-camera');
        var headerIdle =
            (panelVideoRoot.getAttribute && panelVideoRoot.getAttribute('data-header-idle')) ||
            (header && header.textContent ? header.textContent.trim() : '') ||
            'MESA — VIDEO / STREAM';

        function showStreamPlaceholder() {
            if (localVideo) {
                try {
                    localVideo.srcObject = null;
                } catch (e) {}
                localVideo.style.display = 'none';
            }
            if (placeholder) placeholder.style.display = 'flex';
            if (header) header.innerText = headerIdle;
        }

        if (streamNorm) {
            if (iframe) {
                iframe.src = streamNorm;
                iframe.style.display = 'block';
            }
            if (localVideo) {
                try {
                    localVideo.srcObject = null;
                } catch (e) {}
                localVideo.style.display = 'none';
            }
            if (placeholder) placeholder.style.display = 'none';
            if (header) header.innerText = dcHeaderStreamForPanel(panelVideoRoot, headerIdle);
            return;
        }

        if (iframe) {
            iframe.src = '';
            iframe.style.display = 'none';
        }

        if (!navigator.mediaDevices || typeof navigator.mediaDevices.getUserMedia !== 'function') {
            showStreamPlaceholder();
            return;
        }

        ensureDcSalonLocalCameraStream()
            .then(function (s) {
                if (!localVideo) {
                    showStreamPlaceholder();
                    return;
                }
                localVideo.srcObject = s;
                localVideo.style.display = 'block';
                if (placeholder) placeholder.style.display = 'none';
                if (header) header.innerText = dcHeaderLocalForPanel(panelVideoRoot, headerIdle);
            })
            .catch(function () {
                showStreamPlaceholder();
            });
    }

    function render() {
        var grid = document.getElementById('dc-tv-grid');
        if (!grid) return;

        if (tvSession) {
            renderTvSession();
            return;
        }

        mesasOcupadas = [];
        Object.keys(mesasById).forEach(function (id) {
            var mesa = mesasById[id];
            if (normalizarEstado(mesa.estado) === 'ocupada') mesasOcupadas.push(mesa);
        });
        mesasOcupadas.sort(function (a, b) { return (a.numero || 0) - (b.numero || 0); });

        if (!mesasOcupadas.length) {
            dcStopSalonLocalCameraIfAny();
            grid.innerHTML = '<div class="empty">Ninguna mesa ocupada. Cuando la operadora abra una sesión, aparecerá acá al instante.</div>';
            var ind = document.getElementById('mesa-indicator');
            if (ind) ind.textContent = '';
            var btnP = document.getElementById('btn-prev');
            var btnN = document.getElementById('btn-next');
            if (btnP) btnP.classList.add('oculto');
            if (btnN) btnN.classList.add('oculto');
            return;
        }

        if (mesaActualIdx >= mesasOcupadas.length) mesaActualIdx = 0;

        var paramsTv = new URLSearchParams(window.location.search);
        var streamFromUrl = (paramsTv.get('stream') || '').trim();

        var html = '';
        mesasOcupadas.forEach(function (mesa) {
            var ses = sesionesByMesa[mesa.id];
            var nombre = ses && ses.jugador_nombre ? ses.jugador_nombre : '—';
            var cronoTxt = ses && ses.inicio_sesion ? fmtCrono(ses.inicio_sesion) : '00:00';
            var num = mesa.numero != null ? mesa.numero : '—';

            html += '<div class="card" data-mesa-id="' + escAttr(mesa.id) + '">';
            html += '<div class="premium-row">';
            html += '<aside class="col-side col-izq">';
            html += '<span class="lbl">Cliente / sesión</span>';
            html += '<div class="nombre js-cli-nombre">' + escHtml(nombre) + '</div>';
            html += '<div class="crono-big js-cli-crono">' + escHtml(cronoTxt) + '</div>';
            html += '</aside>';
            html += '<div class="col-video">';
            html += '<div class="panel-video" data-header-idle="MESA — VIDEO / STREAM">';
            html += '<h3 class="lbl-video-header">MESA — VIDEO / STREAM</h3>';
            html += '<div class="video-frame">';
            html += '<div class="video-placeholder">Conecte la cámara de esta mesa</div>';
            html += '<iframe class="stream-iframe" style="display:none;" title="Transmisión"></iframe>';
            html += '<video class="local-camera" style="display:none;" playsinline autoplay muted></video>';
            html += '</div></div></div>';
            html += '<aside class="col-side der">';
            html += '<span class="lbl">Mesa</span>';
            html += '<div class="mesa-num">#' + escHtml(String(num)) + '</div>';
            html += '<div class="mesa-sub">EN SESIÓN</div>';
            html += '</aside>';
            html += '</div></div>';
        });
        grid.innerHTML = html;

        mesasOcupadas.forEach(function (mesa, idx) {
            var cards = grid.querySelectorAll('.card');
            var card = cards[idx];
            if (!card) return;
            var panel = card.querySelector('.panel-video');
            if (!panel) return;
            var stream = streamFromUrl || urlStreamingMesa(mesa);
            initVideoPanelForCard(panel, stream);
        });

        var btnP = document.getElementById('btn-prev');
        var btnN = document.getElementById('btn-next');
        if (mesasOcupadas.length < 2) {
            if (btnP) btnP.classList.add('oculto');
            if (btnN) btnN.classList.add('oculto');
        } else {
            if (btnP) btnP.classList.remove('oculto');
            if (btnN) btnN.classList.remove('oculto');
        }
        var ind2 = document.getElementById('mesa-indicator');
        if (ind2 && mesasOcupadas.length) {
            var cur = mesasOcupadas[mesaActualIdx];
            ind2.textContent = 'MESA ' + (cur.numero != null ? cur.numero : '—') + ' · ' + (mesaActualIdx + 1) + '/' + mesasOcupadas.length;
        }
        mostrarMesaActual();
    }

        );

    }
